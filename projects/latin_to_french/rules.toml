# Latin → French sound-change cascade from DiaCLEF2025 source.
#
# Stage → canonical time (AD). The FLLAPS gold checkpoints (words.csv columns)
# attest the EARLY part of each named period, so a period's own late changes are
# timed just AFTER its checkpoint — do not "re-align" them back onto the checkpoint.
#   Classical Latin  -100  (the `word` input column)
#   Late Latin        300  {GOLD}   · late-LL/Gallo-Roman onset  400
#   Early Gallo-Roman 500  · Middle GR 600 · Later GR 750
#   Old French I     1000  {GOLD}   · OF-II-producing changes  1100
#   Old French II    1200  {GOLD}   · OF-II→MF transition      1300
#   Middle French    1500  {GOLD}   · late-MF / 16th–17th-c. changes 1550
#   Modern (Output)  final {GOLD}   · 1550, 1650, 1750
# 2026-07 calibration: gold columns set to canonical times and the bands that
# straddled a checkpoint shifted just past it (300→400, 1000→1100, 1200→1300, and
# the late-MF 16th–17th-c. changes → 1550, with the MF checkpoint at 1500).
# Order-preserving, so the final derivation is byte-identical; per-stage fit at
# canonical times rose (LL 97→257, OF-I 52→119, OF-II 135→180, MF 199→227).

[lex_ai_sporadic_b_loss]
time = 300
name = "ai: sporadic loss of intervocalic b (habeo auxiliary erodes off the regular path)"
description = "SPORADIC/lexical — the very high-frequency auxiliary j'ai reduced irregularly; attested LL hˈɑʝɔ already has no b (regular -be- gives the affricate reflex aʒ, which both Fortis and DiaSim produce). Loss of b puts it on the attested aj→e path."
words = ["ai"]
definition = "b → ∅"

[lex_ja_final_m_loss]
time = 300
name = "ja: sporadic loss of final -m (function-word erosion)"
description = "SPORADIC/lexical — jam 'already', a very high-frequency adverb, lost its final -m irregularly (attested LL ʝɑ). No environment separates it from the many words that KEEP final -m after a stressed vowel (aime ɛm, âme ɑm, femme fam, pomme pɔm), so the loss is word-scoped rather than a general rule."
words = ["ja"]
definition = "m → ∅ / _ #"

[lex_connaitre_gn_dentalizes]
time = 400
name = "connaître: the etymological ŋ dentalizes to n̪ (lexically reformed, not palatalized)"
description = "SPORADIC/lexical — cognoscere's ⟨gn⟩ gives ŋn̪ by the g→ŋ assimilation, matching the attested Late-Latin kɔŋn̪oscɛrɛ, but (per Pope s321) the word was reformed in Latin under the influence of nosco to *connoscere*, so it takes the geminate-n̪ path (connaître kɔn̪ɛt̪ʁ) rather than the regular ŋn̪→ɲ palatalization that agnellos/insignia undergo (agneau, enseigne, both ɲ). Word-scoped, since only this etymon deviates."
words = ["connaître"]
definition = "ŋ → n̪ / _ n̪"

[cl_n_velar_assim]
time = -100
name = "n assimilates to a following velar stop"
definition = "n̪ → ŋ / _ [aperture: high, +back, -continuant, nasal: none]"

[cl_u_to_sonus_medius]
time = -100
name = "unstressed long u becomes a mid central vowel (sonus medius), not word-finally"
description = "Diachronically equivalent to ɪ; does not bleed or feed prior yod formation. Target guarded to unstressed — a bare `uː` literal matches any stress, so it was eating the stressed ū of crus/durs/salut (which must survive to front to y). NOTE: fires only on manducare, where the gold-300 keeps `u` (mɑn̪d̪ukɑrɛ) — but the derivation NEEDS the fronted vowel for the later duk→dʒ palatalization (manger /mɑ̃ʒe/), so this attestation-vs-derivation conflict is left as DiaSim resolves it (both derive d̪e, missing the gold-u); deleting the rule fixes the 300 form but regresses 1500+final."
definition = "[aperture: high, +back, +rounded, +syllabic, length: long, stress: none] → ɪ / _ [-syllabic] // _ [-syllabic] #"

[cl_g_n_assim]
time = -100
name = "g assimilates to a following coronal nasal (gn cluster)"
definition = "g → ŋ / _ n̪"

[cl_a_backing]
time = -100
name = "low vowel backs by default"
definition = "[aperture: low, +syllabic] → [front: none, +back]"

[cl_a_fronting_before_e_glide]
time = -100
name = "low vowel re-fronts before the e-glide"
definition = "[aperture: low, +syllabic] → [+front, back: none] / _ e̯"

[cl_d_total_assim_obstruent]
time = -100
name = "d totally assimilates to a following obstruent"
description = "e.g. ad + capere > accapere, ad + ferre > afferre (prefix-final d assimilation)"
definition = "d̪ → @1 / _ 1=[-sonorant]"

[cl_jw_hardening]
time = -100
name = "j/w harden to fricative-like consonants before a vowel (not in a falling diphthong)"
description = "Pope s106 (j: p55 s106c; w: p56 s109)"
definition = "(j|w) → [+consonantal, -sonorant] / _ [+syllabic]"

[cl_ghw_to_w_after_velar]
time = -100
name = "the labiovelar approximant simplifies to w after a velar consonant"
description = "Pope s186 — betacism doesn't occur after k"
definition = "ɣʷ → w / [+back, aperture: high, +consonantal] _"

[cl_greek_deaspiration]
time = -100
name = "aspiration lost on Greek loanwords (2nd century)"
description = "Pope p226 s629"
definition = "[glottal_aperture: spread, -continuant, nasal: none] → [glottal_aperture: neutral]"

[cl_greek_y_unrounding]
time = -100
name = "Greek y unrounds to i"
description = "Pope p226-7 s632"
definition = "[aperture: high, +front, +syllabic] → [rounded: none, labial: none]"

[cl_ns_lengthening]
time = -100
name = "vowel lengthens before ns when the next syllable is unstressed"
description = "Pope s359 ~ s156iii"
definition = "[+syllabic] → [length: long] / _ n̪ s ([-syllabic])* [stress: none]"

[cl_n_loss_after_long_before_s]
time = -100
name = "n lost after a long vowel before s (compensatory lengthening already applied)"
definition = "n̪ → ∅ / [+syllabic, length: long] _ s"

[cl_pietatem_type_lengthening]
time = -100
name = "stressed i + e becomes iːx (pietatem-type lexemes)"
description = "Pope explicitly notes pitie' as pixt-, implying this development. Source [+stres] = any stress level; the i of pietātem is SECONDARY-stressed (pˌietātem), so stress: primary missed it — use stress: !none."
definition = "[aperture: high, +front, +syllabic, stress: !none] e → [length: long] x / _ [nasal: none]"

[cl_quantity_to_quality_1]
time = -100
name = "Classical Latin length distinction becomes a quality (tense) distinction, first pass"
description = "Pope p72-73 s154i ~ p89 s179 — short non-low vowels become lax; 2024 correction: only for vowels with some degree of stress is implicit in later re-application"
definition = "[+syllabic, aperture: !low, length: short] → [advancement: rtr]"

[cl_h_loss_internal]
time = -100
name = "h lost word-internally (word-initial h survives at this stage)"
description = "Pope s155i ~ s185"
definition = "h → ∅ // # _"

[cl_i_prosthesis]
time = -100
name = "i-prosthesis before word-initial s + consonant"
description = "Pope s361 — Western Romance, attested 2nd century. The ˌ writes secondary stress onto the prosthetic vowel, matching DiaSim (where the stress rides through), which protects it from the unstressed reduction e→ə→∅: scutarium ˌesk… > écuyer /ekɥije/, stamen > étaim /et̪ɛ̃/, sponsum > époux /epu/."
definition = "∅ → ˌɪ / # _ s [+consonantal]"

[cl_stress_shift_antepenult_2_demote_old]
time = -100
name = "the old primary stress demotes when a new one has been placed (type 2)"
description = "stress is syllable-level, so bare [stress: primary] matches every segment of the stressed syllable (including its onset) — both the target and the lookahead are anchored to +syllabic so only the nucleus can match"
definition = "[+syllabic, stress: primary] → [stress: secondary] / # ([-syllabic])* _ ([-syllabic])* [+syllabic, stress: primary]"

[cl_yod_w_formation]
time = -100
name = "unstressed short non-low vowels glide before another vowel (yod/w formation)"
description = "Pope s220, s156i — called for this early by s187. Output is a true glide (+consonantal): a pre-vocalic yod/w, not a diphthong off-glide semivowel — so it feeds yod strengthening (j→ʝ) and the palatalization chain, matching DiaSim's single [+hi,-syl] yod."
definition = "[+syllabic, length: short, stress: none, aperture: !low] → [aperture: high, syllabic: -, +consonantal, advancement: atr] / _ [+syllabic]"

[cl_l_darkening]
time = -100
name = "l darkens before a non-lateral consonant"
definition = "l → ɫ / _ [+consonantal, lateral: none] // _ [-syllabic, +front, aperture: high, +continuant]"

[cl_yod_strengthening]
time = -100
name = "yod strengthens before a vowel"
description = "Pope s105c, s106. Matches the yod by bundle (not the literal `j`): a derived pre-vocalic glide carries advancement: atr, so it is not letter-identical to `j` — but it is the same [+cons, +front, high, -syll] segment DiaSim strengthens."
definition = "[+consonantal, +front, aperture: high, syllabic: -] → ʝ / _ [+syllabic]"

[cl_ghw_loss_lo_round]
time = -100
name = "the labiovelar approximant is lost between a low vowel and a rounded vowel"
definition = "ɣʷ → ∅ / [aperture: low] _ [+syllabic, +rounded]"

[cl_syncope_u_o_before_l]
time = -100
name = "posttonic ʊ/o syncopates before l + vowel near the end of the word"
definition = "(ʊ|o) → ∅ / [+syllabic, stress: primary] ([-syllabic])* ([-continuant, nasal: none]|m|r) _ [+lateral] [+syllabic] ([-syllabic])? #"

[cl_syncope_i_before_l]
time = -100
name = "posttonic ɪ syncopates before l + vowel near the end of the word (-bile type)"
description = "The -bile suffix loses its posttonic ɪ (culpabilem > coupable koɫpɑblɛ), parallel to the ʊ/o syncope above. Ordered before b-lenition so the b lands in a bl cluster and stays b (the lenition rule excludes laterals). DiaSim misses this word (it derives koɫpɑβelɛ)."
definition = "ɪ → ∅ / [+syllabic, stress: primary] ([-syllabic])* ([-continuant, nasal: none]|m|r) _ [+lateral] [+syllabic] ([-syllabic])? #"

[cl_syncope_between_n_r]
time = 400
name = "posttonic non-low vowel syncopates between n and r + vowel"
definition = "[+syllabic, aperture: !low, stress: none] → ∅ / [+syllabic, stress: primary] ([-syllabic])* n̪ _ r [+syllabic]"

[cl_i_loss_after_vowel_velar]
time = -100
name = "ɪ lost after a non-low vowel + velar stop, before l"
definition = "ɪ → ∅ / [aperture: !low, +syllabic] [-continuant, +back, nasal: none] _ l"

[cl_front_vowel_syncope_a]
time = -100
name = "unstressed front vowel lost between a back stop and a coronal (type a)"
definition = "[+syllabic, stress: none, +front] → ∅ / [stress: primary, aperture: low] [+back, -continuant, nasal: none] _ [+lingual, +front, strident: none, nasal: none, lateral: none] [+syllabic]"

[cl_front_vowel_syncope_b]
time = -100
name = "unstressed front vowel lost between g and a voiced coronal"
definition = "[+syllabic, stress: none, +front] → ∅ / [+syllabic] g _ [+lingual, +front, lateral: none, +voice] [+syllabic]"

[cl_i_loss_ghw_k]
time = -100
name = "ɪ lost between the labiovelar approximant and k"
definition = "ɪ → ∅ / ɣʷ _ k"

[cl_ghw_to_w_before_cons]
time = -100
name = "the labiovelar approximant simplifies to w before a consonant"
definition = "ɣʷ → w / _ [+consonantal] // _ [-syllabic, +front, aperture: high, +continuant]"

[cl_ghw_remainder_to_bw]
time = -100
name = "any remaining labiovelar approximant becomes a labialized voiced bilabial fricative"
definition = "ɣʷ → βʷ"

[cl_b_lenition]
time = -100
name = "b lenites to β intervocalically / before a sonorant"
definition = "b → β / [+syllabic] _ [+sonorant, lateral: none]"

[cl_ee_contraction_stressed_second]
time = -100
name = "e + e contracts to a long stressed e when stress is on the second vowel"
definition = "[+front, aperture: mid, +syllabic] [+front, aperture: mid, +syllabic, stress: primary] → ˈeː"

[cl_oo_contraction_stressed_second]
time = -100
name = "o + o contracts to a long stressed o when stress is on the second vowel"
definition = "[+rounded, aperture: !high, +syllabic] [+rounded, aperture: !high, +syllabic, stress: primary] → ˈoː"

[cl_long_feature_becomes_redundant]
time = -100
name = "the length feature is dropped now that quality carries the contrast"
definition = "[+syllabic, length: long] → [length: short]"

[cl_ae_monophthongization]
time = -100
name = "the ae diphthong monophthongizes to ɛ, preserving any stress mark"
definition = "(a e̯|ˌa e̯|ˈa e̯) → (ɛ|ˌɛ|ˈɛ)"

[cl_k_loss_after_ng_before_voiceless_coronal]
time = -100
name = "k lost after ŋ before a voiceless coronal"
definition = "k → ∅ / ŋ _ [+lingual, +front, -voice]"

[cl_k_loss_before_sc]
time = -100
name = "k lost before s + consonant"
definition = "k → ∅ / _ s [+consonantal]"

[cl_k_to_x]
time = -100
name = "k spirantizes to x after a vowel/glide before a voiceless coronal"
definition = "k → x / [-consonantal] _ [+lingual, +front, -voice]"

[cl_e_raising_before_ssj]
time = -100
name = "secondary-stressed ɛ raises to e before ssʝ"
definition = "ˌɛ → ˌe / _ s s ʝ"

[cl_g_spirantizes_before_m]
time = -100
name = "g spirantizes before m"
definition = "g → [+continuant] / _ m"

[cl_gh_to_w_before_m]
time = -100
name = "the resulting velar fricative becomes w before m"
definition = "ɣ → w / _ m"

[cl_lax_high_to_tense_mid]
time = -100
name = "lax high vowels lower to tense mid vowels"
definition = "[aperture: high, +syllabic, advancement: rtr] → [aperture: mid, advancement: atr]"

[cl_t_to_k_before_lateral]
time = -100
name = "t becomes k before a lateral"
definition = "t̪ → k / _ [+lateral]"

[cl_final_nasal_loss_unstressed]
time = -100
name = "word-final nasal consonant lost after an unstressed vowel"
definition = "[+nasal, +consonantal] → ∅ / [stress: none] _ #"

[cl_w_dissimilation_kw_kw]
time = -100
name = "w dissimilates between two kw sequences"
definition = "w → ∅ / k _ [+syllabic] ([-syllabic])? k w [+syllabic]"

[cl_td_palatalization_before_yod]
time = -100
name = "t/d palatalize before yod (t → tsʲ, d → ɟ)"
definition = "(t̪|d̪) → (t͡sʲ|ɟ) / _ [aperture: high, +front, syllabic: -, +continuant]"

[cl_k_gemination_before_yod_vowel]
time = -100
name = "k geminates (as palatal cc) intervocalically before yod + vowel"
definition = "k → c c / [+syllabic] _ ʝ [+syllabic]"

[cl_velar_fronting_second_palatalization]
time = -100
name = "a velar stop fronts before a following front non-low continuant (second palatalization trigger)"
definition = "[aperture: high, +back, -continuant, nasal: none] → [+front] / _ [+continuant, aperture: !low, +front, lateral: none]"

[cl_back_front_cleanup]
time = -100
name = "a segment marked both back and front loses the back specification"
definition = "[+back, +front, lateral: none] → [back: none]"

[cl_k_assim_before_c]
time = -100
name = "k assimilates to a following palatal c"
definition = "k → c / _ c"

[cl_lateral_loss_before_nasal_yod]
time = -100
name = "a lateral is lost before a nasal + yod"
definition = "[+lateral] → ∅ / _ [+nasal] ʝ"

[cl_voiced_stop_spirantization]
time = -100
name = "a voiced high stop/affricate spirantizes after a vowel before a sonorant or yod"
definition = "[-continuant, aperture: high, +voice, nasal: none] → [+continuant] / [-consonantal] _ ([+sonorant, lateral: none, nasal: none]|ʝ)"

# --- Late Latin (Pope p73 s155-5iv ff.) ---

[ll_yod_absorption]
time = 400
name = "yod absorbed into a preceding palatalized consonant"
definition = "ʝ → ∅ / [-continuant, aperture: high, +front, nasal: none] _"

[ll_n_palatalization]
time = 400
name = "the coronal nasal palatalizes before yod"
description = "Pope p131 s311"
definition = "n̪ [aperture: high, +front, syllabic: -, +voice, +continuant] → ɲ"

[ll_ll_palatalization]
time = 400
name = "ll palatalizes to ʎ before yod"
description = "Pope p131 s312. Match the lateral by feature (+lateral), not the literal l: the preceding l-darkening (cl_l_darkening) has already made it ɫ before the glide, so a bare `l` would miss (allium ɑlɫʝo)."
definition = "[+lateral] [+lateral] ʝ → ʎ"

[ll_l_palatalization]
time = 400
name = "l palatalizes to ʎ before yod"
description = "Match by +lateral (the l is dark ɫ here), matching DiaSim's l as a feature class."
definition = "[+lateral] ʝ → ʎ"

[ll_syncope_after_bhw]
time = 400
name = "unstressed vowels deleted between the labiovelar fricative and a coronal stop"
description = "even when not penultimate, unlike Pope's s353"
definition = "[stress: none, +syllabic] → ∅ / [+syllabic] β _ [+lingual, +front, -continuant, nasal: none, trill: none]"

[ll_e_to_schwa_glide]
time = 400
name = "e becomes a schwa-glide between an unrounded labial and a distributed obstruent + non-low vowel"
description = "Pope s353 broadened (2024 correction) to all positions except pretonic. Source [+distr,-son] is the distributed obstruents — the dental STOPS t̪/d̪ included, not only fricatives (Fortis has no [distributed] feature, so it is spelled out); e.g. sapidum/tepidum (before d̪) > sade/tiède."
definition = "[+syllabic, aperture: mid, +front, stress: none] → ə̯ / [rounded: none] [+labial] _ (θ|ð|ʃ|ʒ|t̪|d̪) [aperture: !low, +syllabic]"

[ll_e_deletion]
time = 400
name = "e deleted after a non-nasal + non-syllabic sequence, before a distributed consonant + non-primary-stressed vowel"
description = "Source [+distr] is the distributed consonants — the dental STOPS/NASAL t̪/d̪/n̪ included, not only the fricatives (Fortis lacks a [distributed] feature). The precontext is TWO segments ([-nas] then [-syl]): the segment before the deleted e need only be non-syllabic (m qualifies — femina > femna), while the one before THAT must be non-nasal. This is what fires on femina (before n̪) > femna, digitum (d̪) > dejto, etc."
definition = "[+syllabic, aperture: mid, +front, stress: none] → ∅ / [nasal: none] [-syllabic] _ (θ|ð|ʃ|ʒ|t̪|d̪|n̪) [stress: !primary, +syllabic]"

[ll_intervocalic_lenition]
time = 400
name = "a voiced stop lenites to a continuant intervocalically or before a non-nasal sonorant"
description = "Pope p73 s155iia, pp136-137 ss332-336, p6 s9 — unified 2024 into one rule"
definition = "[-continuant, +voice, nasal: none, trill: none] → [+continuant] / [+syllabic] _ [+sonorant, nasal: none]"

[ll_stressed_vowel_lengthening_final]
time = 400
name = "a stressed vowel lengthens word-finally"
description = "Pope p73 s154ii — length returns for stressed vowels in open contexts"
definition = "[stress: primary, +syllabic] → [length: long] / _ #"

[ll_stressed_vowel_lengthening_hiatus]
time = 400
name = "a stressed vowel lengthens before another vowel"
definition = "[stress: primary, +syllabic] → [length: long] / _ [+syllabic]"

[ll_stressed_vowel_lengthening_open_syllable]
time = 400
name = "a stressed vowel lengthens before a single consonant + glide"
definition = "[stress: primary, +syllabic] → [length: long] / _ [+consonantal] [-consonantal]"

[ll_stressed_vowel_lengthening_stop_liquid]
time = 400
name = "a stressed vowel lengthens before a plosive + non-nasal sonorant (muta cum liquida)"
definition = "[stress: primary, +syllabic] → [length: long] / _ [-continuant, nasal: none, trill: none] [+consonantal, +sonorant, nasal: none]"

[ll_stressed_vowel_lengthening_bvr]
time = 400
name = "a stressed vowel lengthens before a voiced labial + r + vowel + word end"
description = "chevre, couleuvre, levre, fievre-type; Pope only stipulates plosive + r is free, neglecting that b had already become fricative"
definition = "[stress: primary, +syllabic] → [length: long] / _ [+labial, +voice] r [+syllabic] #"

[ll_stressed_vowel_lengthening_monosyllable]
time = 400
name = "a stressed vowel lengthens in a monosyllable before a final consonant"
definition = "[stress: primary, +syllabic] → [length: long] / # ([-syllabic])* _ [+consonantal] #"

# --- Early Gallo-Roman (Pope s163, 6th-7th centuries) ---

[egr_velar_stop_spirantization_before_coronal]
time = 500
name = "a velar stop spirantizes after a vowel/glide before a coronal consonant"
description = "Pope failed to specify this occurs after nonconsonantal sounds"
definition = "[aperture: high, +back, -continuant, nasal: none] → [+continuant] / [-consonantal] _ [+lingual, +front, +consonantal]"

[egr_lw_to_ll]
time = 500
name = "lw becomes ll after a rounded vowel/glide, before a non-consonantal segment"
description = "Pope s374ii"
definition = "[+lateral] [syllabic: -, +continuant, +labial] → l l / [-consonantal, +rounded] _ [-consonantal]"

[egr_gh_loss_between_high_round_and_low]
time = 500
name = "the velar fricative is lost between a high round vowel and a low vowel"
definition = "ɣ → ∅ / [aperture: high, +rounded, +syllabic] _ [aperture: low, +syllabic]"

[egr_gh_to_bhw]
time = 500
name = "the velar fricative becomes a labialized bilabial fricative between o and a low vowel"
definition = "ɣ → β / [+rounded, aperture: !high, +back, +syllabic] _ [aperture: low, +syllabic]"

[egr_gh_loss_before_r_stressed]
time = 500
name = "the velar fricative is lost between a front-mid vowel and stressed r"
description = "Pope s323 — stated for /e/, extended to /ɛ/ (peregrinum)"
definition = "ɣ → ∅ / [+front, aperture: mid, +syllabic] _ r [stress: primary]"

[egr_bh_loss_after_low_before_labial_vowel]
time = 500
name = "the bilabial fricative is lost after a (non-initial) low vowel before a labial vowel"
description = "Pope p78 s163.7, p139 s343 — not word-initially"
definition = "β → ∅ / [aperture: low, +syllabic] _ [+labial, +syllabic] // # [aperture: low, +syllabic] _ [+labial, +syllabic]"

[egr_bh_loss_after_tonic_u]
time = 500
name = "the bilabial fricative is lost after tonic u"
definition = "β → ∅ / [stress: primary, aperture: high, +rounded, +back, +syllabic] _"

[egr_k_voicing]
time = 500
name = "k voices to g intervocalically"
description = "Pope p137 s335-336, p77 s163-5 — began 5th c., general by 6th c.; includes gw > ɣw (s329)"
