[mf_uvular_trill_to_fricative]
time = 1750
name = "the uvular trill ʀ becomes a fricative ʁ"
description = "CORRECTION"
definition = "ʀ → ʁ"

[mf_yod_absorbed_after_high_front]
time = 1750
name = "a yod is absorbed after a high front vowel (word-finally or before a consonant)"
description = "The palatal glide left by e.g. ct-palatalization (lectum > lejt > lit /li/, outil, six) is redundant after a high front i and is lost. This must run BEFORE ʎ→j (DiaSim's j-after-i deletion, rule 471, is early): it catches the diphthong-derived yod but NOT the word-final /ij/ ending that ʎ→j creates just afterward (fille /fij/, not *fi)."
definition = "j → ∅ / [aperture: high, +front, +syllabic] _ ([+consonantal]|#)"

[mf_palatal_l_to_yod]
time = 1750
name = "ʎ becomes j"
description = "Pope s381 ~ s687 — \"in the course of Modern French\". Ordered AFTER the yod-absorption above so the /ij/ ending it produces (fille) survives."
definition = "ʎ → j"

[mf_high_front_absorbed_into_yod]
time = 1750
name = "a high front vowel after another vowel is absorbed into a following j"
description = "CORRECTION — j and i after other vowels absorbed into j (DiaSim rule 744, runs after ʎ→j: rouille ʁuiʎ > ʁuij > ʁuj)."
definition = "[aperture: high, +front, rounded: none] → ∅ / [+syllabic] _ j"
