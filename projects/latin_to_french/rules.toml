description = "Pope s166.9, s383-391 — first attested 9th century; simplified to /ɫ/ throughout rather than distinguishing dark-l/gamma. Only the plain (non-palatal) lateral darkens — `[+lateral]` alone also matches the palatal ʎ, which must stay palatal to become j (maille ...aʎ.d͡ʒ, not *aɫ)."
definition = "[+lateral] → ɫ / _ [+consonantal]"

[eof_dark_l_to_ny_lateral]
time = 1100
name = "dark l becomes ʎ after a front unrounded high vowel"
description = "Pope s382iv, s384"
definition = "ɫ → ʎ / [aperture: high, +front, rounded: none] _"

[eof_u_fronting_completes]
time = 950
name = "high round back vowels front (completion of u-fronting)"
description = "Pope s166.1, s183, s9, s36, s42 — spread slowly from the south, continuing into the 10th century"
definition = "[aperture: high, +rounded, back: none] → [+front]"

[eof_first_nasalization_glide]
time = 950
name = "j nasalizes after a low vowel, before a nasal (first nasalization)"
description = "Pope s166.6, s434, s441.1, s441.3 — 10th century; affects a and aj"
definition = "j → [+nasal] / [aperture: low] _ [+nasal, -syllabic]"

[eof_first_nasalization_vowel]
time = 950
name = "a low vowel nasalizes before a nasal (first nasalization)"
description = "Retimed 1100→950: nasalization before a nasal GLIDE/consonant coda (the -ain/-aim/-ein diphthongs: faim fãj̃n̪, saint sãj̃n̪t̪, main) is attested BY the OF-I checkpoint. The GENERAL before-nasal-consonant rule stays at 1100 (moving it over-nasalizes i/y/u before onset n — lune/une/fin). Minor: bleeds meners countertonic schwa (net-0 at final)."
definition = "[aperture: low] → [+nasal] / _ [+nasal, -syllabic]"

[eof_countertonic_e_to_schwa_open]
time = 1100
name = "secondary-stressed e reduces to schwa in an open syllable"
description = "Pope s166.5, s223, s234-235 — attributed to the late 11th century via a letter of Anne of Russia (s235)"
definition = "ˌe → ˌə / _ ([+consonantal])? [+syllabic]"

[eof_countertonic_schwa_reverts_before_palatal]
time = 1100
name = "secondary-stressed schwa reverts to e before a palatal consonant"
description = "Pope s665"
definition = "ˌə → ˌe / _ [aperture: high, +front, +consonantal]"

[eof_initial_countertonic_schwa_to_e_before_strident]
time = 1100
name = "word-initial secondary-stressed schwa becomes e before a strident"
description = "CORRECTION (eveque(s), essai(s), essaim(s))"
definition = "ˌə → ˌe / # _ [+strident]"

[eof_e_rounds_to_o_before_j_after_voiced_labial]
time = 1100
name = "stressed e rounds early to o before j, after a voiced labial consonant"
definition = "ˈe → ˈo / [+labial, +voice] _ j"

[eof_final_ny_ejects_nasalized_j]
time = 1100
name = "word-final ɲ ejects a nasalized j after a tense vowel"
description = "Pope s405-406, called \"Early Old French\" by Pope (s406)"
definition = "∅ → j̃ / ([advancement: atr, +syllabic]|[aperture: low, +syllabic]) _ ɲ #"

[eof_nasal_uj_to_wi]
time = 1100
name = "the nasal diphthong ũj̃ becomes wĩ (syllabicity swap before a nasal)"
description = "Pope s670 (DiaCLEF source line 2648: {ũ j̃} > {w ĩ}), plus the front-round counterpart via the general yj→ɥi swap (rule 617) applied to the nasal ỹj̃ (juin ỹj̃ > ɥĩ > ɥɛ̃). The high rounded nucleus desyllabifies (back→w, front→ɥ) and the nasal yod becomes the nucleus ĩ, later lowered to ɛ̃. Must precede the ũj̃/ỹj̃ monophthongization."
definition = ["[+back, +rounded, aperture: high, +syllabic] j̃ → w [+syllabic]", "[+front, +rounded, aperture: high, +syllabic] j̃ → ɥ [+syllabic]"]

[eof_glide_before_intervocalic_ny]
time = 1100
name = "a glide develops between a stressed mid front vowel and intervocalic ɲ"
description = "Pope s407i — CORRECTION: also after ɛ, not just e"
definition = "∅ → j̃ / [aperture: mid, rounded: none, +syllabic, stress: !none] _ ɲ [+syllabic]"

[eof_second_nasalization_glide]
time = 950
name = "j nasalizes after a mid front vowel, before a nasal (second nasalization)"
description = "Pope s166.6, s434, s439, s441.2, s441.4 — 11th century; bleeds the later ei > oi shift; does not affect ie̯ (nasalized later, 13th c.)"
definition = "j → [+nasal] / [+front, aperture: !high, +syllabic] _ [+nasal, -syllabic]"

[eof_second_nasalization_vowel]
time = 950
name = "a mid front vowel nasalizes before a nasal (second nasalization)"
description = "Retimed 1100→950: nasalization before a nasal GLIDE/consonant coda (the -ain/-aim/-ein diphthongs: faim fãj̃n̪, saint sãj̃n̪t̪, main) is attested BY the OF-I checkpoint. The GENERAL before-nasal-consonant rule stays at 1100 (moving it over-nasalizes i/y/u before onset n — lune/une/fin). Minor: bleeds meners countertonic schwa (net-0 at final)."
definition = "[+front, aperture: !high, +syllabic] → [+nasal] / _ [+nasal, -syllabic]"

[eof_general_nasalization_before_nasal_consonant]
time = 1100
name = "any remaining vowel nasalizes before a nasal consonant (general nasalization)"
description = "Pope, DiaCLEF source line 2705: [+syl] > [+nas] / __ [+nas,+cons]. The earlier waves only reached low and mid-front vowels; this catches high i/u and back vowels before a nasal consonant (matin, pin, un), feeding the ĩ→ẽ→ɛ̃ lowering."
definition = "[+syllabic, nasal: none] → [+nasal] / _ [+nasal, +consonantal]"

[eof_unstressed_nasal_schwa_denasalizes]
time = 1100
name = "unstressed nasalized schwa denasalizes"
description = "Source line 2706 (rule 622): ə̃ > ə — handling of unstressed ə̃ as per Pope s434; the -ent schwa loses its nasality once the general nasalization has run."
definition = "ə̃^[stress: none] → ə"

[eof_uo_to_ue]
time = 1100
name = "the diphthong uo becomes ue"
description = "Pope s166.3, s226-7 — attested 1084 (Domesday Book); before the ei/ou mutations"
definition = "o̯ → e̯"

[eof_e_glide_loss_after_stressed_i]
time = 1100
name = "the e-glide deletes after a stressed high front tense vowel, before a high non-round glide"
definition = "e̯ → ∅ / [aperture: high, +front, advancement: atr, stress: primary, +syllabic] _ (j|[-syllabic, -consonantal, aperture: high, rounded: none])"

[eof_e_glide_loss_before_cons_yod]
time = 1100
name = "the e-glide deletes after a stressed high front tense vowel, before a +cons yod + consonant"
description = "Companion to the rule above for DiaSim source line 2174. When the following yod is Fortis's +cons glide j (rather than a -cons offglide), the original -consonantal context misses it. Restricting to a +ROUNDED high front nucleus (y, from the ue̯>ye̯ path of corium) with the +cons j itself before a consonant (cuir kye̯jr → kyjr → kɥir) matches cuir without touching the unrounded-nucleus diphthongs (cieux sie̯…) where the e̯ must survive."
definition = "e̯ → ∅ / [aperture: high, +front, +rounded, advancement: atr, stress: primary, +syllabic] _ [+consonantal, aperture: high, +front, rounded: none] [+consonantal]"

[eof_glide_loss_after_stressed_i_bare]
time = 1100
name = "a high non-round glide deletes after stressed i"
definition = "[-syllabic, -consonantal, aperture: high, rounded: none] → ∅ / ˈi _"

[eof_countertonic_o_opens_before_r_stop]
time = 1100
name = "secondary-stressed o opens to ɔ before r + an anterior non-labial stop + a vowel"
description = "CORRECTION (not tourtre < torturella)"
definition = "ˌo → ˌɔ / _ r [+anterior, labial: none, -continuant, nasal: none, trill: none] [+syllabic]"

[eof_final_m_dentalizes]
time = 1100
name = "final m dentalizes after a vowel"
description = "Pope s435 — accepted by the late 11th century"
definition = "m → n̪ / [-consonantal] _ #"

[eof_ng_to_n_before_nonvelar]
time = 1100
name = "ŋ simplifies to n before a non-velar segment"
description = "CORRECTION — Pope misses this, though her table's \"luns\" for OF longs implies it (attested: lons, sans, bans, blans)"
definition = "ŋ → n̪ / _ [back: none]"

[ofi_stressed_mid_unrounded_laxes_before_r_cons]
time = 1100
name = "a stressed mid unrounded vowel laxes and fronts before r + consonant"
description = "Pope s492-3 — CORRECTION: restricted to r (not l), broadened to include secondary-stressed e"
definition = "[stress: !none, aperture: mid, rounded: none, +syllabic] → [advancement: rtr, +front] / _ r [+consonantal]"

[ofi_e_laxes_before_consonant_vowel]
time = 1100
name = "stressed e laxes to ɛ before a consonant + vowel"
description = "Pope s575"
definition = "ˈe → ˈɛ / _ [+consonantal] [+syllabic]"

[ofi_length_reset]
time = 1100
name = "vowel length resets to short"
description = "the distinctive length from ew>øː, ae̯>eː, aj>ɛː is leveled"
definition = "[+syllabic] → [length: short]"

[ofi_lengthening_before_z_cons_syllabic_stressed]
time = 1100
name = "a stressed vowel lengthens before z + one consonant + a vowel"
definition = "[stress: !none, +syllabic] → [length: long] / _ z [+consonantal] [+syllabic]"

[ofi_z_loss_before_consonant]
time = 1100
name = "z is lost before a consonant (preconsonantal effacement)"
description = "Pope s166.10 — compensatory lengthening handled by the two rules above"
definition = "z → ∅ / _ [+consonantal]"

[ofi_o_to_e_before_ow_glide]
time = 1100
name = "stressed o becomes e before a high back round glide"
description = "Pope s166.4, s226-7 — ei > oi, ou > eu; she places this at the end of Early Old French"
definition = "ˈo → ˈe / _ [-syllabic, +back, aperture: high, +rounded]"

[ofi_e_backs_before_yod]
time = 1100
name = "a short tense front mid/high vowel backs and rounds before yod"
description = "Pope s226-7 — the ei of a diphthong (e + off-glide yod) backs to oi. The yod must be a tautosyllabic off-glide (before a consonant or #), not the onset of the next syllable — otherwise `le.ja…` (lien) wrongly backs its `le`."
definition = "[+front, advancement: atr, aperture: mid, +syllabic, length: short] → [+back, front: none, +rounded, +labial] / _ j"

[ofi_o_opens_before_stop_final_primary]
time = 1100
name = "primary-stressed o opens to ɔ before a pre-coda stop, word-finally"
description = "CORRECTION"
definition = "ˈo → ˈɔ / _ [-continuant, labial: none, nasal: none, trill: none] #"

[ofi_oj_lowers_before_r]
time = 1100
name = "j lowers to ɛ̯ before r, in a back round diphthong"
description = "Pope s520 — early oj(uj), ɔj > oɛ̯, ɔɛ̯ before r"
definition = "j → ɛ̯ / [+syllabic, +back, +rounded] _ r"

[ofi_ow_to_o_before_coronal_sonorant]
time = 1100
name = "ow simplifies to o before any coronal sonorant"
description = "CORRECTION — 'blocked and free' realization broadened to any coronal sonorant"
definition = ["ˌɔ w → ˌɔ / _ [+lingual, +sonorant]", "ˌo w → ˌɔ / _ [+lingual, +sonorant]", "ˈɔ w → ˈɔ / _ [+lingual, +sonorant]"]

[ofi_o_to_u]
time = 1100
name = "round tense back vowels raise to u (o > u, oi > ui)"
description = "Pope s166.2, s184 — 11th-12th centuries; bled by the earlier labial-context shift (s489) except before labials"
definition = "[+rounded, advancement: atr, +back] → [aperture: high]"

[ofi_oj_lowers_generally]
time = 1100
name = "the yod of a back-round diphthong lowers to ɛ̯ everywhere (oj/uj > oɛ̯/uɛ̯)"
description = "Pope s519-521 (DiaCLEF source line 2669: `j > ɛ̯ / [+syl,+back,+round] __`). The general counterpart of the earlier before-r rule: after ei>oi and the o>u raising, the yod of an oj/uj diphthong lowers to ɛ̯, feeding oɛ̯/uɛ̯ > wɛ > wa (trois, soie, ardoise)."
definition = "j → ɛ̯ / [+syllabic, +back, +rounded] _"

[ofi_glide_before_ny_lateral]
time = 1100
name = "a glide develops between a stressed mid front unrounded vowel and intervocalic ʎ"
description = "Pope s407i"
definition = "∅ → j / [aperture: mid, rounded: none, +syllabic, stress: !none] _ ʎ [+syllabic]"

[ofi_nasalized_e_lowers]
time = 1100
name = "nasalized front mid vowels begin to lower"
description = "Pope s166.6, s439 — 11th century, first lowering of nasalized e-varieties"
definition = "[+front, aperture: mid, +syllabic, +nasal] → [advancement: rtr]"

[ofi_nasal_e_to_a]
time = 1100
name = "nasalized front mid vowels become nasalized a"
description = "Pope s441.2, s447-8 — 11th-12th centuries; CORRECTION 2026: front vowels only. Source outputs [+lo,+tense]; here rtr so it renders as `a` and later backs to ɑ̃ (Fortis's ɑ letter is rtr, unlike DiaSim's tense ɑ)."
definition = "[+nasal, aperture: !high, +syllabic, +front] → [aperture: low, advancement: rtr] / _ (#|[+consonantal])"

[ofi_ny_lateral_loss_after_i]
time = 1100
name = "ʎ effaces between an i-variant and a consonant"
definition = "ʎ → ∅ / [+front, aperture: high, rounded: none, +syllabic] _ [+consonantal]"

[ofi_back_dark_l_to_w]
time = 1100
name = "back dark-l variants vocalize to w"
description = "Pope s385-390 — attested in rhymes by the mid 12th century"
definition = "[+lateral, +back] → w"

[ofi_ue_monophthongizes_to_o_slash]
time = 1100
name = "the stressed diphthong ye̯ (from ue̯) monophthongizes to ø"
description = "Pope s550-551 — attested 1137; stages ˈue̯ > ˈuø̯ > wˈø > ˈø, broadened since u had already fronted to y by this point"
definition = "[aperture: high, +rounded, advancement: atr, stress: primary, +syllabic] e̯ → ˈø"

[ofi_w_loss_after_high_round]
time = 1100
name = "w deletes immediately after a high round vowel (u or y)"
description = "CORRECTION 2026: also for the nasal variant"
definition = "[-syllabic, aperture: high, +back, +rounded] → ∅ / [+syllabic, aperture: high, +rounded] _"

[ofi_glide_between_e_and_w]
time = 1100
name = "a glide develops between a stressed or secondary-stressed lax front mid vowel and w"
description = "Pope s330, s388, s538-540 (bellitatem > beaute, a secondary-stressed case)"
definition = "∅ → a̯ / [aperture: mid, +front, advancement: rtr, stress: !none, +syllabic] _ w"

[ofi_nasalized_aj_to_ej]
time = 1100
name = "nasalized aj becomes ɛ̃j everywhere"
description = "Pope s466-467 — 12th century"
definition = "[aperture: low, +nasal] → [aperture: mid, advancement: rtr] / _ j̃"

[ofi_s_to_x_before_consonant]
time = 1100
name = "s becomes x after a vowel, before any consonant"
description = "Pope s378ii — attested by the 1300 Orthographica Gallica; Walloon wrote this as h; CORRECTION: extended to before all consonants (not just dentals), and to include sʲ"
definition = "(s|sʲ) → x / [-consonantal] _ [+consonantal]"

[ofi_diphthong_stress_shift]
time = 1100
name = "diphthongs shift their stress onto the second element (ie̯ > je, ɛa̯ > e̯a, yø̯ > ɥø)"
description = "Pope s544, s508-510, s470-472, s538, s555-556 — 12th century; the leveling started in the south and west"
definition = ["ˈi e̯ → j ˈe", "ˌɛ a̯ → e̯ ˌa", "ˈɛ a̯ → e̯ ˈa", "ˈy ø̯ → ɥ ˈø"]

[ofi_theta_edh_effacement]
time = 1100
name = "the interdental fricatives (plain and palatalized) efface"
description = "Pope s172a, s346-7, s372 — finalized mid-12th century, began dialectally in the north and east in the 9th; CORRECTION 2026: applies also to palatalized variants"
definition = "(θ|ð|θʲ|ðʲ) → ∅"

[ofi_ew_to_oew]
time = 1100
name = "ew becomes øw"
description = "Pope s541-545 — 12th century; fed by ie̯ > je, feeds øw > ø. The trigger is a high back round glide, spelled either w (from a consonantal source) or the semivowel u̯ (a diphthong off-glide, e.g. dieu jeu̯); match it by bundle, not the literal w."
definition = "[aperture: mid, advancement: atr, +syllabic] → [+rounded, +labial] / _ [aperture: high, +back, +rounded, syllabic: -]"

[ofi_oew_to_oe]
time = 1100
name = "øw becomes ø (the back-round glide is absorbed after ø)"
description = "Pope s541-545 (DiaCLEF line 2611): a high back round glide is lost after a rounded front non-high vowel — øw/øu̯ > ø, dieu jøu̯ > jø."
definition = "[aperture: high, +back, +rounded, syllabic: -] → ∅ / [+rounded, +front, aperture: !high, +syllabic] _"

[ofi_countertonic_a_to_e_before_front_round]
time = 1100
name = "secondary-stressed a raises to e before a front round vowel"
description = "Pope s421 — after the loss of the interdental fricatives; CORRECTION: also before ø (pavorem > pëor, 1176)"
definition = "ˌa → ˌe / _ [+front, +rounded]"

[ofi_countertonic_e_to_schwa_recurrence]
time = 1100
name = "secondary-stressed e reduces to schwa in an open syllable (recurrence)"
description = "Pope s166.5, s223, s234-235, s421 — CORRECTION: only sonorant consonants may intervene"
definition = "ˌe → ˌə / _ ([+consonantal, +sonorant])? [+syllabic]"

[ofi_rr_degemination]
time = 1100
name = "the geminate rr degeminates"
description = "CORRECTION — many centuries earlier than Pope states; accuracy improved by a full point after this change (barram > bar, karruːkam > charrue, karrum > char)"
definition = "r r → r"

[ofi_countertonic_e_to_e_before_continuant_vowel]
time = 1100
name = "secondary-stressed ɛ becomes e before r, z, or v, then a vowel"
description = "CORRECTION — restricted to r/z/v (not lateral or nasal); r is listed explicitly since Fortis's narrower continuant excludes the trill"
definition = "ˌɛ → ˌe / _ (r|[+continuant, lateral: none, nasal: none, +voice]) [+syllabic]"

[ofi_front_vowel_lengthens_before_s_schwa]
time = 1100
name = "a front unrounded vowel lengthens before s + final schwa"
description = "Source line 2727 (rule 625): [+front,-round,+syl] > [+long] / __ s ə # — Pope s570ii lengthening in aːsə/ɛːsə/iːsə endings, moved before the ts/s merger."
definition = "[+front, rounded: none, +syllabic] → [length: long] / _ s ə #"

[ofi_stressed_vowel_lengthens_before_final_s]
time = 1300
name = "a primary-stressed vowel lengthens before word-final s"
description = "Source line 2733 (rule 626): [+prim] > [+long] / __ s # — Pope s565-7, tonic vowel long before a pre-coda s but not a pre-coda ts (hence before deaffrication); feeds mf_long_a_backs (bas > bɑ)."
definition = "[stress: primary, +syllabic] → [length: long] / _ s #"

[ofi_deaffrication]
time = 1100
name = "all affricates become sibilants (deaffrication)"
description = "Pope s172b ~ s194 — before the end of the 13th century. Source [+delrel] > [+cont]: an affricate is a continuant contour (closure→release, `->+`), so collapsing it to plain [+continuant] turns every affricate into its fricative (t͡s→s, d͡ʒ→ʒ, …)."
definition = "[continuant: ->+] → [+continuant]"

[ofi_x_loss_compensatory_lengthening]
time = 1100
name = "preconsonantal x is lost after a vowel, which lengthens compensatorily"
description = "Source line 2772 (rule 633): [+syl] x > [+long] ∅ / __ [+cons] — Pope s172d ~ s375-379: the s→x reflex effaces before a consonant and the preceding vowel lengthens (pastam > paxtə > paːtə, feeding mf_long_a_backs: pâte /pɑt̪/)."
definition = "[+syllabic] x → [length: long] ∅ / _ [+consonantal]"

[ofi_x_loss]
time = 1100
name = "the velar fricative x is lost"
description = "Source `x > ∅` (DiaCLEF 2773) — general loss of the preconsonantal x (the s→x reflex, Walloon 'h'); the earlier x→k / x→∅/_# reflexes have already applied."
definition = "x → ∅"

# --- Old French II / Later Old French (Pope s16, end of 11th to 14th centuries) ---

[of2_degemination]
time = 1300
name = "geminates simplify to single consonants"
description = "By Old French, distinctive length is lost on consonants too (Pope s305, s618): every remaining geminate reduces to a single consonant — annum ann→an, abbatissa abb→ab, bella ell→el. Placed before the nasal-consonant/compensatory processing so a nn/mm feeds it as a single nasal."
definition = "1=[+consonantal] @1 → @1"

[of2_general_nasalization_recurrence]
time = 1300
name = "any remaining vowel nasalizes before a nasal consonant (recurrence)"
description = "Pope s434/s439 — the nasalization recurs (source lines 2758-9) to catch vowels that only came to sit before a nasal consonant after the OF-I diphthong/ending shifts: lien je + n̪, whose e formed post-nasalization."
definition = "[+syllabic, nasal: none] → [+nasal] / _ [+nasal, +consonantal]"

[of2_final_ny_to_n]
time = 1300
name = "final ɲ becomes n"
description = "Pope s435 — likely 13th century per rhymes, though \"ng\"/\"gn\" spellings persist till the 16th"
definition = "ɲ → n̪ / _ #"

[of2_stressless_schwa_desyllabifies_before_vowel]
time = 1300
name = "a stressless schwa desyllabifies before another vowel"
description = "Pope s268-9 — began 13th c., not accepted till the 16th; kept as an intermediate ə̯ stage, with lengthening/effacement realized in later rules"
definition = "ə → ə̯ / _ [-consonantal]"

[of2_schwa_desyllabifies_after_vowel]
time = 1300
name = "schwa desyllabifies after another vowel"
description = "Pope s270 — began 14th c., not accepted until the 16th; source notes the Cj-exclusion correction was never actually implemented"
definition = "ə → ə̯ / ([-consonantal]|j|w|ɥ) _"

[of2_nasalized_i_lowers_after_w]
time = 1300
name = "nasalized ĩ lowers after w"
description = "CORRECTION — bleeds the later denasalization of wĩ, which denasalizes to wɛ ultimately"
definition = "[+front, +nasal, +syllabic] → [aperture: mid] / w _"

[of2_nasalized_i_denasalizes_before_nasal_glide]
time = 1300
name = "nasalized high front ĩ denasalizes before a nasal consonant + glide"
description = "Pope s452 — before ĩ lowers, 15th century; ỹ (s440) and ɥ̃ĩ (s441.10) handled at the same time"
definition = "[+nasal, +front, aperture: high, +syllabic] → [nasal: none] / _ [+nasal, +consonantal] [-consonantal]"

[of2_i_tilde_lowers_to_e_tilde]
time = 1300
name = "nasalized ĩ lowers to ẽ"
description = "Pope s451 — 15th century (further to ɛ̃ not until the later 16th, per s452)"
definition = "[+nasal, +front, rounded: none, aperture: !low, +syllabic] → [aperture: mid]"

