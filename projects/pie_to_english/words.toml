# word, shown as the gloss (the verification target). *ħr̩tkʲos 'bear' is kept as a
# deliberate exception: the root left no English descendant (it was tabooed in Germanic),
# so its line shows what the bare sound laws produce on their own.
# Format: IPA = "Modern English target"

