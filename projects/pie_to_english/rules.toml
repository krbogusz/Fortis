# Wiktionary spells the second half of a Germanic diphthong both ways ‚ÄĒ *ainagaz as […Ďjn…Ď…£…Ďz]
# but *ai√ĺaz as […ĎiŐĮőł…Ďz] ‚ÄĒ and so does the engine, depending on whether the glide came from PIE
