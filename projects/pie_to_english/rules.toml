[pgmc_voiced_fricative_hardening]
time = 100
name = "ő≤, √į harden to b, d word-initially and after a nasal or l"
description = "*ő≤eő≤ruz > *beő≤ruz; *kal√įaz > *kaldaz; *…£ans keeps its initial fricative"
definition = [
    "ő≤ ‚Üí b / # _",
    "√įŐ† ‚Üí d / # _",
    "ő≤ ‚Üí b / [+cons, nasal: 1] _",
    "√įŐ† ‚Üí d / [+cons, nasal: 1] _",
    # *…£ hardens after a nasal like the other two ‚ÄĒ *luŇčgr…Ďz, *…ĎŇčg…Ēňźňź. It is only the WORD-INITIAL
    # position it stays out of (*…£ans), which is what the note above is about; the nasal context
