    # 'reward' (Kroonen: *mizdŇć(n)- f. <= *misd į-eh‚āā-) has a plain *d, not a *√į, and nothing else
    # in the cascade could have hardened it there.
    "√įŐ† ‚Üí d / z _",
    "√įŐ† ‚Üí d / l _",
]

# Proto-Germanic *a is the back vowel […Ď] ‚ÄĒ including the *a that laryngeal colouring made from
