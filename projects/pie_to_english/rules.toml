    "[+syll, -cons, aperture: mid, +front] ‚Üí e o / _ [+trill] [+cons]",
    "[+syll, -cons, aperture: mid, +front] ‚Üí e o / _ [+lat] [-son, +back]",
    "[+syll, -cons, aperture: low, +front] ‚Üí √¶ …Ď / _ x",
    "[+syll, -cons, aperture: mid, +front] ‚Üí e o / _ x",
    "[+syll, -cons, aperture: low, +front] ‚Üí √¶ …Ď / _ x ∑",
    "[+syll, -cons, aperture: mid, +front] ‚Üí e o / _ x ∑",
