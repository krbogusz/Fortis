[oe_unstressed_long_e_to_o]
time = 404
name = "Unstressed */ńď/ > */o/"
description = """The kinship suffix *-ńďr does not survive as such: PGmc *brŇć√ĺńďr, *mŇćdńďr, *dohtńďr,
*swestńďr all give an Old English *-or ‚ÄĒ brŇć√ĺor, mŇćdor, dohtor, sweostor. The vowel of an unstressed
syllable lowers and shortens, and *ńď lands on *o.

