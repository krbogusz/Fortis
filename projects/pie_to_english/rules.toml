description = """PGmc *Ňć […Ēňź] > OE Ňć [oňź] ‚ÄĒ that half is a raising, and it stands.

The front half goes the OTHER WAY. PGmc *ńď‚āĀ […õňź] does not raise to [eňź]; it LOWERS to OE «£ [√¶ňź],
and the gold says so without exception: *sńďdiz > OE s«£d, *dńďdiz > d«£d, *√ĺrńďduz > √ĺr«£d, *mńďkijaz
> m«£ńče. (Old English *ńď has a different source ‚ÄĒ the i-umlaut of *Ňć and of *ai ‚ÄĒ so raising *ńď‚āĀ
into it merged two vowels the language keeps apart.)"""
definition = [
    "[+syll, length: long, aperture: mid, +back, advancement: !atr] ‚Üí [advancement: atr]",
    # STRESSED only. An UNSTRESSED *ńď has its own fate ‚ÄĒ it lowers and shortens to *o in the
