name = "Unstressed */√¶/ > */e/"
description = """The brightened *√¶ does not survive unstressed. Ringe ¬ß5.3.2 (iii), arguing that
Proto-Germanic had *a before *r and not *e, notes in passing exactly what happens to it afterwards:

