[unstressed_e_to_i_except_before_r]
time = -1000
name = "Unstressed */e/ > */i/ except before */r/"
description = "Unstressed */e/ > */i/ except before */r/. Unstressed */ej/ contracts to */iňź/"
# `aperture: mid`, not `aperture: !high`. The change is unstressed *e > *i ‚ÄĒ a MID vowel raising
# one step. "Not high" also takes in the LOW front *a, which laryngeal colouring makes out of *e
# (*h‚āāe > *a, a FRONT low vowel until `Low a backs to …Ď` later on). So *h‚āāenh‚āāets was raising its
# second *a straight past *e to *i and coming out **anidz for the attested *anadz. An unstressed
# *a stays *a.
definition = [
    "[+syll, aperture: mid, +fr, length: short, stress: none] ‚Üí i // _ r",
    "[+syll, aperture: mid, +fr, length: short, stress: none]j ‚Üí iňź // _ r"
]

[unstressed_e_to_a_before_r]
time = -950
name = "Unstressed */e/ > */a/ before */r/"
description = """Ringe ¬ß5.3.2 (iii). The raising of unstressed *e to *i is blocked before *r ‚ÄĒ but
the *e does not simply stay. It LOWERS:

  "It is reasonable to infer from this pattern of evidence that unstressed *e was lowered to *a
   before *r already in PGmc."

His evidence is the daughters: Gothic and Old Norse have *a regularly, Old Saxon and Old High
German vary with *a common, and only Anglo-Frisian shows *e ‚ÄĒ which is precisely the area where
PGmc *a was fronted and appears as *e when unstressed. So the *e is the innovation and the *a the
inheritance, not the other way round.

Dated after `unstressed_e_to_i_except_before_r`, whose exception is what leaves the *e standing
for this rule to find: *√°nteros > *an√ĺeraz > *an√ĺaraz, *up√©r > *uber > *ubar, *nŐ•t√©r > *under >
*undar. Ringe cites *an√ĺaraz and *undar himself, and flags the alternative (*-eraz?, *under?) as
the thing this inference resolves."""
definition = "[+syll, aperture: mid, +fr, length: short, stress: none] ‚Üí …Ď / _ r"

[sievers_law]
time = -900
name = "Sievers' law: the *j suffix is *-ij- after a heavy syllable, *-j- after a light one"
description = """The weight of the preceding syllable decides whether the suffixal *j is preceded
by an *i, and Germanic redistributes the two REGARDLESS of which the PIE suffix had.

The 1sg of the weak verbs states it as a minimal pair, and the cascade had it exactly INVERTED ‚ÄĒ
it was faithfully passing through whichever suffix PIE happened to write:

    *sod√©yoh‚āā  (light stem *sat-)  ->  we derived *satijŇć   attested *satjŇć
    *s√©h‚āāgyoh‚āā (heavy stem *sŇćk-)  ->  we derived *sŇćkjŇć    attested *sŇćkijŇć

HEAVY is a long vowel plus a consonant (*sŇćk-), or any vowel plus TWO (*wurk-, *hauz-); LIGHT is a
short vowel plus exactly one (*sat-, *lag-, *straw-). Note the diphthong stems fall out of that
without a special case: *hauz- is *a + *w + *z, two consonants before the *j, and so heavy ‚ÄĒ while
*straw- is *a + *w, one consonant, and so light, exactly as attested.

Dated after `unstressed_e_to_i`, which is what makes the *i of the *-√©ye- suffix in the first
place; Sievers then takes it away again where the stem is light."""
definition = [
    # HEAVY, and so an *i appears: a long vowel + one consonant, or any vowel + two.
    "‚ąÖ ‚Üí i / [+syll, length: !short] [-syll] _ j",
    "‚ąÖ ‚Üí i / [+syll] [-syll] [-syll] _ j",
    # LIGHT, and so the *i goes: a short vowel + exactly one consonant.
    "i ‚Üí ‚ąÖ / [+syll, length: short] [-syll] _ j",
]

[unstressed_ji_to_i]
time = -1000
name = "Unstressed */ji/ > */i/"
description = "Unstressed */ji/ > */i/"
definition = [
    "[+syll, aperture: high, +fr, length: short, stress: none]j[+syll, aperture: high, +fr, length: short, stress: none]  ‚Üí iňź",
    "j[+syll, aperture: high, +fr, length: short, stress: none] ‚Üí i",

]

# `labial: none` matters as much as `rnd: none`, and leaving it off was the source of a whole
# class of silent bugs. A merge keeps every feature it does not mention. PIE *o is [+rounded,
# +labial]; this rule un-rounds it but said nothing about labial, so the *a it produced was the
# letter …Ď's bundle PLUS a stray `labial: 1`.
#
# That segment RENDERS as …Ď ‚ÄĒ the renderer falls back to the nearest letter and quietly drops the
# feature it cannot spell ‚ÄĒ but it is not the LETTER …Ď, and letter patterns match by identity. So
# every rule written `…Ď ‚Üí ‚Ä¶` looked straight through it. Anglo-Frisian brightening, OE breaking
# and the diphthong shift all fired on words whose …Ď came from the segmenter and silently skipped
# the ones whose …Ď came from *o, which print identically. Un-round the vowel completely and the
# two are the same segment again.
[mr_epenthesis]
time = -900
name = "A stop is epenthesised between */m/ and */r/"
description = """*amr√≥s > PGmc *ampraz. A nasal and a liquid do not stand together: an oral stop of
the nasal's own place is inserted between them, exactly as in *√ĺumraz > thumb.

t = -900, AFTER Grimm and Verner. The epenthetic *p is a NEW stop and must not be swept into the
chain shift: run it before, and Grimm makes it *…ł, Verner voices that to *ő≤, and the *ő≤ hardens to
*b after the nasal ‚ÄĒ *ampraz came out **ambraz."""
definition = "‚ąÖ ‚Üí p / m _ r"

[non_high_back_merger]
time = -1000
name = "Merging of non-high back vowels"
description = "Merging of non-high back vowels"
definition = "([+syll, aperture: !high, !fr, advancement: atr] |[+syll, aperture: !high, !fr, advancement: rtr]) ‚Üí [aperture: low, fr:none, +bk, advancement: rtr, rnd: none, labial: none]"

[final_m_to_n]
time = 0
name = "Word-final */m/ > */n/"
description = "Word-final */m/ > */n/"
definition = "m ‚Üí n / _#"

# NOT before /s/, though *ńßemsus > *ansuz makes it tempting: *ńßomsos is the attested *amsaz
# 'shoulder', which KEEPS its /ms/. One and the same cluster cannot both assimilate and not, so
# the /n/ of *ansuz is not a sound change operating on /ms/ ‚ÄĒ it belongs to its preform, and that
# is a question for PREFORM_FIXES. Adding /s/ here buys *ansuz and loses *amsaz, dead even, and
# leaves a rule the corpus contradicts. The stops only.
[m_to_n_before_t_d]
time = -1500
name = "*/m/ > */n/ before a dental stop, after an UNSTRESSED vowel"
description = """The gold gives a minimal pair, and it settles both the condition and the date:

    *ŠłĪmŐ•t√≥m   (oxytone)  > *hundńÖ   ‚ÄĒ the *mŐ• assimilates:  *m > *n
    *g ∑ŠłŅŐ•tis  (barytone) > *kum√ĺiz  ‚ÄĒ it does NOT:         *m stays

Same syllabic *mŐ•, same following dental, opposite outcomes. The only thing that differs is the
accent, and the assimilation happens where the *mŐ• is UNSTRESSED. (*mundiz, *mun√ĺaz and *kun√ĺaz
look like more assimilation but are not: their PIE forms have a syllabic *nŐ• to begin with ‚ÄĒ
*mnŐ•t√≠s, *mŇĄŐ•tos, *«ĶŇĄŐ•h‚āÉtos ‚ÄĒ so the *n is simply inherited and this rule never touches them.)

Dated -1500, which is forced: it must come AFTER `u_epenthesis` (-2000), which turns the syllabic
*mŐ• into *um and gives the rule a consonant to work on, and BEFORE `stress_change` (-1000), which
puts the accent on the first syllable of every word and so erases the very contrast the rule
reads. At the old date of 0 both vowels are stressed and the pair is indistinguishable ‚ÄĒ which is
why the rule fired on *kum√ĺiz and produced **kun√ĺiz.

The dentals are still plain *t and *d here: Grimm has not run yet."""
definition = "m ‚Üí n / [+syll, stress: none] _ (t | d)"

[final_n_loss]
time = 0
name = "Final /n/ loss"
description = "Word-final */n/ is lost after an unstressed NON-HIGH vowel, nasalising it: *-am > *-ńÖ, *-Ňćn > *-«≠. After a high vowel the /n/ stands: the numerals *tehun, *newun, *sebun all keep it, and without the aperture condition they come out **tehŇ©."
definition = "[+syll, stress: none, aperture: !high] n ‚Üí [+nas] ‚ąÖ / _#"

[lowering_of_nasal_long_e]
time = 0
name = "Lowering of nasal */ŠļĹňź/ to */…ĎŐÉňź/"
description = "Lowering of nasal */ŠļĹňź/ to */…ĎŐÉňź/"
definition = "[+syll, aperture: !high, +fr, length: long, nasal] ‚Üí [aperture: low, fr: none, +bk, advancement: rtr, rnd: none, labial: none]"

[schwa_elimination]
time = 0
name = "Elimination of */…ô/"
description = "Unstressed */…ô/ is lost between consonants; */…ô/ > */…Ď/ elsewhere"
definition = [
    "[+syll, aperture: none, stress: none] ‚Üí ‚ąÖ / _ [-syll]",
    "[+syll, aperture: none] ‚Üí …Ď"
]

[assimilation_of_sonorants]
time = 0
name = "Assimilation of sonorants"
description = "Assimilation of sonorants"
definition = [
    "1=n w ‚Üí @1 @1",     # nw > nn
    "1=l n ‚Üí @1 @1",     # ln > ll
    "z ‚Üí @1 / _ 1=m",    # zm > mm
    # ‚Ä¶and *√įl > *ll ‚ÄĒ but only after a SHORT vowel. A geminate cannot stand after a heavy
    # nucleus, and the gold says so directly: *sth‚āād įl√≥s has a short *a and gives *stallaz, while
    # *h‚āā√©yd įlom has the diphthong *ai and gives *ailńÖ with a SINGLE *l. Without the length
    # condition the diphthong word comes out **aillńÖ.
    "√įŐ† ‚Üí @1 / [+syll, length: short] _ 1=l",   # √įl > ll, after a SHORT vowel
    # After a heavy nucleus there is no room for the geminate, and the *√į simply goes:
    # *h‚āā√©yd įlom > *ailńÖ, with a single *l and no trace of the *√į.
    "√įŐ† ‚Üí ‚ąÖ / [+syll, length: !short] _ l",
    "őłŐ† ‚Üí ‚ąÖ / [+syll, length: !short] _ l",   # ‚Ä¶and the voiceless one too: *spŇć√ĺl«≠ > *spŇćl«≠
    # ‚Ä¶or after the glide half of a diphthong. Matched as the LETTERS *j and *w: in this feature
    # system a glide is [+cons] (it is a consonant that happens to be non-syllabic), so a
    # `[-syll, +son, -cons]` pattern ‚ÄĒ the obvious way to write "glide" ‚ÄĒ matches nothing at all.
    "√įŐ† ‚Üí ‚ąÖ / (j | w) _ l",
]

# The velar fricative drops out of a *-…£m- cluster after a sonorant: *drowg Īmos > *dr…Ďwm…Ďz
# 'dream', *rewg ĪmnŐ• > *r…Ďwm…Ďz 'ream'. Grimm has already turned *g Ī into …£ by here, so the rule
# is stated on the fricative, not on the aspirate. The [+son] context is what keeps it out of a
# word-initial cluster, where the …£ survives and a vowel is epenthesised instead
# (*g ≤ Īmoňź > *…£um…Ēňźňź 'gome', not **m…Ēňź).
[velar_fricative_loss_before_m]
time = 0
name = "*/…£/ is lost before */m/"
description = "*-…£m- > *-m- after a sonorant ‚ÄĒ *drowg Īmos > *dr…Ďwm…Ďz 'dream'"
definition = "…£ ‚Üí ‚ąÖ / [+son] _ m"

# Ringe ¬ß5.3.4 (iv), "Loss of word-final *t": PGmc *tehun has lost the final *-d of PIE *d√©ŠłĪmŐ•d,
# and he dates the loss of word-final CORONAL STOPS after the loss of word-final *-n.
#
# It has to reach the FRICATIVES too, not just the letter *t. By the time this fires, Grimm has
# already turned PIE *t into *√ĺ and Verner may have voiced that to *√į ‚ÄĒ so *m√©lit arrives here as
# *mili√įŐ†, and a rule looking for a *t walks straight past it. (The *t of *tehun is a different
# animal: it comes from PIE *d, which Grimm hardens INTO a stop, so that one the rule always saw.)
# Both are the same coronal, and both are lost: PGmc *mili has no final consonant at all.
[final_t_loss]
time = 0
name = "Final coronal obstruent loss"
description = "Ringe ¬ß5.3.4(iv) ‚ÄĒ *d√©ŠłĪmŐ•d > *tehun, *m√©lit > *mili"
definition = [
    "[+syll, stress:none][-syll]*t ‚Üí [+syll, stress:none][-syll]*‚ąÖ / _# ",
    "[+syll, stress:none][-syll]*őłŐ† ‚Üí [+syll, stress:none][-syll]*‚ąÖ / _# ",
    "[+syll, stress:none][-syll]*√įŐ† ‚Üí [+syll, stress:none][-syll]*‚ąÖ / _# ",
]

[gw_to_w]
time = 0
name = "*/g ∑/ > */w/"
description = "*/g ∑/ > */w/"
definition = "g ∑ ‚Üí w"

# The same exit, for the FRICATIVE labiovelar that Grimm's first clause makes out of *g ∑ Ī. It had
# none, so *snojg ∑ Īos kept it to the end and came out **sn…Ďj…£ ∑…Ďz for the attested *sn…Ďjw…Ďz.
# PIE *g ∑ Ī splits by position in Proto-Germanic: after a nasal it is the stop (*luŇčgr…Ďz), and
# everywhere else it is *w. The nasal clause simply delabialises it and lets the voiced-fricative
# hardening below turn the plain *…£ into the *g the attested form shows.
[gwh_to_w]
time = 0
name = "*/…£ ∑/ > */b/ word-initially, */g/ after a nasal, */w/ elsewhere"
description = """*snojg ∑ Īos > *sn…Ďjw…Ďz 'snow'; *leng ∑ Īros > *luŇčgr…Ďz 'lungs'.

Ringe ¬ß5.3.3: "In word-initial position PIE *g ∑ į became PGmc *b, except when it had already been
delabialized by a following *u", and his examples are exactly ours ‚ÄĒ *g ∑ į√©d įyeti > *bidi√ĺi,
*g ∑ įen-/*g ∑ įon- > *ban√ī, *banjŇć. The path is *g ∑ į > *…£ ∑ (Grimm) > *b, so the clause has to come
before the *…£ ∑ > *w that follows it.

Wiktionary's *g ∑ į√≥rmos > *warmaz looks like a counterexample and is not one: Ringe REJECTS that
etymology outright, in the footnote to this very passage ‚ÄĒ "I connect PGmc *warmaz 'warm' with
Hitt. warnuzzi, not with Av. gar…ômŇć". So *warmaz is a bad etymon in the source, not a bad rule
here, and the source hierarchy (Ringe > Wiktionary) says the rule wins. Its miss is a preform
problem and is recorded as one."""
definition = [
    "…£ ∑ ‚Üí b / # _",
    "…£ ∑ ‚Üí …£ / [+cons, nasal: 1] _",
    "…£ ∑ ‚Üí w",
]

[long_a_raising]
time = 0
name = "Long /…Ď/ raising"
description = "*/…Ďňź/ > */…Ēňź/ "
definition = "[aperture: low, fr:none, +bk, advancement: rtr, !length: short] ‚Üí [aperture: mid, rnd]"

[early_i_mutation]
time = 0
name = "Early i-mutation"
description = "*/e/ > */i/ before */i j/ in the same or next syllable; also eliminates */ei/ > */iňź/"
# Short *e only. Long *ńď‚āĀ does not raise here ‚ÄĒ *d įeh‚āĀt√≠s gives *dńďdiz, not **dńędiz ‚ÄĒ so the
# target carries [length: short]; without it the laryngeal-lengthened *ńď of deed/stead raised.
definition = [
    "[+syll, -cons, +front, aperture: mid, length: short] ‚Üí [aperture: high] / _ [-syll]* [aperture: high, +front]",   # e > i / _ (C) {i,j}
    "[+syll, aperture: high, +front] [+syll, aperture: high, +front] ‚Üí [length: long] ‚ąÖ",            # ii > iňź
    # ‚Ä¶and *ij > *iňź, which is what actually delivers the */ei/ > */iňź/ the description promises.
    # Clause 1 raises the *e of *dejw√≥s to *i, but the second half of the old diphthong is the
    # GLIDE *j, and the clause above only contracts two SYLLABIC vowels ‚ÄĒ so it never fired and
    # *dejw√≥s came out **tijw…Ďz for the attested *tiňźw…Ďz (likewise *hliňź√į…Ēňź, *hriňź√įr…ĒŐÉňź).
    # The `_ ([-syll]|#)` context is what saves *frijaz 'free': there the *j is PREVOCALIC, the
    # onset of the next syllable rather than the tail of a diphthong, and it must survive.
    "[+syll, aperture: high, +front] [aperture: high, +front, -syll] ‚Üí [length: long] ‚ąÖ / _ ([-syll]|#)",
]

