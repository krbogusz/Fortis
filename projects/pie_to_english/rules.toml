definition = "1=[+cons, -syll, trill: none] j ‚Üí @1 @1 / [+syll, length: short] _"

[oe_parasite_vowel]
time = 466
name = "Parasite vowel: an epenthetic *e breaks a final consonant + liquid"
description = """Minkova ¬ß4.4 (svarabhakti). Once apocope has stripped the ending, a word can be
left with a consonant + liquid in the coda, and Old English will not have it ‚ÄĒ an *e is inserted:

    *wedrńÖ  > *wedr  > OE weder        *bebruz  > *befr > OE befer
    *fingraz > *fingr > OE finger      *akraz   > *√¶cr  > OE √¶cer

Dated 466, after EVERY rule that can strip a final vowel ‚ÄĒ not just `wg_final_apocope` (450) but
`oe_high_vowel_deletion` (460) as well. At 450 the u-stems still HAVE their ending: *bebruz is
*befru, its *fr is not yet final, and the rule cannot see it. The a-stems were already bare, so
*wibraz > wifer worked and hid the bug; *bebruz, *swegrŇć came out **befr, **swejr."""
# THE VOWEL HARMONISES with the one before it, and the gold is unanimous about which is which:
#
#     back  -> *o :  *sundr > sundor,  *ńĀtr > ńĀtor,  *hleo√ĺr > hlńďo√ĺor,  *ńĀfr > ńĀfor
#     front -> *e :  *wedr  > weder,   *√¶cr > √¶cer,  *hafr   > hafer,    *bebr > befer
#
# So the back clause has to come first; with only an *e the eight back-vowel words all come out
# with a spurious front vowel. It looks back to the NEAREST vowel across however many consonants
# stand between: *sundr is u-n-d-r, and a single-consonant environment cannot reach its *u.
#
# Before *l the preceding segment must be an OBSTRUENT. Written `[-syll]` it also matches the
# first half of a GEMINATE ‚ÄĒ *fullaz > *full and *stallaz > *stall are l+l, and the rule split them
# into **fulel and **stalel. A geminate is one long consonant, not a cluster that needs breaking.
definition = [
    "‚ąÖ ‚Üí o / [+syll, +back] [-syll]* [-syll] _ r #",
    "‚ąÖ ‚Üí e / [-syll] _ r #",
    "‚ąÖ ‚Üí o / [+syll, +back] [-syll]* [-son] _ l #",
    "‚ąÖ ‚Üí e / [-son] _ l #",
]

[oe_palatalisation]
time = 410
name = "Velars palatalise before a front vowel; sk becomes  É"
description = "Minkova ¬ß4.3 ‚ÄĒ ńčinn > chin, heńčń° > hedge, fisńč > fish. NOTE: this currently costs one exact match, but the fault is upstream, not here ‚ÄĒ cost and kind reach it with a front vowel they should not have (OE cost has back /o/; we derive ke.owst), so the rule correctly palatalises a vowel that an earlier rule got wrong. Kept because it is a real change and its damage localises the upstream bug."
# Ringe & Taylor, *The Development of Old English* ¬ß4: palatalisation happens in FOUR
# environments, not one. We had only the first ‚ÄĒ a velar before a front vowel ‚ÄĒ and were missing
# the one that fires on a PRECEDING front vowel:
#
#   (4) "preconsonantal and word-final *g were palatalized by any preceding front vowel,
#        but word-final *k was palatalized only by a preceding *i or *ńę, and it cannot be
#        demonstrated that preconsonantal *k was palatalized at all."
#
# That clause is what gives *ainag > «£niń° (ňą√¶ňźnij), *wagnaz > w√¶ń°n (ňąw√¶jn) and *magraz > m√¶ń°er
# (ňąm√¶jer) their /j/ ‚ÄĒ a *g with no vowel after it at all, which a "before a front vowel" rule can
# never reach. Note *k gets no preconsonantal clause: Ringe says it cannot be shown to happen.
#
# (`wg_g_hardening` was moved to 405, ahead of this rule, for the same reason: at 430 the PGmc *…£
# was still a fricative when palatalisation looked, so no *g existed for it to find.)
definition = [
    "s k ‚Üí  É ‚ąÖ",
    "k ‚Üí tÕ° É / _ [+syll, +front]",
    "g ‚Üí j / _ [+syll, +front]",
    "g ‚Üí j / [+syll, +front] _ #",
    "g ‚Üí j / [+syll, +front] _ [-syll]",
    "k ‚Üí tÕ° É / [+syll, aperture: high, +front] _ #",
]

