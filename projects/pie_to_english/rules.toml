# The three Proto-Germanic diphthongs reach Old English, and NOTHING was carrying them there:
# *ai, *au and *eu were surviving to the 900 checkpoint untouched, so *hailaz came out **hajl for
# the attested hńĀl, *dau√ĺuz **d…Ďwőł for dńďa√ĺ, *bewzńÖ **beowr for bńďor. This was the single largest
# hole in the cascade ‚ÄĒ the 200‚Üí900 rules were breaking 110 words that were already exact at
# Proto-Germanic, and these three account for a good share of them.
#
#   *ai > ńĀ   (Gmc *stain-, *haim-, *aigan- > OE stńĀn, hńĀm, ńĀgan)
#   *au > ńďa
#   *eu > ńďo
#
# The DATE is Minkova's, and it is the whole point of the rule (¬ß6.5.2): the monophthongisation
# of *ai is "held to have occurred AFTER the fronting of /aňź/ to /√¶ňź/" ‚ÄĒ so the long vowel it
# makes must come out the far side of the fronting still BACK. That is why Old English has a low
# back ńĀ at all, and why stńĀn is not **st√¶n.
#
# Which puts it at 480, BEFORE `oe_a_fronting` (500) rather than after ‚ÄĒ because that rule is the
# short-a brightening (a > √¶), not the long-ńĀ fronting Minkova is ordering against, and letters
# match by identity here, so it cannot touch the long …Ďňź this rule produces. Dated 520 instead,
# the rule simply never fires: the brightening has already turned the *…Ď of *…Ďj into *√¶ and there
# is no *…Ďj left to match. Same relative chronology, read off the right rule.
# It must also stay before `oe_breaking` (550), which would otherwise take the *eu of *bewzńÖ for
# a plain /e/ and break it a second time.
[oe_diphthong_shift]
time = 404
name = "The Proto-Germanic diphthongs: *ai > ńĀ, *au > ńďa, *eu > ńďo"
description = "Minkova ¬ß6.5.2 ‚ÄĒ Gmc *stain- > OE stńĀn; *dau√ĺuz > dńďa√ĺ; *bewzńÖ > bńďor"
# Stated on FEATURES, not on the letter …Ď. Letter patterns match by identity here, and the /…Ď/
# these diphthongs carry is not always the letter ‚ÄĒ *…Ďjn…Ď…£…Ďz has one the segmenter read straight
# from the input, while *ojtos got its own from `non_high_back_merger`, a feature merge. Written
# `…Ď j` the rule fired on *hailaz and silently passed over *ai√ĺaz, which looks identical on the
# page. The low back vowel is what the change is about, so that is what the rule asks for.
definition = [
