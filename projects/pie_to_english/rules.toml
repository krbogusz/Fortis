# `oe_a_restoration` and un-fronts the *√¶ as well ‚ÄĒ f√¶der came out **fador, and w√¶ter with it.
#
# The OE *o is ROUNDED (labial + rounded, advancement: atr). Say only "back and mid" and the merge
# lands on * Ć instead, which is a real letter and renders perfectly happily ‚ÄĒ brŇć√ĺor came out
# **brŇć√ĺ Ćr.
definition = [
    "[+syll, -cons, aperture: mid, +front, length: long, stress: none] ‚Üí [aperture: mid, +back, front: none, length: short, +rounded, +labial, advancement: atr] / [+syll, length: !short] [-syll] _",
    "[+syll, -cons, aperture: mid, +front, length: long, stress: none] ‚Üí [aperture: mid, +back, front: none, length: short, +rounded, +labial, advancement: atr] / [-syll] [-syll] _",
