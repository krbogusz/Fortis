# word holds another PLAIN labial, on either side of it:
#   *p√©nk ∑e   > *p√©mpe  > *fimf   (five)   ‚ÄĒ trigger *p, before
#   *w√ļlk ∑os  > *w√ļlpos > *wulfaz (wolf)   ‚ÄĒ trigger *w, before
#   *k ∑etwŠĻďr            > *fedwŇćr (four)   ‚ÄĒ trigger *w, AFTER (see the note in `description`)
# Without it these would be **finhw, **wulhwaz ‚ÄĒ the regular /x ∑/ Grimm's Law gives, which is
