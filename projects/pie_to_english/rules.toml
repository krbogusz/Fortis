[pgmc_long_mid_lowering]
time = 170
name = "The long mid vowels are open in Proto-Germanic: oňź > …Ēňź, eňź > …õňź"
description = "PGmc *Ňć = […Ēňź], *ńď = […õňź] ‚ÄĒ *brŇć√ĺńďr is [br…Ēňźőł…õňźr]"
definition = "[+syll, length: long, aperture: mid, advancement: atr] ‚Üí [advancement: rtr]"

