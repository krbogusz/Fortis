time = 300
name = "Short i lowers to e before a non-high vowel (West Germanic)"
description = "*nistaz > OE nest, but *fiskaz > OE fisc keeps its i; blocked before j (*midjaz)"
# The intervening span excludes high segments, which is what actually blocks /j/: written
# [-syll, lateral: none]* the wildcard simply skips over the j of *midjaz and lowers it.
#
# Blocked before a syllable-final NASAL, the other standard exception. *lent√©h‚āā raises its *e to
# *i before the coda *n (`e_to_i_before_syllable_final_nasal`, t=-900) and this rule then lowered
# it straight back, handing **lend…Ēňź to a gold that reads *lind…Ēňź. A nasal coda protects the /i/;
# it is the same environment that created it, and the two must not fight. *nisd√≥s is untouched ‚ÄĒ
# its /i/ stands before an /s/, not a nasal ‚ÄĒ so *nestaz still lowers as before.
# And only the STRESSED vowel. a-umlaut is a root-vowel change; an unstressed medial /i/ is not
