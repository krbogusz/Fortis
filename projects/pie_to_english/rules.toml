# clause raised all three to **dńďd, **sńďd, **hńďs.
# FRONT IS NOT ENOUGH ‚ÄĒ the result is ADVANCED as well, exactly as oe_a_fronting already says. The
# front vowels come in pairs on this axis (√¶ low front atr vs a low front, e mid front atr vs …õ
# mid front rtr), and a rule that moves only the lingual node lands on the wrong member of each:
# *haisiz came out **hńĀs for h«£s, and *banjŇć **benn with an …õ for the e of benn, stede, here, mere.
definition = [
