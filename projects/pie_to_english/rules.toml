# RP is non-rhotic: /r/ is lost in the coda, leaving a lengthened or centring vowel (¬І5.2).
# The initial velar fricative weakens to /h/ вАФ OE hƒБm, heorte are [x-] in the engine's
# transcription but [h-] from Middle English on (Minkova ¬І5.1, the h-histories).
[me_x_to_h]
time = 1300
name = "Initial x weakens to h"
description = "Minkova ¬І5.1 вАФ hƒБm, heorte, hƒБl"
definition = "x вЖТ h / # _"

# RP is non-rhotic: /r/ is lost in the CODA, and the vowel before it lengthens to compensate вАФ
# arm /…СЋРm/, four /f…ФЋР/ (Minkova ¬І5.2). The generalisation is the syllable position, so it is
# written with the syllable boundary `$` rather than by enumerating the environments it shows
# up in (before a consonant, before a word edge) вАФ the form re-syllabifies before every rule,
# so `$` always reflects current structure. "In the coda" is `_ [-syll]* $`, not `_ $`: in arm
# and corn the /r/ sits inside the coda with a consonant after it, so it is not adjacent to the
# boundary. An onset /r/ (red, arrow) is untouched, the boundary falling before it, not after.
[pde_r_loss]
time = 1750
name = "Coda r is lost with compensatory lengthening (non-rhotic RP)"
description = "Minkova ¬І5.2 вАФ arm /…СЋРm/, four /f…ФЋР/"
definition = [
    "[+syll] вЖТ [length: long] / _ r [-syll]* $",
    "r вЖТ вИЕ / _ [-syll]* $",
]

# Germanic raises short *e to *i before a nasal in the CODA вАФ *femf > *fimf, *wenda > *winda
# (Minkova ¬І3.4). Stated with `$`, like the existing e_to_i_before_syllable_final_nasal, which
# says the same thing but fires at t=0 вАФ too late for the *pempe > *fimf path above, where the
# raising has to precede the Germanic consonant changes.
[pgmc_e_raising_before_coda_nasal]
time = -900
name = "e raises to i before a syllable-final nasal"
description = "Minkova ¬І3.4 вАФ *femf > *fimf. Coda position is `[-syll]* $`, not `$`: in *femf the nasal is in the coda but a fricative stands between it and the boundary."
definition = "[+syll, aperture: mid, +front, length: short] вЖТ [aperture: high] / _ [+cons, nasal: 1] [-syll]* $"

# TODO вАФ West Germanic gemination (Minkova ¬І3.4): a consonant doubles before *j (*hagj≈Н >
# heƒЛƒ°, *satjanƒЕ > settan). Tried as a bare "C вЖТ CC / _ j" and it LOST an exact match: the
