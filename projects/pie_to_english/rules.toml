    # rule and give **feő≤lńÖ for wheel, which is the control this rule is supposed to leave alone.
    "x ∑ ‚Üí …ł / _ []* [+labial, lingual: none, -syll, nasal: none]",
    "x ∑ ‚Üí …ł / _ []* [+labial, +sonorant, -syll, nasal: none]",
