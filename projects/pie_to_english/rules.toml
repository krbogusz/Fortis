# It must run BEFORE i-mutation (t=420): the front vowels i-mutation creates do NOT trigger
# palatalisation, which is exactly why OE cynd keeps its /k/ ‚ÄĒ its /y/ is younger than the
# change. Ordered after i-mutation instead, the rule turns cynd into **tÕ° Éynd and loses ground.
[wg_gemination]
time = 430
name = "West Germanic gemination: a consonant doubles before *j"
description = """Minkova ¬ß4.2. A single consonant after a SHORT vowel is doubled by a following
*j, which is then absorbed:

    *badjńÖ  > OE bedd     *kunjńÖ  > cynn     *midjaz > midd
    *wadjńÖ  > wedd        *ribjńÖ  > ribb     *banjŇć  > benn

