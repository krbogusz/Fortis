# Proto-Germanic's overlong (trimoric) vowels are gone by Old English вАФ they fall in with the
# ordinary long ones.
#
# Dated 250, not 120: the rule's own comment says "by Old English", but 120 is before the
# PROTO-GERMANIC checkpoint at 200, so it was shortening the vowels a stage before anyone looked.
# The overlong is not an artefact вАФ it is what Proto-Germanic has, and the gold transcribes it:
# *ar…ФЋРЋР, *a≈Лg…ФЋРЋР, *aus…ФЋРЋР, *uxs…ФЋРЋР, *nam…ФЋРЋР all end in a trimoric vowel. We built it correctly in
# `overlong_vowels` and then threw it away unread, missing the whole n-stem class by one mora.
[oe_overlong_shortening]
time = 465
name = "Overlong vowels become long"
definition = "[+syll, length: overlong] вЖТ [length: long]"

# A voiced obstruent devoices before a voiceless one: *nezt > nest.
[wg_obstruent_devoicing]
time = 50
name = "A voiced obstruent devoices before a voiceless one"
definition = "[-son, +voice] вЖТ [-voice] / _ [-son, -voice]"

# Homorganic-cluster lengthening (Minkova ¬І6.4): a vowel lengthens before a sonorant + voiced
# homorganic stop вАФ ld, nd, mb, rd, rn вАФ which is why CHILD has a long vowel and CHILDREN, with
# a third consonant, does not. It feeds the a-rounding below (eald > ald > ƒБld > ≈Нld > old).
[oe_homorganic_lengthening]
time = 1050
name = "Vowel lengthens before a homorganic sonorant + voiced stop"
description = "Minkova ¬І6.4 вАФ CHILD-CHILDREN, HOUND; *ald > ƒБld, *kind > kƒЂnd"
definition = "[+syll, length: short] вЖТ [length: long] / _ [+son, -syll, +cons] [-son, +voice, -cont] $"

# Middle English short o is open […Ф] вАФ fox /f…Фks/, corn /k…Фrn/, yoke /j…Фk/ (¬І7.3).
[me_short_o_opening]
time = 1150
name = "Short o opens to …Ф"
description = "Minkova ¬І7.3 вАФ the ME short-vowel qualities"
definition = "[+syll, length: short, aperture: mid, +back, +rounded] вЖТ [advancement: rtr]"

# Palatalisation and affrication of the velars (Minkova ¬І4.3): before a front vowel /k/ becomes
# /tЌ° Г/ and /g/ becomes /j/ вАФ ƒЛinn 'chin', ƒ°eard 'yard' вАФ and /sk/ becomes / Г/ everywhere
# (fisƒЛ 'fish', sƒЛearu 'share'). It runs after Anglo-Frisian brightening, whose new /√¶/ is one
# of the front vowels that triggers it.
#
# It must run BEFORE i-mutation (t=420): the front vowels i-mutation creates do NOT trigger
# palatalisation, which is exactly why OE cynd keeps its /k/ вАФ its /y/ is younger than the
# change. Ordered after i-mutation instead, the rule turns cynd into **tЌ° Гynd and loses ground.
[oe_palatalisation]
time = 410
name = "Velars palatalise before a front vowel; sk becomes  Г"
description = "Minkova ¬І4.3 вАФ ƒЛinn > chin, heƒЛƒ° > hedge, fisƒЛ > fish. NOTE: this currently costs one exact match, but the fault is upstream, not here вАФ cost and kind reach it with a front vowel they should not have (OE cost has back /o/; we derive ke.owst), so the rule correctly palatalises a vowel that an earlier rule got wrong. Kept because it is a real change and its damage localises the upstream bug."
# Ringe & Taylor, *The Development of Old English* ¬І4: palatalisation happens in FOUR
# environments, not one. We had only the first вАФ a velar before a front vowel вАФ and were missing
# the one that fires on a PRECEDING front vowel:
#
#   (4) "preconsonantal and word-final *g were palatalized by any preceding front vowel,
#        but word-final *k was palatalized only by a preceding *i or *ƒЂ, and it cannot be
#        demonstrated that preconsonantal *k was palatalized at all."
#
# That clause is what gives *ainag > «£niƒ° (ЋИ√¶ЋРnij), *wagnaz > w√¶ƒ°n (ЋИw√¶jn) and *magraz > m√¶ƒ°er
# (ЋИm√¶jer) their /j/ вАФ a *g with no vowel after it at all, which a "before a front vowel" rule can
# never reach. Note *k gets no preconsonantal clause: Ringe says it cannot be shown to happen.
#
# (`wg_g_hardening` was moved to 405, ahead of this rule, for the same reason: at 430 the PGmc *…£
# was still a fricative when palatalisation looked, so no *g existed for it to find.)
definition = [
    "s k вЖТ  Г вИЕ",
    "k вЖТ tЌ° Г / _ [+syll, +front]",
    "g вЖТ j / _ [+syll, +front]",
    "g вЖТ j / [+syll, +front] _ #",
    "g вЖТ j / [+syll, +front] _ [-syll]",
    "k вЖТ tЌ° Г / [+syll, aperture: high, +front] _ #",
]

# *√∞ hardens to *d after a nasal already in Proto-Germanic вАФ *mundiz, not *mun√∞iz. (The general
# West Germanic √∞ > d is later, at t=260.)
[pgmc_dh_hardening_after_nasal]
time = 100
name = "√∞ becomes d after a nasal"
description = "*mun√∞iz > *mundiz"
definition = "√∞ћ† вЖТ d / [+cons, nasal: 1] _"

# The bouk√≥los rule: a labiovelar loses its labialisation beside a rounded vowel вАФ *g Ј≈Нws >
# *k≈Нz 'cow', where a *k Ј would be left with nothing to round against.
# TODO вАФ the bouk√≥los rule (a labiovelar delabialises next to a rounded vowel): *g Ј≈Нws > *k≈Нz
# 'cow'. Written as "next to ANY rounded vowel" it is too broad: it fixes cow but breaks quick
# (*g ЈihвВГw√≥s > *k Јik Јaz), whose second labiovelar stands next to the rounded *hвВГ and wrongly
# delabialises вАФ a net loss of one exact match. The real rule is restricted to *u and *w, so it
# needs that narrower environment (and it must be ordered BEFORE the back-vowel merger, which
# unrounds *≈Н to *…СЋР and leaves nothing to trigger on).

# A nasal takes the place of a following velar: *jungaz, not *jungaz with a plain /n/.
[pgmc_nasal_velar_assimilation]
time = -880
name = "n becomes ≈Л before a velar"
description = "*junk√≥s > *jungaz вАФ the ≈Л of young, long, sing"
definition = "n вЖТ ≈Л / _ [+cons, -son, +back, front: none]"

# …£ hardens to g after a nasal already in Proto-Germanic вАФ *jungaz, not *jun…£az. (The general
# West Germanic …£ > g is later, at t=430.)
[pgmc_g_hardening_after_nasal]
time = 100
name = "…£ becomes g after a nasal"
description = "*jun…£az > *jungaz"
definition = "…£ вЖТ g / [+cons, nasal: 1] _"

# The Proto-Germanic voiced fricatives *ќ≤ √∞ …£ (from Grimm's third series and from Verner) are
# realised as the STOPS b, d, g word-initially and after a homorganic nasal вАФ and, for *√∞, after
# /l/ too: *kaldaz, *mundiz. Elsewhere they stay fricatives, which is why the attested forms show
# *beќ≤ruz, *l…С…£uz, *…£ar√∞az. Note *…£ does NOT harden initially (*…£ans 'goose'), so it is not listed.
[pgmc_voiced_fricative_hardening]
time = 100
name = "ќ≤, √∞ harden to b, d word-initially and after a nasal or l"
description = "*ќ≤eќ≤ruz > *beќ≤ruz; *kal√∞az > *kaldaz; *…£ans keeps its initial fricative"
definition = [
    "ќ≤ вЖТ b / # _",
    "√∞ћ† вЖТ d / # _",
    "ќ≤ вЖТ b / [+cons, nasal: 1] _",
    "√∞ћ† вЖТ d / [+cons, nasal: 1] _",
    # *…£ hardens after a nasal like the other two вАФ *lu≈Лgr…Сz, *…С≈Лg…ФЋРЋР. It is only the WORD-INITIAL
    # position it stays out of (*…£ans), which is what the note above is about; the nasal context
    # was left off with it by oversight.
    "…£ вЖТ g / [+cons, nasal: 1] _",
    # вА¶and after *z. The stop allophone of *√∞ appears after *l, *n AND *z вАФ the attested *mizd≈Н
    # 'reward' (Kroonen: *mizd≈Н(n)- f. <= *misd ∞-ehвВВ-) has a plain *d, not a *√∞, and nothing else
    # in the cascade could have hardened it there.
    "√∞ћ† вЖТ d / z _",
    "√∞ћ† вЖТ d / l _",
]

# Proto-Germanic *a is the back vowel […С] вАФ including the *a that laryngeal colouring made from
# *e (*hвВВ√©rmos > *armaz). Without this the root keeps a front [a] while the endings already have
# […С], and every hвВВ-coloured word misses by one phone.
[pgmc_a_backing]
time = 0
name = "Low a backs to …С"
description = "*armaz, *akraz, *an√Њeraz вАФ PGmc *a is […С]"
definition = "a вЖТ …С"

# Grimm's Law leaves the aspiration of the voiceless series on the new fricatives: *m√≥g ∞tis
# surfaces as *m…Сx ∞tiz with a stray / ∞/. The Germanic obstruents are plain, so neutralise it.
[pgmc_deaspiration]
time = 10
name = "The obstruents lose their aspiration"
description = "*m…Сx ∞tiz > *m…Сxtiz"
definition = "[-son, glottal_aperture: spread] вЖТ [glottal_aperture: neutral]"

# Two identical short vowels left in hiatus by laryngeal loss collapse into one вАФ *hвВВyuHnћ•бЄ±√≥s
# loses its laryngeal between the root /u/ and the /u/ epenthesised into *nћ•, and the *uu that
# results is a single /u/ in the attested *jungaz. (The long+short case is `vowel_contraction`.)
[pgmc_identical_vowel_hiatus]
time = -1900
name = "Identical short vowels in hiatus merge"
description = "*juu≈Лk√≥s > *jungaz"
definition = "1=[+syll, -cons, length: short] @1 вЖТ вИЕ @1"

# A glide is inserted to break the hiatus left by laryngeal loss: *priH√≥s > *frijaz, not
# **friaz. Germanic fills a i_V gap with /j/.
[pgmc_j_epenthesis]
time = -1850
name = "j is inserted between i and a following vowel"
description = "*priH√≥s > *frijaz"
definition = "вИЕ вЖТ j / [+syll, aperture: high, +front] _ [+syll]"

# A post-vocalic glide is the offglide of a diphthong, not a consonant: *H√≥ytos > *ai√Њaz is
# […СiћѓќЄ…Сz], and *hвВВ√©y«µs > *aiks is […Сiћѓks] вАФ written with a non-syllabic vowel, not with /j/.
# Wiktionary spells the second half of a Germanic diphthong both ways вАФ *ainagaz as […Сjn…С…£…Сz]
# but *ai√Њaz as […СiћѓќЄ…Сz] вАФ and so does the engine, depending on whether the glide came from PIE
# *y or from a vowel left in hiatus. Neither is a phonological difference, so both sides are
# normalised to /j/: the gold by CONVENTIONS, the derivation by this rule.
[pgmc_diphthong_offglide]
time = 150
name = "The offglide of a diphthong is written j"
description = "*…СiћѓќЄ…Сz and *…Сjn…С…£…Сz are the same diphthong, spelt two ways in the source"
definition = "iћѓ вЖТ j / [+syll] _"

# Germanic a-umlaut, the /i/ half only: short *i lowers to *e before a non-high vowel in the
# next syllable вАФ *nisd√≥s > *nestaz. Blocked before /j/, which is why *midjaz keeps its /i/.
#
# Only the /i/ half, and only at this date. The parallel lowering of *u (wg_a_umlaut, t=350) is
# a later and much less regular change: run at Proto-Germanic date it lowers *wulfaz to **wolfaz
# and a dozen others, costing 12 exact matches. The two halves are not one rule.
# RE-DATED out of Proto-Germanic (was 50, now 300 вАФ West Germanic), and renamed with it.
#
# Kroonen's Proto-Germanic 'nest' is *nista-, with an /i/ вАФ not the *nestƒЕ our Wiktionary gold
# gives вАФ and his *fiska- (<= *pisk-o-, cf. Lat. piscis) has one too. Ringe's bibliography cites
# Lloyd, "Is there an a-umlaut of i in Germanic?" So the lowering is doubtful AT Proto-Germanic,
# and the 200 gold has been corrected to *nistƒЕ accordingly (ATTESTED_FIXES in build_gold.py).
#
# But the change is REAL, just later: Old English has nest with an /e/ while fisc keeps its /i/,
# and those are ATTESTATIONS, not reconstructions вАФ there is no arguing with them. So the rule
# moves rather than goes. At 200 the /i/ now survives (*nistƒЕ, *wissaz); by 900 it has lowered
# where Old English says it lowered.
#
# The condition stays as irregular as the facts are. *nistaz lowers and *fiskaz does not, on the
# same shape (i + cluster + a); what separates them here is the aperture of the intervening
# consonants, which is a description of the split rather than an explanation of it. Ringe's
# bibliography suggests the field has not explained it either.
[pgmc_i_lowering]
time = 300
name = "Short i lowers to e before a non-high vowel (West Germanic)"
description = "*nistaz > OE nest, but *fiskaz > OE fisc keeps its i; blocked before j (*midjaz)"
# The intervening span excludes high segments, which is what actually blocks /j/: written
# [-syll, lateral: none]* the wildcard simply skips over the j of *midjaz and lowers it.
#
# Blocked before a syllable-final NASAL, the other standard exception. *lent√©hвВВ raises its *e to
# *i before the coda *n (`e_to_i_before_syllable_final_nasal`, t=-900) and this rule then lowered
# it straight back, handing **lend…ФЋР to a gold that reads *lind…ФЋР. A nasal coda protects the /i/;
# it is the same environment that created it, and the two must not fight. *nisd√≥s is untouched вАФ
# its /i/ stands before an /s/, not a nasal вАФ so *nestaz still lowers as before.
# And only the STRESSED vowel. a-umlaut is a root-vowel change; an unstressed medial /i/ is not
# in its reach. *hвВВoбЄ±√©tehвВВ raises its medial *e to *i (unstressed_e_to_i, t=-1000) and this rule
# then lowered it straight back again, giving **…С…£eќЄћ†…ФЋР for the attested *…С…£iќЄћ†…ФЋР. The /i/ of
# *nisd√≥s is the ROOT vowel and still lowers to the *nest…СћГ the gold wants вАФ nothing is lost.
definition = "[+syll, aperture: high, +front, length: short, stress: primary] вЖТ [aperture: mid] / _ [-syll, lateral: none, aperture: !high]* [+syll, aperture: !high] // _ [+nas]$"
