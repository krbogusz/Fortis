name = "FACE: /…õňź/ diphthongises to /e…™/"
description = """ME nńĀme, bńĀne, ńĀcre, hńĀven reach /…õňź/ in the Great Vowel Shift and RP has the FACE
diphthong: /ne…™m/, /be…™n/, /e…™k…ô/, /he…™v…ôn/.

