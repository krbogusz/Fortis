# Palatalisation and affrication of the velars (Minkova ¬ß4.3): before a front vowel /k/ becomes
# /tÕ° É/ and /g/ becomes /j/ ‚ÄĒ ńčinn 'chin', ń°eard 'yard' ‚ÄĒ and /sk/ becomes / É/ everywhere
# (fisńč 'fish', sńčearu 'share'). It runs after Anglo-Frisian brightening, whose new /√¶/ is one
# of the front vowels that triggers it.
