    "[+syll, -cons, aperture: low, +back] w ‚Üí [+front, back: none, advancement: atr] …Ďňź",
    "[+syll, -cons, aperture: mid, +front] w ‚Üí [+syll] oňź",
]

# Old English breaking: a front vowel diphthongises before /r/ or /l/ + consonant, and before
# /x/ ‚ÄĒ *arm > earm, *ald > eald, *hert > heorte, *dau√ĺ > dńďa√ĺ (Minkova ¬ß6, the OE diphthongs).
[oe_breaking]
time = 408
name = "Breaking: front vowels diphthongise before r/l + C and before x"
description = "√¶ > √¶…Ď, e > eo ‚ÄĒ the source of OE's eald, earm, heorte"
# On features again ‚ÄĒ the √¶ that `oe_a_fronting` now makes is a merged bundle, not the letter,
# so a letter-matching `√¶ ‚Üí √¶…Ď` looked straight past *k√¶ld and *…£√¶rd. Third rule with the same
# defect; they were all written when most of these vowels still arrived as letters.
# The vowel is matched on FEATURES but the result is written as LETTERS: a one-to-two expansion
# has to take the replacement path, because a bundle merge across unequal counts is ambiguous and
# the rule simply never fires. So the left side asks for a front vowel (however it was made) and
