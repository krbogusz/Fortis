# Laryngeal colouring, in one rule per direction via conditionals. The context is the
# laryngeal natural class ‚ÄĒ a guttural [+cons, advancement: rtr] (= *h‚āĀ Ōá, *h‚āā ńß, *h‚āÉ  Ā ∑ here).
# Two conditional labels then pick the colour from the laryngeal's own quality:
# label 1 fires next to an [aperture: low] guttural (*h‚āā ńß) and lowers *e to *a; label 2 fires
# next to a [+rounded] guttural (*h‚āÉ  Ā ∑) and backs/rounds *e to *o. *h‚āĀ (Ōá) is neither
# [aperture: low] nor [+rounded], so neither label fires and *e is left alone ‚ÄĒ its neutrality
# falls out. A merge result keeps a stressed /e/'s stress; the target *e is the mid
# front vowel [+syll, -cons, +front, aperture: mid]: -cons excludes syllabic consonants
# (rŐ©, lŐ©, ‚Ä¶) and aperture: mid picks out mid *e (not high *i or low *a).
# Two rules, not one: the notation can't put the laryngeal on "either" side at once.
[laryngeal_colouring_after]
time = -2000
name = "Laryngeal colouring after a laryngeal"
description = "*h‚āāe > *h‚āāa, *h‚āÉe > *h‚āÉo (h‚āĀ leaves e)"
definition = "[+syll, -cons, +front, aperture: mid] ‚Üí [<1: aperture: low>, <1: advancement: rtr>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / [+cons, advancement: rtr, <1: aperture: low>, <2: +rounded>] _"

[laryngeal_colouring_before]
time = -2000
name = "Laryngeal colouring before a laryngeal"
description = "*eh‚āā > *ah‚āā, *eh‚āÉ > *oh‚āÉ"
definition = "[+syll, -cons, +front, aperture: mid] ‚Üí [<1: aperture: low>, <1: advancement: rtr>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / _ [+cons, advancement: rtr, <1: aperture: low>, <2: +rounded>]"

[centumization]
time = -2000
name = "Centumization"
description = "Merging of PIE 'palatovelar' and 'velar' plosives"
definition = "[+cons, -sonorant, +back, +front] ‚Üí [front: none]"

[sr_to_str]
time = -2000
name = "Word-initial */sr/ > */str/"
description = """Ringe ¬ß5.2.2 (iii): PIE "*sr-, which became PGmc *str-". A *t is epenthesised
between the *s and the *r ‚ÄĒ *sr√≥wmos > *straumaz 'stream', *srŐ•- > *sturkaz 'stork'.

Dated at -2000 and placed BEFORE `u_epenthesis`, which is the whole trick: *sturkaz comes from
*srŐ•- with a SYLLABIC rhotic, and u_epenthesis turns that *rŐ• into *ur at this same time. Run the
epenthesis first and there is no *sr- left for this rule to see ‚ÄĒ the form is already *sur-.

Grimm then leaves the new *t alone: it stands after *s, where Grimm's first clause is blocked, and
the attested *str- has a plain *t."""
# Two clauses because the rhotic comes in two segments: the consonant *r and the SYLLABIC *rŐ•,
# which is a nucleus and a different letter. *srŐ•- is exactly the shape of *sturkaz.
definition = [
    "‚ąÖ ‚Üí t / # s _ r",
    "‚ąÖ ‚Üí t / # s _ [+trill, +syll]",
]

[u_epenthesis]
time = -2000
name = "'u' epenthesis"
description = "Epenthesis of /u/ before the syllabic sonorants"
# `+son`: the epenthesis is for the syllabic SONORANTS (*lŐ• rŐ• mŐ• nŐ• > ul ur um un). A syllabic
# LARYNGEAL is also [+cons, +syll] and was being caught by it ‚ÄĒ but a laryngeal does not take an
# epenthetic *u, it vocalises to *…ô (`laryngeal_vocalization`). Written without the restriction,
# Kroonen's *nŐ•h‚āā-s-eh‚āā- came out **unsŇć.
definition = "‚ąÖ [+cons, +syll, +son] ‚Üí u [-syll]"

# A dental stop + epenthetic s + dental stop collapses to ss (*TsT > ss): the dental
# stops ([+cons,-continuant,+anterior,-sonorant], i.e. t/d) become s, the span
# shrinking 3‚Üí2. The result is letters (replacement path) so the lengths may differ.
# The bare *TT cluster does the same thing and needs its own clause: Wiktionary writes the
# epenthetic *s only sometimes, so *widt√≥s, *sedt√≥s and *k ∑Ōádtos arrive with the two dentals
# simply adjacent, and the 3‚Üí2 clause above cannot see them. Without it Grimm's third clause
# turns the *d into a *t and the words end in **wettaz, **settaz, **hwattaz for the attested
# *wissaz, *sessaz, *hwassaz. This is the dental half of Prim√§rber√ľhrung; the velar half (a
# stop before *t going to a fricative) is the clause added to Grimm's law below.
[dental_cluster]
time = -2000
name = "Dental cluster simplification"
description = "*TsT, *TT > ss ‚ÄĒ *wid-t√≥s > *wiss√≥s 'certain', *sedt√≥s > *sessaz"
definition = [
    "[+cons, -continuant, +anterior, -sonorant] s [+cons, -continuant, +anterior, -sonorant] ‚Üí s s",
    "[+cons, -continuant, +anterior, -sonorant] [+cons, -continuant, +anterior, -sonorant] ‚Üí s s",
]

# A geminate is one consonant doubled, so match it as `1=[+cons] @1` (capture, then
# the same consonant again) ‚ÄĒ not `[+cons]{2}`, which is any two consonants AND whose
# single quantified element can't pair with the two-element result. The first copy
# stays ([+cons] is a no-op merge), the second is deleted (‚ąÖ); counts match, 2:2.
#
# Dated AFTER the laryngeals resolve (-1900, not -2000), because the rule asks whether a
# CONSONANT precedes the geminate and a laryngeal is not yet the thing it will be. In *k ∑Ōádtos
# the *Ōá still looks like a consonant, so the *ss the dental cluster has just made was being
# shortened away ‚ÄĒ **x ∑…Ďz…Ďz for the attested *x ∑…Ďss…Ďz. But that *Ōá vocalises to a VOWEL, and a
# short vowel is exactly the environment where a geminate is kept. Let the laryngeals settle
# first and the question answers itself.
[geminate_shortening]
time = -1900
name = "Geminate shortening"
description = "A geminate shortens after a consonant or a long vowel"
definition = "1=[+cons] @1 ‚Üí [+cons] ‚ąÖ / ([+cons]|[length: long]) _"

[overlong_vowels]
time = -2000
name = "Overlong vowels creation"
description = "Word-final long vowels are lengthened to 'overlong' vowels"
definition = "[length: long]# ‚Üí [length: overlong]"

# The *ts > *s rule is `ts_simplification`, at the END of this file. It was long thought to be
# unstateable ‚ÄĒ *fŇćts and *wrŇćts keep the cluster that *wńęsaz and *swńďsaz lose ‚ÄĒ and the answer is
# that the environment is completed by what FOLLOWS: word-final in the first pair, before a vowel
# in the second.

[loss_of_initial_laryngeals]
time = -2000
name = "Loss of initial laryngeals"
description = "Word-initial laryngeals are lost before a consonant"
definition = "#[+cons, advancement: rtr][+cons] ‚Üí ‚ąÖ[+cons]"

[cowgills_law]
time = -2000
name = "Cowgill's law"
description = "*/h‚āÉ/ (and possibly */h‚āā/) is strengthened to */g/ between a sonorant and */w/"
# `[+syll]`, not `[+son]`. Ringe states the environment as "between a sonorant and *w (in that
# order)" ‚ÄĒ but BOTH of his examples have that sonorant as a NUCLEUS: *nŐ•h‚āÉw√© (a syllabic *nŐ•) and
# *g ∑ih‚āÉw√≥s 'alive' (a vowel *i) > *kwikw√≥s > PGmc *kwikwaz. Read as any sonorant, the law also
# fires after a consonantal *l ‚ÄĒ and *g įelh‚āÉwos then comes out **gelkwaz against an attested
# *gelwaz with a plain *w. Kroonen keeps the laryngeal in the root (*g įelh‚āÉ- 'yellow'), so the
# preform is not the problem; the environment is. Post-vocalic, as the examples have it.
definition = " Ā ∑ ‚Üí g / [+syll] _ w"

# Post-vocalic loss runs *before* pre-vocalic loss so that an intervocalic laryngeal
# lengthens its preceding vowel (VHV > VňźV) instead of being deleted pre-vocalically.
# Only a laryngeal with no preceding vowel (#HV, CHV) then falls through to the
# pre-vocalic rule.
# Laryngeal loss WITHOUT lengthening comes first ‚ÄĒ before the post-vocalic loss below, which
# lengthens the vowel it follows. Order matters and the gold settles it:
#   * between two vowels the laryngeal simply drops, leaving a diphthong: *k√©h‚āāilos > *hailaz,
#     not the long vowel **hńĀlaz that the lengthening rule would give;
#   * before a resonant it drops too, and the vowel stays SHORT: *suHn√ļs > *sunuz, *h‚āāyuHnŐ•ŠłĪ√≥s
#     > *jungaz ‚ÄĒ both attested with a short /u/.
# Run the other way round (the file's original order), the lengthening rule takes these first
# and the loss never sees them.
[w_gemination_before_laryngeal]
time = -2000
name = "A laryngeal after */w/ geminates it"
description = """*d į√≥wh‚āāom > PGmc *dawwńÖ 'dew', *lowH√©h‚āā > *lawwŇć. The laryngeal does not vocalise
and does not simply drop ‚ÄĒ it is absorbed into the *w, which comes out long. The Germanic *ww of
these words has no other source.

t = -2000, and placed ahead of the laryngeal-loss rules at the same time: they run first and there
is nothing left for this one to absorb."""
definition = "[+cons, advancement: rtr] ‚Üí w / w _"

[loss_of_laryngeals_before_vowels]
time = -2000
name = "Loss of laryngeals before a vowel or a resonant, without lengthening"
description = "*h‚āĀ√©sti > *√©sti > *isti; *k√©h‚āāilos > *hailaz; *suHn√ļs > *sunuz"
definition = [
    "[+cons, advancement: rtr] [+syll, -cons] ‚Üí ‚ąÖ [+syll, -cons]",
    # Before a resonant the laryngeal drops WITHOUT lengthening ‚ÄĒ but only after an UNSTRESSED
    # vowel. Stress is what separates the two outcomes: barytone *d į√≥h‚āĀmos lengthens its stressed
    # root vowel (> *dŇćmaz), while oxytone *suHn√ļs and *h‚āāyuHnŐ•ŠłĪ√≥s have the laryngeal in a pretonic
    # syllable and stay short (> *sunuz, *jungaz). Without the stress condition, doom comes out
    # **damaz. The second clause repeats it for a SYLLABIC resonant (*nŐ• is [+syll, +cons], so it
    # matches neither the vowel clause above nor the consonant clause here).
    "[+cons, advancement: rtr] ‚Üí ‚ąÖ / [+syll, stress: none] _ [+syll, +cons]",
]

# SPORADIC. Ringe ¬ß5.3.1 is explicit that losing the laryngeal WITHOUT lengthening is the
# exception, not the rule:
#
#   "Usually the laryngeal was lost with compensatory lengthening of the preceding vowel:
#    PIE *priHt√≥s > PGmc *frńędaz ... PIE *t√ļh‚āā > PGmc *√ĺŇę ...
#    Occasionally, however, the laryngeal is simply lost WITHOUT lengthening of the vowel:
#    PIE *wih‚āĀr√≥s >! PGmc *wiraz;  PIE *suh‚āÉn√ļs >! PGmc *sunuz;  PIE *luH- in PGmc *lunaz"
#
# The `!` is his own mark for a step that is not regular sound change, and he says why it is
# LEXICAL rather than phonological: "the short vowels of 'son' and 'ransom' reappear in other
# derivatives of the same roots in various languages". It is a property of these words.
#
# So the cascade lengthens, and this rule is scoped to the handful that do not ‚ÄĒ which is exactly
# what `words` is for. What stood here before was a STRESS condition on the general rule, fitted
# to make *sunuz and *weraz land; it cost *glńďmaz, *hŇęnaz, *mńďraz and *dŇęnaz, all four of which
# have a real (specified) laryngeal and lengthen precisely as Ringe says they should. It even
# drove a note in PREFORM_FIXES calling *hŇęnaz an honest miss "whose long *Ňę the corpus flatly
# contradicts" ‚ÄĒ reasoning from the exceptions to condemn the rule.
#
# t = -2000, NOT earlier: `syllable_parts` is time-keyed, and a rule dated before the first
# nucleus definition is syllabified against nothing ‚ÄĒ which strands the stress autoseg and
# silently unstresses every word in the lexicon.
[lex_laryngeal_lost_without_lengthening]
time = -2000
name = "SPORADIC: the laryngeal is lost without lengthening (a lexical handful ‚ÄĒ Ringe)"
words = ["son", "weraz", "lunaz", "ell", "young", "youth"]
definition = "[+cons, advancement: rtr] ‚Üí ‚ąÖ / [+syll] _ [+son, +cons]"

[loss_of_laryngeals_after_vowels]
time = -2000
name = "Loss of laryngeals after vowels"
description = "Laryngeals are lost after vowels but lengthen the preceding vowel"
definition = "[+syll, -cons] [+cons, advancement: rtr] ‚Üí [+syll, -cons, length: long] ‚ąÖ"

# The long vowel left by post-vocalic laryngeal loss then absorbs a following short
# vowel in hiatus: Vňź V > VŐā. The overlong takes the long first vowel's quality (the
# merge keeps it, and any stress); the short second vowel is deleted. The first must
# be [length: long], so only laryngeal-lengthened hiatus contracts ‚ÄĒ *-oHom (> *oňźom)
# > *-√īm; *-eh‚āāes (> *aňźas) > *-√Ęs.
[vowel_contraction]
time = -2000
name = "Vowel contraction in hiatus"
description = "A long vowel absorbs a following short vowel into an overlong ‚ÄĒ *-oHom > *-√īm"
definition = "[+syll, -cons, length: long] [+syll, -cons] ‚Üí [length: overlong] ‚ąÖ"

# A laryngeal after a STOP that already has a vowel before it does not vocalise either ‚ÄĒ it
# ASPIRATES the stop and disappears: *d Īugńßteňźr > *d Īug Īteňźr. The vowel is what makes the
# difference. In *d Īugńßteňźr the /u/ is the nucleus, so the laryngeal cannot be one; in *kńßponeńß
# the word-initial /k/ has no vowel to lean on and the laryngeal must vocalise (> *x…Ďő≤…Ďn…Ēňź), so
# the context demands the preceding vowel rather than firing on any stop.
# Sanskrit spells the aspirate out: *d Īugńßteňźr is duhitńĀŐĀ, with the -h- straight from the *g Ī.
# Without this, the laryngeal became a schwa, the schwa fed Verner's Law, and the *t voiced ‚ÄĒ
# **duk√įŐ†eňźr for the attested *duxt…õňźr. The same hole as the sonorant clause below, one manner up.
[laryngeal_aspiration]
time = -2000
name = "A laryngeal aspirates a preceding stop"
description = "*d Īugńßteňźr > *d Īug Īteňźr > *duxt…õňźr 'daughter' ‚ÄĒ the *g Ī is Sanskrit duhitńĀŐĀ's -h-"
# `tension: slack` as well as `glottal_aperture: spread`, because the aspirate PIE actually has is
# the BREATHY one. The two diacritics are not the same segment: ` į` is `1 glap` (plain aspiration)
# and ` Ī` is `+vc, 1 glap, -1 tns` (breathy voice ‚ÄĒ spread glottis AND slack tension). Setting only
# the glottal aperture made a *g* that was spread but not slack, which spells `g į`, not the `g Ī`
# the lexicon writes. It worked only by luck: Grimm's first clause matches on FEATURES
# ([+voice, glottal_aperture: spread]) and caught it anyway ‚ÄĒ but any rule written against the
# letter+diacritic `g Ī` would have looked straight through it, exactly as with the `…Ď` that was
# still labial. Make the segment the thing it is supposed to be.
definition = "[-son, -cont] [+cons, advancement: rtr] ‚Üí [glottal_aperture: spread, tension: slack] ‚ąÖ / [+syll] _"

# A laryngeal between a sonorant CONSONANT and an obstruent is LOST, not vocalised. If it
# vocalised, its schwa would be an unaccented vowel standing before the obstruent ‚ÄĒ which feeds
# Verner's Law and voices it. *«Ķ√©nh‚āĀtis would then give **kin√įiz, but the attested Proto-Germanic
# is *kin√ĺiz, with a voiceless √ĺ: the /t/ is still protected by the root accent, which means no
# vowel ever intervened. The loss is written as the first clause of the same rule so that it is
# ordered before the general vocalisation.
[laryngeal_vocalization]
time = -2000
name = "Vocalisation of remaining laryngeals (with loss between a resonant and an obstruent)"
description = "*«Ķ√©nh‚āĀtis > *ken√ĺis (no schwa, so Verner cannot fire) > *kin√ĺiz"
definition = [
    # The `[+syll]` at the front is what keeps the loss out of a word-initial cluster, and it is
    # the same condition the aspiration rule above turns on: a laryngeal only declines to be a
    # nucleus when the syllable already HAS one. *«Ķ√©nh‚āĀtis has its *e, so the laryngeal goes.
    # *mh‚āāŠłĪr√≥s does not ‚ÄĒ the *m is word-initial ‚ÄĒ and dropping the laryngeal there left **mxr…Ďz,
    # a word with no vowel in it at all, for the attested *m…Ď…£r…Ďz. With no vowel to lean on the
    # laryngeal must vocalise, which is what the last clause then does.
    "[+cons, advancement: rtr] ‚Üí ‚ąÖ / [+syll] [+son, -syll, +cons] _ [-son]",
    # ...and after a SYLLABIC resonant too: *«ĶnŐ•h‚āÉt√≥s has its laryngeal between *nŐ• and *t. If it
    # vocalises there, the schwa feeds Verner and the *t voices ‚ÄĒ but the attested *kun√ĺaz has a
    # voiceless *√ĺ. Same hole that gave **kin√įiz for kind.
    "[+cons, advancement: rtr] ‚Üí ‚ąÖ / [+syll, +cons] _ [-son]",
    "[+cons, advancement: rtr] ‚Üí …ô",
]

# A laryngeal before a resonant is lost WITHOUT lengthening the vowel: *suHn√ļs > *sunuz and
# *h‚āāyuHnŐ•ŠłĪ√≥s > *jungaz both have a SHORT /u/ in the attested Proto-Germanic, so the general
# "loss after a vowel", which lengthens, must not reach them.

[velar_labialization]
time = -2000
name = "Velar labialization"
description = "Velars are labialised by following */w/, which is deleted"
definition = "[+bk, aperture: high] w ‚Üí [+rounded] ‚ąÖ "

[labiovelar_delabialization]
time = -2000
name = "Labiovelar delabialization"
description = "Labiovelars are delabialised next to */u/ (or */un/) or before */t/"
definition = "[+bk, aperture: high, +rnd, -son] ‚Üí [labial: none] / _ (u|t)"

[final_non_high_short_vowel_loss]
time = -1000
name = "Word-final non-high short vowel loss"
description = "Word-final non-high short vowels are lost, along with preceding /j/ or /w/ (single syllables not affected)"
definition = [
    "[+syll] ‚Üí [stress: primary] / _ [-syll]* [+syll, stress: primary, -cons, aperture: !high, length: short] #",
    "j?w?[+syll, -cons, aperture: !high, length: short] ‚Üí ‚ąÖ / [+syll] []* _ #"
]

# KLUGE'S LAW. Kroonen ¬ß2.2.5.2: "voiced *b, *d and *g were geminated to *bb, *dd and *gg by the
# assimilation of a following *n IN A STRESSED SYLLABLE. These geminates were then devoiced to
# *pp, *tt and *kk together with old Proto-Indo-European *b, *d, *g during STAGE 2 of Grimm's
# law." His worked example is one of ours: "*budmo, gen. *buttaz m. 'bottom' < *b įud į-men, gen.
# *b įud į-n-√≥s".
#
# Two things fix its date, and both point here ‚ÄĒ immediately BEFORE Grimm:
#   * it must precede Grimm's FIRST clause, or the *d į of *b įud įn√≥s is already a fricative *√į and
#     there is no stop left to geminate;
#   * it must precede Grimm's THIRD clause, which is what devoices the *dd it makes to the *tt the
#     attested *buttaz shows. Kroonen says so outright ("during stage 2 of Grimm's law").
#
# The geminate is a PLAIN voiced stop, which is why the aspirates are written out to plain b/d/g
# here rather than recalled with @1: recalled, they would keep their breathiness, Grimm's first
# clause would turn both halves into fricatives, and the word would come out **bu√į√įaz.
#
# "In a stressed syllable" is the accent condition, and it is what the `/ _ [+syll, stress:
# primary]` context says: the *n must belong to the stressed syllable, i.e. stand before its vowel.
[kluges_law]
time = -1100
name = "Kluge's law: a voiced stop geminates before a stressed *n"
description = """Kroonen ¬ß2.2.5.2 ‚ÄĒ *b įud įn√≥s > *buddos > (Grimm) *buttaz 'bottom'.

The stop must be preceded by a VOWEL, and that is not decoration. Kluge's law assimilates a
SUFFIXAL *n to a ROOT-FINAL stop (*b įud į-n√≥s), and a root-final stop always has the root's vowel
before it. Without that condition the rule also fires on a word-initial onset cluster, where the
*n is part of the root and no suffix is in sight: *«Ķn√©wom came out as **kkewńÖ, geminating a *«Ķ
that begins the word, against an attested *knewńÖ 'knee' whose *kn is intact."""
definition = [
    "b Ī n ‚Üí b b / [+syll] _ [+syll, stress: primary]",
    "d Ī n ‚Üí d d / [+syll] _ [+syll, stress: primary]",
    "g Ī n ‚Üí g g / [+syll] _ [+syll, stress: primary]",
    "b n ‚Üí b b / [+syll] _ [+syll, stress: primary]",
    "d n ‚Üí d d / [+syll] _ [+syll, stress: primary]",
    "g n ‚Üí g g / [+syll] _ [+syll, stress: primary]",
]

[deaspiration_before_s]
time = -1010
name = "A voiced aspirate deaspirates before */s/"
description = """A PIE obstruent cluster agrees in voicing and aspiration with its LAST member, so
*b į before *s is simply *b: *w√≥b įseh‚āā 'wasp' has *bs, not *b įs.

The pay-off is in Grimm's ordering. Deaspirated, the *b is no longer input to clause 1 (aspirates ‚Üí
fricatives) and falls to clause 3 (plain voiced stops ‚Üí voiceless stops), which runs LAST precisely
so that its output is not fricativised in turn ‚ÄĒ the same protection that gives *h‚āā√©y«Ķs > *aiks and
not **aixs. Result: *wapsŇć, with the attested STOP.

Without it the *b į becomes *ő≤, West Germanic devoices it, and the word comes out **wafsŇć."""
definition = "[-son, -cont, +voice, glottal_aperture: spread] ‚Üí [glottal_aperture: neutral, tension: neutral] / _ s"

[s_to_m_before_m]
time = -1010
name = "*/sm/ > */mm/"
description = """*h‚āĀ√©smi 'I am' > PGmc *immi (Goth. im, OE eom) ‚ÄĒ Ringe cites the pair. The *s
assimilates completely to the following nasal.

AFTER A VOWEL only. Word-initial *sm- is a perfectly good onset and stays: without the condition
*sm√©ldoh‚āā came out **mmeltŇć."""
definition = "s ‚Üí m / [+syll] _ m"

[dl_simplification]
time = -1100
name = "Word-initial */dl/ loses its stop"
description = """*dl√≥ng įos > PGmc *langaz. A word-initial stop + *l is not a licit onset in
Germanic and the stop simply goes; the cascade otherwise carried it through Grimm and produced
**tlangaz, with an onset no attested Germanic word has."""
definition = "d ‚Üí ‚ąÖ / # _ l"

[grimms_law]
time = -1000
name = "Grimm's law"
description = "The chain shift of the three plosive series. The order of the clauses is not free, and the gold settles it: the ASPIRATES must go to fricatives first, so that *m√≥g įtis has an obstruent /…£/ standing before its *t (which therefore does not fricativise) and devoices to the attested *m…Ďxtiz. The PLAIN voiced stops must go last, so that the /k/ *h‚āā√©y«Ķs makes out of *«Ķ is not fricativised in its turn ‚ÄĒ the attested form is *aiks, not **aixs. Run the other way round, each order breaks the other's word."
definition = [
    # 1. b Ī d Ī g Ī ‚Üí ő≤ √į …£. The third series lands on voiced FRICATIVES, not stops: Proto-Germanic
    #    has *beő≤ruz, *l…Ď…£uz, *…£ar√įaz, and [b d g] are its allophones word-initially and after a
    #    nasal (pgmc_voiced_fricative_hardening). Deriving stops here makes every medial one wrong.
    "[-son, -cont, +voice, glottal_aperture: spread] ‚Üí [glottal_aperture: neutral, tension: neutral, +cont]",
    # 2. p t k ‚Üí …ł őł x, except after an obstruent ‚ÄĒ ANY obstruent, including the voiced fricatives
    #    clause 1 has just made, which is what protects the *t of *m√≥g įtis.
    "[-son, -cont, -voice] ‚Üí [+cont] // [-son] _",
    # 2b. ‚Ä¶but a plain voiced stop standing BEFORE *t fricativises instead of hardening ‚ÄĒ the
    #     velar half of Prim√§rber√ľhrung. *jugt√≥s is *juxt…Ďz and *reg ≤t√≥s is *rext…Ďz, with an /x/,
    #     where clause 3 alone would harden the *g to /k/ and give **jukt…Ďz, **rekt…Ďz. It sits
    #     before clause 3 precisely to get there first; the /t/ itself is already protected by
    #     clause 2, which will not fricativise a stop standing after an obstruent. The aspirates
    #     need no clause here ‚ÄĒ clause 1 has already made them fricatives, so [-cont] misses them.
    "[-son, -cont, +voice] ‚Üí [+cont, -voice] / _ t",
    # 3. b d g ‚Üí p t k. Last, so the new stops are not caught by clause 2.
    "[-son, -cont, +voice, glottal_aperture: neutral] ‚Üí [-voice]",
]

[verners_law]
time = -1000
name = "Verner's law"
description = "Voiceless fricatives are voiced when preceded by an unaccented vowel, including cases where the vowel and fricative are separated by a sonorant (n, m, r, l, j, w)"
definition = "[-son, +cont, -voice] ‚Üí [+vc] / [+syll, stress: none] [+son, -syll]? _ "

[stress_change]
time = -1000
name = "Stress change to first syllable"
description = "All words become stressed on their first syllable. The PIE contrastive accent is lost, phonemicising the voicing distinction created by Verner's law"
definition = [
    "[+syll] ‚Üí [stress: primary] / # [-syll]* _ []* [+syll, stress: primary]",
    "[+syll] ‚Üí [stress: none] / [+syll] []* _",
]

[word_initial_gw_to_b]
time = -1000
name = "Word-initial */g ∑/ > */b/"
description = "Word-initial */g ∑/ > */b/"
definition = "g ∑ ‚Üí b / # _"

[unstressed_owo_to_long_o]
