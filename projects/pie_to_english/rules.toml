# next syllable ‚ÄĒ *nisd√≥s > *nestaz. Blocked before /j/, which is why *midjaz keeps its /i/.
#
# Only the /i/ half, and only at this date. The parallel lowering of *u (wg_a_umlaut, t=350) is
# a later and much less regular change: run at Proto-Germanic date it lowers *wulfaz to **wolfaz
# and a dozen others, costing 12 exact matches. The two halves are not one rule.
# RE-DATED out of Proto-Germanic (was 50, now 300 ‚ÄĒ West Germanic), and renamed with it.
#
# Kroonen's Proto-Germanic 'nest' is *nista-, with an /i/ ‚ÄĒ not the *nestńÖ our Wiktionary gold
# gives ‚ÄĒ and his *fiska- (<= *pisk-o-, cf. Lat. piscis) has one too. Ringe's bibliography cites
# Lloyd, "Is there an a-umlaut of i in Germanic?" So the lowering is doubtful AT Proto-Germanic,
# and the 200 gold has been corrected to *nistńÖ accordingly (ATTESTED_FIXES in build_gold.py).
#
# But the change is REAL, just later: Old English has nest with an /e/ while fisc keeps its /i/,
# and those are ATTESTATIONS, not reconstructions ‚ÄĒ there is no arguing with them. So the rule
# moves rather than goes. At 200 the /i/ now survives (*nistńÖ, *wissaz); by 900 it has lowered
