name = "A-restoration: the brightened √¶ goes back to a before a BACK vowel"
description = """Minkova ¬ß3.4. Anglo-Frisian brightening fronts *a to *√¶, but it is undone where a
BACK vowel follows in the next syllable ‚ÄĒ the fronting never survives in front of one:

    *sagu   > OE sagu  (not **s√¶gu)      *talu   > OE talu
