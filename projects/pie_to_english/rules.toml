# Laryngeal colouring, in one rule per direction via conditionals. The context is the
# laryngeal natural class вАФ a guttural [+cons, advancement: rtr] (= *hвВБ ѕЗ, *hвВВ ƒІ, *hвВГ  Б Ј here).
# Two conditional labels then pick the colour from the laryngeal's own quality:
# label 1 fires next to an [aperture: low] guttural (*hвВВ ƒІ) and lowers *e to *a; label 2 fires
# next to a [+rounded] guttural (*hвВГ  Б Ј) and backs/rounds *e to *o. *hвВБ (ѕЗ) is neither
# [aperture: low] nor [+rounded], so neither label fires and *e is left alone вАФ its neutrality
# falls out. A merge result keeps a stressed /e/'s stress; the target *e is the mid
# front vowel [+syll, -cons, +front, aperture: mid]: -cons excludes syllabic consonants
# (rћ©, lћ©, вА¶) and aperture: mid picks out mid *e (not high *i or low *a).
# Two rules, not one: the notation can't put the laryngeal on "either" side at once.
[laryngeal_colouring_after]
time = -2000
name = "Laryngeal colouring after a laryngeal"
description = "*hвВВe > *hвВВa, *hвВГe > *hвВГo (hвВБ leaves e)"
definition = "[+syll, -cons, +front, aperture: mid] вЖТ [<1: aperture: low>, <1: advancement: rtr>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / [+cons, advancement: rtr, <1: aperture: low>, <2: +rounded>] _"

[laryngeal_colouring_before]
time = -2000
name = "Laryngeal colouring before a laryngeal"
description = "*ehвВВ > *ahвВВ, *ehвВГ > *ohвВГ"
definition = "[+syll, -cons, +front, aperture: mid] вЖТ [<1: aperture: low>, <1: advancement: rtr>, <2: back: 1>, <2: rounded: 1>, <2: labial: 1>, <2: front: none>] / _ [+cons, advancement: rtr, <1: aperture: low>, <2: +rounded>]"

[centumization]
time = -2000
name = "Centumization"
description = "Merging of PIE 'palatovelar' and 'velar' plosives"
definition = "[+cons, -sonorant, +back, +front] вЖТ [front: none]"

[u_epenthesis]
time = -2000
name = "'u' epenthesis"
description = "Epenthesis of /u/ before the syllabic sonorants"
# `+son`: the epenthesis is for the syllabic SONORANTS (*lћ• rћ• mћ• nћ• > ul ur um un). A syllabic
# LARYNGEAL is also [+cons, +syll] and was being caught by it вАФ but a laryngeal does not take an
# epenthetic *u, it vocalises to *…Щ (`laryngeal_vocalization`). Written without the restriction,
# Kroonen's *nћ•hвВВ-s-ehвВВ- came out **uns≈Н.
definition = "вИЕ [+cons, +syll, +son] вЖТ u [-syll]"

# A dental stop + epenthetic s + dental stop collapses to ss (*TsT > ss): the dental
# stops ([+cons,-continuant,+anterior,-sonorant], i.e. t/d) become s, the span
# shrinking 3вЖТ2. The result is letters (replacement path) so the lengths may differ.
# The bare *TT cluster does the same thing and needs its own clause: Wiktionary writes the
# epenthetic *s only sometimes, so *widt√≥s, *sedt√≥s and *k ЈѕЗdtos arrive with the two dentals
# simply adjacent, and the 3вЖТ2 clause above cannot see them. Without it Grimm's third clause
# turns the *d into a *t and the words end in **wettaz, **settaz, **hwattaz for the attested
# *wissaz, *sessaz, *hwassaz. This is the dental half of Prim√§rber√Љhrung; the velar half (a
# stop before *t going to a fricative) is the clause added to Grimm's law below.
[dental_cluster]
time = -2000
name = "Dental cluster simplification"
description = "*TsT, *TT > ss вАФ *wid-t√≥s > *wiss√≥s 'certain', *sedt√≥s > *sessaz"
definition = [
    "[+cons, -continuant, +anterior, -sonorant] s [+cons, -continuant, +anterior, -sonorant] вЖТ s s",
    "[+cons, -continuant, +anterior, -sonorant] [+cons, -continuant, +anterior, -sonorant] вЖТ s s",
]

# A geminate is one consonant doubled, so match it as `1=[+cons] @1` (capture, then
# the same consonant again) вАФ not `[+cons]{2}`, which is any two consonants AND whose
# single quantified element can't pair with the two-element result. The first copy
# stays ([+cons] is a no-op merge), the second is deleted (вИЕ); counts match, 2:2.
#
# Dated AFTER the laryngeals resolve (-1900, not -2000), because the rule asks whether a
# CONSONANT precedes the geminate and a laryngeal is not yet the thing it will be. In *k ЈѕЗdtos
# the *ѕЗ still looks like a consonant, so the *ss the dental cluster has just made was being
# shortened away вАФ **x Ј…Сz…Сz for the attested *x Ј…Сss…Сz. But that *ѕЗ vocalises to a VOWEL, and a
# short vowel is exactly the environment where a geminate is kept. Let the laryngeals settle
# first and the question answers itself.
[geminate_shortening]
time = -1900
name = "Geminate shortening"
description = "A geminate shortens after a consonant or a long vowel"
definition = "1=[+cons] @1 вЖТ [+cons] вИЕ / ([+cons]|[length: long]) _"

[overlong_vowels]
time = -2000
name = "Overlong vowels creation"
description = "Word-final long vowels are lengthened to 'overlong' vowels"
definition = "[length: long]# вЖТ [length: overlong]"

[loss_of_initial_laryngeals]
time = -2000
name = "Loss of initial laryngeals"
description = "Word-initial laryngeals are lost before a consonant"
definition = "#[+cons, advancement: rtr][+cons] вЖТ вИЕ[+cons]"

[cowgills_law]
time = -2000
name = "Cowgill's law"
description = "*/hвВГ/ (and possibly */hвВВ/) is strengthened to */g/ between a sonorant and */w/"
# `[+syll]`, not `[+son]`. Ringe states the environment as "between a sonorant and *w (in that
# order)" вАФ but BOTH of his examples have that sonorant as a NUCLEUS: *nћ•hвВГw√© (a syllabic *nћ•) and
# *g ЈihвВГw√≥s 'alive' (a vowel *i) > *kwikw√≥s > PGmc *kwikwaz. Read as any sonorant, the law also
# fires after a consonantal *l вАФ and *g ∞elhвВГwos then comes out **gelkwaz against an attested
# *gelwaz with a plain *w. Kroonen keeps the laryngeal in the root (*g ∞elhвВГ- 'yellow'), so the
# preform is not the problem; the environment is. Post-vocalic, as the examples have it.
definition = " Б Ј вЖТ g / [+syll] _ w"

# Post-vocalic loss runs *before* pre-vocalic loss so that an intervocalic laryngeal
# lengthens its preceding vowel (VHV > VЋРV) instead of being deleted pre-vocalically.
# Only a laryngeal with no preceding vowel (#HV, CHV) then falls through to the
# pre-vocalic rule.
# Laryngeal loss WITHOUT lengthening comes first вАФ before the post-vocalic loss below, which
# lengthens the vowel it follows. Order matters and the gold settles it:
#   * between two vowels the laryngeal simply drops, leaving a diphthong: *k√©hвВВilos > *hailaz,
#     not the long vowel **hƒБlaz that the lengthening rule would give;
#   * before a resonant it drops too, and the vowel stays SHORT: *suHn√Їs > *sunuz, *hвВВyuHnћ•бЄ±√≥s
#     > *jungaz вАФ both attested with a short /u/.
# Run the other way round (the file's original order), the lengthening rule takes these first
# and the loss never sees them.
[loss_of_laryngeals_before_vowels]
time = -2000
name = "Loss of laryngeals before a vowel or a resonant, without lengthening"
description = "*hвВБ√©sti > *√©sti > *isti; *k√©hвВВilos > *hailaz; *suHn√Їs > *sunuz"
definition = [
    "[+cons, advancement: rtr] [+syll, -cons] вЖТ вИЕ [+syll, -cons]",
    # Before a resonant the laryngeal drops WITHOUT lengthening вАФ but only after an UNSTRESSED
    # vowel. Stress is what separates the two outcomes: barytone *d ∞√≥hвВБmos lengthens its stressed
    # root vowel (> *d≈Нmaz), while oxytone *suHn√Їs and *hвВВyuHnћ•бЄ±√≥s have the laryngeal in a pretonic
    # syllable and stay short (> *sunuz, *jungaz). Without the stress condition, doom comes out
    # **damaz. The second clause repeats it for a SYLLABIC resonant (*nћ• is [+syll, +cons], so it
    # matches neither the vowel clause above nor the consonant clause here).
    "[+cons, advancement: rtr] вЖТ вИЕ / [+syll, stress: none] _ [+son, -syll, +cons]",
    "[+cons, advancement: rtr] вЖТ вИЕ / [+syll, stress: none] _ [+syll, +cons]",
]

[loss_of_laryngeals_after_vowels]
time = -2000
name = "Loss of laryngeals after vowels"
description = "Laryngeals are lost after vowels but lengthen the preceding vowel"
definition = "[+syll, -cons] [+cons, advancement: rtr] вЖТ [+syll, -cons, length: long] вИЕ"

# The long vowel left by post-vocalic laryngeal loss then absorbs a following short
# vowel in hiatus: VЋР V > VћВ. The overlong takes the long first vowel's quality (the
# merge keeps it, and any stress); the short second vowel is deleted. The first must
# be [length: long], so only laryngeal-lengthened hiatus contracts вАФ *-oHom (> *oЋРom)
# > *-√іm; *-ehвВВes (> *aЋРas) > *-√Ґs.
[vowel_contraction]
time = -2000
name = "Vowel contraction in hiatus"
description = "A long vowel absorbs a following short vowel into an overlong вАФ *-oHom > *-√іm"
definition = "[+syll, -cons, length: long] [+syll, -cons] вЖТ [length: overlong] вИЕ"

# A laryngeal after a STOP that already has a vowel before it does not vocalise either вАФ it
# ASPIRATES the stop and disappears: *d ±ugƒІteЋРr > *d ±ug ±teЋРr. The vowel is what makes the
# difference. In *d ±ugƒІteЋРr the /u/ is the nucleus, so the laryngeal cannot be one; in *kƒІponeƒІ
# the word-initial /k/ has no vowel to lean on and the laryngeal must vocalise (> *x…Сќ≤…Сn…ФЋР), so
# the context demands the preceding vowel rather than firing on any stop.
# Sanskrit spells the aspirate out: *d ±ugƒІteЋРr is duhitƒБћБ, with the -h- straight from the *g ±.
# Without this, the laryngeal became a schwa, the schwa fed Verner's Law, and the *t voiced вАФ
# **duk√∞ћ†eЋРr for the attested *duxt…ЫЋРr. The same hole as the sonorant clause below, one manner up.
[laryngeal_aspiration]
time = -2000
name = "A laryngeal aspirates a preceding stop"
description = "*d ±ugƒІteЋРr > *d ±ug ±teЋРr > *duxt…ЫЋРr 'daughter' вАФ the *g ± is Sanskrit duhitƒБћБ's -h-"
# `tension: slack` as well as `glottal_aperture: spread`, because the aspirate PIE actually has is
# the BREATHY one. The two diacritics are not the same segment: ` ∞` is `1 glap` (plain aspiration)
# and ` ±` is `+vc, 1 glap, -1 tns` (breathy voice вАФ spread glottis AND slack tension). Setting only
# the glottal aperture made a *g* that was spread but not slack, which spells `g ∞`, not the `g ±`
# the lexicon writes. It worked only by luck: Grimm's first clause matches on FEATURES
# ([+voice, glottal_aperture: spread]) and caught it anyway вАФ but any rule written against the
# letter+diacritic `g ±` would have looked straight through it, exactly as with the `…С` that was
# still labial. Make the segment the thing it is supposed to be.
definition = "[-son, -cont] [+cons, advancement: rtr] вЖТ [glottal_aperture: spread, tension: slack] вИЕ / [+syll] _"

# A laryngeal between a sonorant CONSONANT and an obstruent is LOST, not vocalised. If it
# vocalised, its schwa would be an unaccented vowel standing before the obstruent вАФ which feeds
# Verner's Law and voices it. *«µ√©nhвВБtis would then give **kin√∞iz, but the attested Proto-Germanic
# is *kin√Њiz, with a voiceless √Њ: the /t/ is still protected by the root accent, which means no
# vowel ever intervened. The loss is written as the first clause of the same rule so that it is
# ordered before the general vocalisation.
[laryngeal_vocalization]
time = -2000
name = "Vocalisation of remaining laryngeals (with loss between a resonant and an obstruent)"
description = "*«µ√©nhвВБtis > *ken√Њis (no schwa, so Verner cannot fire) > *kin√Њiz"
definition = [
    # The `[+syll]` at the front is what keeps the loss out of a word-initial cluster, and it is
    # the same condition the aspiration rule above turns on: a laryngeal only declines to be a
    # nucleus when the syllable already HAS one. *«µ√©nhвВБtis has its *e, so the laryngeal goes.
    # *mhвВВбЄ±r√≥s does not вАФ the *m is word-initial вАФ and dropping the laryngeal there left **mxr…Сz,
    # a word with no vowel in it at all, for the attested *m…С…£r…Сz. With no vowel to lean on the
    # laryngeal must vocalise, which is what the last clause then does.
    "[+cons, advancement: rtr] вЖТ вИЕ / [+syll] [+son, -syll, +cons] _ [-son]",
    # ...and after a SYLLABIC resonant too: *«µnћ•hвВГt√≥s has its laryngeal between *nћ• and *t. If it
    # vocalises there, the schwa feeds Verner and the *t voices вАФ but the attested *kun√Њaz has a
    # voiceless *√Њ. Same hole that gave **kin√∞iz for kind.
    "[+cons, advancement: rtr] вЖТ вИЕ / [+syll, +cons] _ [-son]",
    "[+cons, advancement: rtr] вЖТ …Щ",
]

# A laryngeal before a resonant is lost WITHOUT lengthening the vowel: *suHn√Їs > *sunuz and
# *hвВВyuHnћ•бЄ±√≥s > *jungaz both have a SHORT /u/ in the attested Proto-Germanic, so the general
# "loss after a vowel", which lengthens, must not reach them.

[velar_labialization]
time = -2000
name = "Velar labialization"
description = "Velars are labialised by following */w/, which is deleted"
definition = "[+bk, aperture: high] w вЖТ [+rounded] вИЕ "

[labiovelar_delabialization]
time = -2000
name = "Labiovelar delabialization"
description = "Labiovelars are delabialised next to */u/ (or */un/) or before */t/"
definition = "[+bk, aperture: high, +rnd, -son] вЖТ [labial: none] / _ (u|t)"

[final_non_high_short_vowel_loss]
time = -1000
name = "Word-final non-high short vowel loss"
description = "Word-final non-high short vowels are lost, along with preceding /j/ or /w/ (single syllables not affected)"
definition = [
    "[+syll] вЖТ [stress: primary] / _ [-syll]* [+syll, stress: primary, -cons, aperture: !high, length: short] #",
    "j?w?[+syll, -cons, aperture: !high, length: short] вЖТ вИЕ / [+syll] []* _ #"
]

# KLUGE'S LAW. Kroonen ¬І2.2.5.2: "voiced *b, *d and *g were geminated to *bb, *dd and *gg by the
# assimilation of a following *n IN A STRESSED SYLLABLE. These geminates were then devoiced to
# *pp, *tt and *kk together with old Proto-Indo-European *b, *d, *g during STAGE 2 of Grimm's
# law." His worked example is one of ours: "*budmo, gen. *buttaz m. 'bottom' < *b ∞ud ∞-men, gen.
# *b ∞ud ∞-n-√≥s".
#
# Two things fix its date, and both point here вАФ immediately BEFORE Grimm:
#   * it must precede Grimm's FIRST clause, or the *d ∞ of *b ∞ud ∞n√≥s is already a fricative *√∞ and
#     there is no stop left to geminate;
#   * it must precede Grimm's THIRD clause, which is what devoices the *dd it makes to the *tt the
#     attested *buttaz shows. Kroonen says so outright ("during stage 2 of Grimm's law").
#
# The geminate is a PLAIN voiced stop, which is why the aspirates are written out to plain b/d/g
# here rather than recalled with @1: recalled, they would keep their breathiness, Grimm's first
# clause would turn both halves into fricatives, and the word would come out **bu√∞√∞az.
#
# "In a stressed syllable" is the accent condition, and it is what the `/ _ [+syll, stress:
# primary]` context says: the *n must belong to the stressed syllable, i.e. stand before its vowel.
[kluges_law]
time = -1100
name = "Kluge's law: a voiced stop geminates before a stressed *n"
description = """Kroonen ¬І2.2.5.2 вАФ *b ∞ud ∞n√≥s > *buddos > (Grimm) *buttaz 'bottom'.

The stop must be preceded by a VOWEL, and that is not decoration. Kluge's law assimilates a
SUFFIXAL *n to a ROOT-FINAL stop (*b ∞ud ∞-n√≥s), and a root-final stop always has the root's vowel
before it. Without that condition the rule also fires on a word-initial onset cluster, where the
*n is part of the root and no suffix is in sight: *«µn√©wom came out as **kkewƒЕ, geminating a *«µ
that begins the word, against an attested *knewƒЕ 'knee' whose *kn is intact."""
definition = [
    "b ± n вЖТ b b / [+syll] _ [+syll, stress: primary]",
    "d ± n вЖТ d d / [+syll] _ [+syll, stress: primary]",
    "g ± n вЖТ g g / [+syll] _ [+syll, stress: primary]",
    "b n вЖТ b b / [+syll] _ [+syll, stress: primary]",
    "d n вЖТ d d / [+syll] _ [+syll, stress: primary]",
    "g n вЖТ g g / [+syll] _ [+syll, stress: primary]",
]

[grimms_law]
time = -1000
name = "Grimm's law"
description = "The chain shift of the three plosive series. The order of the clauses is not free, and the gold settles it: the ASPIRATES must go to fricatives first, so that *m√≥g ∞tis has an obstruent /…£/ standing before its *t (which therefore does not fricativise) and devoices to the attested *m…Сxtiz. The PLAIN voiced stops must go last, so that the /k/ *hвВВ√©y«µs makes out of *«µ is not fricativised in its turn вАФ the attested form is *aiks, not **aixs. Run the other way round, each order breaks the other's word."
definition = [
    # 1. b ± d ± g ± вЖТ ќ≤ √∞ …£. The third series lands on voiced FRICATIVES, not stops: Proto-Germanic
    #    has *beќ≤ruz, *l…С…£uz, *…£ar√∞az, and [b d g] are its allophones word-initially and after a
    #    nasal (pgmc_voiced_fricative_hardening). Deriving stops here makes every medial one wrong.
    "[-son, -cont, +voice, glottal_aperture: spread] вЖТ [glottal_aperture: neutral, tension: neutral, +cont]",
    # 2. p t k вЖТ …Є ќЄ x, except after an obstruent вАФ ANY obstruent, including the voiced fricatives
    #    clause 1 has just made, which is what protects the *t of *m√≥g ∞tis.
    "[-son, -cont, -voice] вЖТ [+cont] // [-son] _",
    # 2b. вА¶but a plain voiced stop standing BEFORE *t fricativises instead of hardening вАФ the
    #     velar half of Prim√§rber√Љhrung. *jugt√≥s is *juxt…Сz and *reg ≤t√≥s is *rext…Сz, with an /x/,
    #     where clause 3 alone would harden the *g to /k/ and give **jukt…Сz, **rekt…Сz. It sits
    #     before clause 3 precisely to get there first; the /t/ itself is already protected by
    #     clause 2, which will not fricativise a stop standing after an obstruent. The aspirates
    #     need no clause here вАФ clause 1 has already made them fricatives, so [-cont] misses them.
    "[-son, -cont, +voice] вЖТ [+cont, -voice] / _ t",
    # 3. b d g вЖТ p t k. Last, so the new stops are not caught by clause 2.
    "[-son, -cont, +voice, glottal_aperture: neutral] вЖТ [-voice]",
]

[verners_law]
time = -1000
name = "Verner's law"
description = "Voiceless fricatives are voiced when preceded by an unaccented vowel, including cases where the vowel and fricative are separated by a sonorant (n, m, r, l, j, w)"
definition = "[-son, +cont, -voice] вЖТ [+vc] / [+syll, stress: none] [+son, -syll]? _ "

[stress_change]
time = -1000
name = "Stress change to first syllable"
description = "All words become stressed on their first syllable. The PIE contrastive accent is lost, phonemicising the voicing distinction created by Verner's law"
definition = [
    "[+syll] вЖТ [stress: primary] / # [-syll]* _ []* [+syll, stress: primary]",
    "[+syll] вЖТ [stress: none] / [+syll] []* _",
]

[word_initial_gw_to_b]
time = -1000
name = "Word-initial */g Ј/ > */b/"
description = "Word-initial */g Ј/ > */b/"
definition = "g Ј вЖТ b / # _"

[unstressed_owo_to_long_o]
time = -1000
name = "Unstressed */owo/ > */oЋР/"
description = "Unstressed */owo/ > */oЋР/"
definition = "[+syll, +bk, length: short, stress: none] w [+syll, +bk, length: short, stress: none] вЖТ oЋР"

[unstressed_ew_to_ow_before_consonant_or_finally]
time = -1000
name = "Unstressed */ew/ > */ow/ before a consonant or word-finally"
description = "Unstressed */ew/ > */ow/ before a consonant or word-finally"
definition = "[+syll, aperture: !high, +fr, length: short, stress: none] w вЖТ ow / _ ([-syll]|#)"

[unstressed_e_to_i_except_before_r]
time = -1000
name = "Unstressed */e/ > */i/ except before */r/"
description = "Unstressed */e/ > */i/ except before */r/. Unstressed */ej/ contracts to */iЋР/"
# `aperture: mid`, not `aperture: !high`. The change is unstressed *e > *i вАФ a MID vowel raising
# one step. "Not high" also takes in the LOW front *a, which laryngeal colouring makes out of *e
# (*hвВВe > *a, a FRONT low vowel until `Low a backs to …С` later on). So *hвВВenhвВВets was raising its
# second *a straight past *e to *i and coming out **anidz for the attested *anadz. An unstressed
# *a stays *a.
definition = [
    "[+syll, aperture: mid, +fr, length: short, stress: none] вЖТ i // _ r",
    "[+syll, aperture: mid, +fr, length: short, stress: none]j вЖТ iЋР // _ r"
]

[unstressed_e_to_a_before_r]
time = -950
name = "Unstressed */e/ > */a/ before */r/"
description = """Ringe ¬І5.3.2 (iii). The raising of unstressed *e to *i is blocked before *r вАФ but
the *e does not simply stay. It LOWERS:

  "It is reasonable to infer from this pattern of evidence that unstressed *e was lowered to *a
   before *r already in PGmc."

His evidence is the daughters: Gothic and Old Norse have *a regularly, Old Saxon and Old High
German vary with *a common, and only Anglo-Frisian shows *e вАФ which is precisely the area where
PGmc *a was fronted and appears as *e when unstressed. So the *e is the innovation and the *a the
inheritance, not the other way round.

Dated after `unstressed_e_to_i_except_before_r`, whose exception is what leaves the *e standing
for this rule to find: *√°nteros > *an√Њeraz > *an√Њaraz, *up√©r > *uber > *ubar, *nћ•t√©r > *under >
*undar. Ringe cites *an√Њaraz and *undar himself, and flags the alternative (*-eraz?, *under?) as
the thing this inference resolves."""
definition = "[+syll, aperture: mid, +fr, length: short, stress: none] вЖТ …С / _ r"

[sievers_law]
time = -900
name = "Sievers' law: the *j suffix is *-ij- after a heavy syllable, *-j- after a light one"
description = """The weight of the preceding syllable decides whether the suffixal *j is preceded
by an *i, and Germanic redistributes the two REGARDLESS of which the PIE suffix had.

The 1sg of the weak verbs states it as a minimal pair, and the cascade had it exactly INVERTED вАФ
it was faithfully passing through whichever suffix PIE happened to write:

    *sod√©yohвВВ  (light stem *sat-)  ->  we derived *satij≈Н   attested *satj≈Н
    *s√©hвВВgyohвВВ (heavy stem *s≈Нk-)  ->  we derived *s≈Нkj≈Н    attested *s≈Нkij≈Н

HEAVY is a long vowel plus a consonant (*s≈Нk-), or any vowel plus TWO (*wurk-, *hauz-); LIGHT is a
short vowel plus exactly one (*sat-, *lag-, *straw-). Note the diphthong stems fall out of that
without a special case: *hauz- is *a + *w + *z, two consonants before the *j, and so heavy вАФ while
*straw- is *a + *w, one consonant, and so light, exactly as attested.

Dated after `unstressed_e_to_i`, which is what makes the *i of the *-√©ye- suffix in the first
place; Sievers then takes it away again where the stem is light."""
definition = [
    # HEAVY, and so an *i appears: a long vowel + one consonant, or any vowel + two.
    "вИЕ вЖТ i / [+syll, length: !short] [-syll] _ j",
    "вИЕ вЖТ i / [+syll] [-syll] [-syll] _ j",
    # LIGHT, and so the *i goes: a short vowel + exactly one consonant.
    "i вЖТ вИЕ / [+syll, length: short] [-syll] _ j",
]

[unstressed_ji_to_i]
time = -1000
name = "Unstressed */ji/ > */i/"
description = "Unstressed */ji/ > */i/"
definition = [
    "[+syll, aperture: high, +fr, length: short, stress: none]j[+syll, aperture: high, +fr, length: short, stress: none]  вЖТ iЋР",
    "j[+syll, aperture: high, +fr, length: short, stress: none] вЖТ i",

]

# `labial: none` matters as much as `rnd: none`, and leaving it off was the source of a whole
# class of silent bugs. A merge keeps every feature it does not mention. PIE *o is [+rounded,
# +labial]; this rule un-rounds it but said nothing about labial, so the *a it produced was the
# letter …С's bundle PLUS a stray `labial: 1`.
#
# That segment RENDERS as …С вАФ the renderer falls back to the nearest letter and quietly drops the
# feature it cannot spell вАФ but it is not the LETTER …С, and letter patterns match by identity. So
# every rule written `…С вЖТ вА¶` looked straight through it. Anglo-Frisian brightening, OE breaking
# and the diphthong shift all fired on words whose …С came from the segmenter and silently skipped
# the ones whose …С came from *o, which print identically. Un-round the vowel completely and the
# two are the same segment again.
[non_high_back_merger]
time = -1000
name = "Merging of non-high back vowels"
description = "Merging of non-high back vowels"
definition = "([+syll, aperture: !high, !fr, advancement: atr] |[+syll, aperture: !high, !fr, advancement: rtr]) вЖТ [aperture: low, fr:none, +bk, advancement: rtr, rnd: none, labial: none]"

[final_m_to_n]
time = 0
name = "Word-final */m/ > */n/"
description = "Word-final */m/ > */n/"
definition = "m вЖТ n / _#"

# NOT before /s/, though *ƒІemsus > *ansuz makes it tempting: *ƒІomsos is the attested *amsaz
# 'shoulder', which KEEPS its /ms/. One and the same cluster cannot both assimilate and not, so
# the /n/ of *ansuz is not a sound change operating on /ms/ вАФ it belongs to its preform, and that
# is a question for PREFORM_FIXES. Adding /s/ here buys *ansuz and loses *amsaz, dead even, and
# leaves a rule the corpus contradicts. The stops only.
[m_to_n_before_t_d]
time = 0
name = "*/m/ > */n/ before */t/, */d/, */ќЄћ†/, */√∞ћ†/"
description = "*/m/ > */n/ before */t/, */d/, */ќЄћ†/, */√∞ћ†/"
definition = "m вЖТ n / _ (t | d | ќЄћ† | √∞ћ†)"

[final_n_loss]
time = 0
name = "Final /n/ loss"
description = "Word-final */n/ is lost after an unstressed NON-HIGH vowel, nasalising it: *-am > *-ƒЕ, *-≈Нn > *-«≠. After a high vowel the /n/ stands: the numerals *tehun, *newun, *sebun all keep it, and without the aperture condition they come out **teh≈©."
definition = "[+syll, stress: none, aperture: !high] n вЖТ [+nas] вИЕ / _#"

[lowering_of_nasal_long_e]
time = 0
name = "Lowering of nasal */бЇљЋР/ to */…СћГЋР/"
description = "Lowering of nasal */бЇљЋР/ to */…СћГЋР/"
definition = "[+syll, aperture: !high, +fr, length: long, nasal] вЖТ [aperture: low, fr: none, +bk, advancement: rtr, rnd: none, labial: none]"

[schwa_elimination]
time = 0
name = "Elimination of */…Щ/"
description = "Unstressed */…Щ/ is lost between consonants; */…Щ/ > */…С/ elsewhere"
definition = [
    "[+syll, aperture: none, stress: none] вЖТ вИЕ / _ [-syll]",
    "[+syll, aperture: none] вЖТ …С"
]

[assimilation_of_sonorants]
time = 0
name = "Assimilation of sonorants"
description = "Assimilation of sonorants"
definition = [
    "1=n w вЖТ @1 @1",     # nw > nn
    "1=l n вЖТ @1 @1",     # ln > ll
    "z вЖТ @1 / _ 1=m",    # zm > mm
    # вА¶and *√Њl > *ll, which is what separates the attested *stallaz from its doublet *sta√Њlaz
    # (OE steall beside sta√Њol). The *-d ∞lo- suffix of Kroonen's *sthвВВ-d ∞lo- lands here.
    "√∞ћ† вЖТ @1 / _ 1=l",   # √∞l > ll
]

# The velar fricative drops out of a *-…£m- cluster after a sonorant: *drowg ±mos > *dr…Сwm…Сz
# 'dream', *rewg ±mnћ• > *r…Сwm…Сz 'ream'. Grimm has already turned *g ± into …£ by here, so the rule
# is stated on the fricative, not on the aspirate. The [+son] context is what keeps it out of a
# word-initial cluster, where the …£ survives and a vowel is epenthesised instead
# (*g ≤ ±moЋР > *…£um…ФЋРЋР 'gome', not **m…ФЋР).
[velar_fricative_loss_before_m]
time = 0
name = "*/…£/ is lost before */m/"
description = "*-…£m- > *-m- after a sonorant вАФ *drowg ±mos > *dr…Сwm…Сz 'dream'"
definition = "…£ вЖТ вИЕ / [+son] _ m"

# Ringe ¬І5.3.4 (iv), "Loss of word-final *t": PGmc *tehun has lost the final *-d of PIE *d√©бЄ±mћ•d,
# and he dates the loss of word-final CORONAL STOPS after the loss of word-final *-n.
#
# It has to reach the FRICATIVES too, not just the letter *t. By the time this fires, Grimm has
# already turned PIE *t into *√Њ and Verner may have voiced that to *√∞ вАФ so *m√©lit arrives here as
# *mili√∞ћ†, and a rule looking for a *t walks straight past it. (The *t of *tehun is a different
# animal: it comes from PIE *d, which Grimm hardens INTO a stop, so that one the rule always saw.)
# Both are the same coronal, and both are lost: PGmc *mili has no final consonant at all.
[final_t_loss]
time = 0
name = "Final coronal obstruent loss"
description = "Ringe ¬І5.3.4(iv) вАФ *d√©бЄ±mћ•d > *tehun, *m√©lit > *mili"
definition = [
    "[+syll, stress:none][-syll]*t вЖТ [+syll, stress:none][-syll]*вИЕ / _# ",
    "[+syll, stress:none][-syll]*ќЄћ† вЖТ [+syll, stress:none][-syll]*вИЕ / _# ",
    "[+syll, stress:none][-syll]*√∞ћ† вЖТ [+syll, stress:none][-syll]*вИЕ / _# ",
]

[gw_to_w]
time = 0
name = "*/g Ј/ > */w/"
description = "*/g Ј/ > */w/"
definition = "g Ј вЖТ w"

# The same exit, for the FRICATIVE labiovelar that Grimm's first clause makes out of *g Ј ±. It had
# none, so *snojg Ј ±os kept it to the end and came out **sn…Сj…£ Ј…Сz for the attested *sn…Сjw…Сz.
# PIE *g Ј ± splits by position in Proto-Germanic: after a nasal it is the stop (*lu≈Лgr…Сz), and
# everywhere else it is *w. The nasal clause simply delabialises it and lets the voiced-fricative
# hardening below turn the plain *…£ into the *g the attested form shows.
[gwh_to_w]
time = 0
name = "*/…£ Ј/ > */b/ word-initially, */g/ after a nasal, */w/ elsewhere"
description = """*snojg Ј ±os > *sn…Сjw…Сz 'snow'; *leng Ј ±ros > *lu≈Лgr…Сz 'lungs'.

Ringe ¬І5.3.3: "In word-initial position PIE *g Ј ∞ became PGmc *b, except when it had already been
delabialized by a following *u", and his examples are exactly ours вАФ *g Ј ∞√©d ∞yeti > *bidi√Њi,
*g Ј ∞en-/*g Ј ∞on- > *ban√і, *banj≈Н. The path is *g Ј ∞ > *…£ Ј (Grimm) > *b, so the clause has to come
before the *…£ Ј > *w that follows it.

Wiktionary's *g Ј ∞√≥rmos > *warmaz looks like a counterexample and is not one: Ringe REJECTS that
etymology outright, in the footnote to this very passage вАФ "I connect PGmc *warmaz 'warm' with
Hitt. warnuzzi, not with Av. gar…Щm≈Н". So *warmaz is a bad etymon in the source, not a bad rule
here, and the source hierarchy (Ringe > Wiktionary) says the rule wins. Its miss is a preform
problem and is recorded as one."""
definition = [
    "…£ Ј вЖТ b / # _",
    "…£ Ј вЖТ …£ / [+cons, nasal: 1] _",
    "…£ Ј вЖТ w",
]

[long_a_raising]
time = 0
name = "Long /…С/ raising"
description = "*/…СЋР/ > */…ФЋР/ "
definition = "[aperture: low, fr:none, +bk, advancement: rtr, !length: short] вЖТ [aperture: mid, rnd]"

[early_i_mutation]
time = 0
name = "Early i-mutation"
description = "*/e/ > */i/ before */i j/ in the same or next syllable; also eliminates */ei/ > */iЋР/"
# Short *e only. Long *ƒУвВБ does not raise here вАФ *d ∞ehвВБt√≠s gives *dƒУdiz, not **dƒЂdiz вАФ so the
# target carries [length: short]; without it the laryngeal-lengthened *ƒУ of deed/stead raised.
definition = [
    "[+syll, -cons, +front, aperture: mid, length: short] вЖТ [aperture: high] / _ [-syll]* [aperture: high, +front]",   # e > i / _ (C) {i,j}
    "[+syll, aperture: high, +front] [+syll, aperture: high, +front] вЖТ [length: long] вИЕ",            # ii > iЋР
    # вА¶and *ij > *iЋР, which is what actually delivers the */ei/ > */iЋР/ the description promises.
    # Clause 1 raises the *e of *dejw√≥s to *i, but the second half of the old diphthong is the
    # GLIDE *j, and the clause above only contracts two SYLLABIC vowels вАФ so it never fired and
    # *dejw√≥s came out **tijw…Сz for the attested *tiЋРw…Сz (likewise *hliЋР√∞…ФЋР, *hriЋР√∞r…ФћГЋР).
    # The `_ ([-syll]|#)` context is what saves *frijaz 'free': there the *j is PREVOCALIC, the
    # onset of the next syllable rather than the tail of a diphthong, and it must survive.
    "[+syll, aperture: high, +front] [aperture: high, +front, -syll] вЖТ [length: long] вИЕ / _ ([-syll]|#)",
]

[e_to_i_before_syllable_final_nasal]
time = 0
application = "right_to_left"
name = "/e/ to /i/ before a syllable-final nasal"
description = "/e/ to /i/ before a syllable-final nasal"
definition = "e вЖТ i / _ [+nas]$"

[intervocalic_j_loss]
time = 0
name = "Loss of intervocalic *j"
description = "*/j/ is lost between vowels except after *i* (and, automatically, after *w*). The two vowels then contract вАФ same quality to a long vowel, otherwise a diphthong."
definition = [
    "j вЖТ вИЕ / [+syll] _ [+syll] // [+syll, aperture: high, +front] _",   # j-loss (kept after i; w handled by the context)
    "[+syll, aperture: low] [+syll, aperture: low] вЖТ [length: long] вИЕ",          # aa > aЋР  (same quality, e.g. aja > stƒБnti)
    "[+syll, aperture: high, stress: none] вЖТ [-syll] / [+syll] _",       # Vi, Vu > diphthong  (offglide)
]

# вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
# Common Germanic (Proto-Germanic) вАФ final stage
# This project derives Proto-Indo-European to Proto-Germanic and stops here; the
# aЋР вЖТ oЋР change below is the last Proto-Germanic change (Index Diachronica ¬І17.7).
# вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

# ¬І17.7  aЋР вЖТ oЋР: the long low vowel (older *ƒБ/*«£) rounds and backs to */oЋР/ вАФ the
# Proto-Germanic change that gives *m≈НdƒУr 'mother' its Germanic /oЋР/.
[long_a_to_long_o]
time = 160
name = "*/aЋР/ > */oЋР/"
description = "*maЋРder > *moЋРder 'mother'"
definition = "[+syll, aperture: low, length: long] вЖТ [back, rounded, labial, advancement: atr, front: none, aperture: mid]"

# ANALOGY, not a sound law. Verner's Law voices the nominative's *-s only after an unaccented
# vowel, so PIE's mobile accent splits the thematic nouns in two: barytone *wƒЇћ•k Јos gives
# *-az (the engine derives it correctly), but oxytone *trћ•n√≥s gives *-as. Germanic has *-az
# throughout вАФ the ending was levelled across the paradigm, erasing the accentual split. The
# levelling is stated here because no sound law produces it.
[lvl_nominative_z]
time = 150
name = "The nominative *-az is levelled across the thematic nouns"
description = "ANALOGICAL вАФ Verner leaves oxytones with *-as (*√Њurnas); Germanic levels the *-az of the barytone type (*wulfaz) onto them"
definition = "s вЖТ z / [+syll] _ #"

# A nasal is lost before */x/, nasalising the vowel and lengthening it: *wonkos > *w…СћГЋРx…Сz.
#
# This is PROTO-GERMANIC and belongs here, before the 200 checkpoint вАФ it is not the West
# Germanic nasal-spirant law (t=300) further down, which does the same thing before *f, *ќЄ and
# *s. The two were one rule, targeting any voiceless fricative, and the gold says they are not:
# the only 200 form with a nasalised vowel before */x/ is *w…СћГЋРx…Сz, and NOT ONE has a nasalised
# vowel before *f, *ќЄ or *s вАФ Proto-Germanic still says *…Єim…Є 'five', and only later West
# Germanic makes it *fƒЂf. Same change, two different centuries; *x simply goes first.
# Dated 180: after `long_a_to_long_o` (160), not before it. The long *…СћГЋР this rule makes is a LOW
# vowel, and run any earlier that rule rounds it to *…ФћГЋР вАФ **w…ФћГЋРx…Сz for the attested *w…СћГЋРx…Сz. The
# rounding cannot simply skip the nasals, because a nasal *…СћГЋР rounding to *…ФћГЋР is exactly how the
# *-«≠ ending is derived. So the vowel must be lengthened after the rounding has already gone by.
[pgmc_nasal_loss_before_x]
time = 180
name = "A nasal is lost before */x/, nasalising and lengthening the vowel"
description = "*wonkos > *w…СћГЋРx…Сz 'wough' вАФ the Proto-Germanic half of the nasal-spirant law"
definition = [
    "[+syll] вЖТ [length: long, +nas] / _ [+cons, nasal: 1] x",
    "[+cons, nasal: 1] вЖТ вИЕ / [+syll, length: long] _ x",
]

# вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
# Proto-Germanic вЖТ Old English. Minkova, A Historical Phonology of English.
# вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА

# The Ingvaeonic nasal-spirant law: a nasal is lost before a voiceless fricative and the
# vowel lengthens to compensate вАФ Gothic mun√Њs vs OE m≈Ђ√Њ 'mouth', Gothic uns vs OE ≈Ђs
# (Minkova ¬І3.4, n. 8). Two rules, as in latin_to_french's ns-loss: lengthen, then delete,
# so the deletion can require the length it is compensating for.
[wg_nasal_spirant_lengthening]
time = 300
name = "Vowel lengthens before a nasal + voiceless fricative"
description = "Minkova ¬І3.4 n.8 вАФ the first half of the Ingvaeonic nasal-spirant law"
definition = "[+syll] вЖТ [length: long] / _ [+cons, nasal: 1] [-son, +cont, -voice]"

[wg_nasal_spirant_loss]
time = 310
name = "Nasal lost before a voiceless fricative"
description = "*gans > g≈Нs, *tan√Њs > t≈Н√Њ, *fimf > fƒЂf вАФ the compensating length is already in place"
definition = "[+cons, nasal: 1] вЖТ вИЕ / [+syll, length: long] _ [-son, +cont, -voice]"

# West Germanic loses final *-z (PGmc *wulfaz > *wulfa), and the final short vowel then
# apocopates (*wulfa > OE wulf). The apocope needs an earlier vowel in the word, or it would
# eat the vowel of a monosyllable (*k≈Ђ 'cow').
# The vowel the nasal-spirant law lengthened is also rounded when it is /a/: *gans > g≈Нs,
# *tan√Њs > t≈Н√Њ (Minkova ¬І3.4). Only that vowel вАФ the context is the fricative it lengthened
# before, which is still standing вАФ so other long /aЋР/ is untouched.
[wg_nasal_spirant_rounding]
time = 320
name = "The lengthened a rounds to oЋР before the fricative"
description = "*gans > gaЋРs > g≈Нs; *fimf > fƒЂf and *uns > ≈Ђs keep their vowel, being high already"
definition = "[+syll, length: long, aperture: low, rounded: none] вЖТ oЋР / _ [-son, +cont, -voice]"

# West Germanic a-umlaut: a short high vowel lowers before a non-high vowel in the next
# syllable вАФ PrG *gul√Њam > OE gold, *kurnƒЕ > corn (Minkova ¬І3.4 n.9). It must run before the
# apocope below, which destroys the conditioning vowel.
[wg_a_umlaut]
time = 350
name = "a-umlaut: short u, i lower before a non-high vowel"
description = "Minkova ¬І3.4 n.9. Held before a lateral вАФ *fullaz > full, *wulfaz > wulf keep their u, while *kurnƒЕ > corn and *√Њurnaz > √Њorn lower across r. (OE gold < *gul√Њam is a known counterexample to the l-blocking; the change is irregular.)"
# The *u half ONLY. The lowering of *i is `pgmc_i_lowering` (t=50) and has already run; repeating
# it here, with no restriction on the intervening consonants, lowered the /i/ of words Old English
# keeps it in вАФ OE fisc, cwic, niƒ°on against our **fesc, **cwec, **neƒ°on.
#
# And the *i-lowering is doubtful even in principle. Kroonen reconstructs BOTH *fiska- (< *pisk-o-,
# cf. Lat. piscis) and *nista- 'nest' (< *ni-zd-o-) with an /i/ вАФ his 'nest' is *nista-, not the
# *nestƒЕ our Wiktionary gold gives вАФ so there may be no regular a-umlaut of *i in Germanic at all.
# Ringe's bibliography cites Lloyd, "Is there an a-umlaut of i in Germanic?", on exactly this.
# The *u half is not in doubt (*kurnƒЕ > corn, *√Њurnaz > √Њorn), so that is what this rule keeps.
definition = "[+syll, aperture: high, length: short, +back] вЖТ [aperture: mid] / _ [-syll, lateral: none]* [+syll, aperture: !high]"

[wg_final_z_loss]
time = 400
name = "Final -z is lost in West Germanic"
description = "PGmc *wulfaz > *wulfa"
definition = "z вЖТ вИЕ / _ #"

# Rhotacism: the *z left over becomes /r/ (Minkova ¬І3.4.1 вАФ "original /z/, an allophone of /s/
# between vowels, became /r/ вА¶ the OE form lƒБr 'lore' corresponds to PrG *laiz- 'to teach'").
# Old English has no /z/ phoneme at all, so every surviving one had to go somewhere, and *bewzƒЕ
# was still coming out **beowz against an attested *beoЋРr.
#
# Ordered AFTER the final *-z loss above, and that is the whole difficulty: run it first and the
# nominative *-az of *an√Њeraz rhotacises to **-ar instead of dropping, wrecking every a-stem in
# the lexicon. The ending must be gone before the rule is allowed to look.
[wg_rhotacism]
time = 405
name = "Rhotacism: *z > *r"
description = "PrG *laiz- > OE lƒБr; *bewzƒЕ > *beoЋРr 'beer'; *mazgƒЕ > *m√¶…Сrx 'marrow'"
definition = "z вЖТ r"

# Final *-a and *-i are lost outright (*wulfa > wulf, *wara > w√¶r). Final *-u is not: it
# survives after a light syllable (*sunu > sunu, *medu > medu) and goes only after a heavy one
# вАФ Old English high-vowel deletion. A heavy syllable is one with a long vowel or a closing
# consonant, hence the two contexts.
# The Proto-Germanic feminine ≈Н-stem ending *-≈Н becomes *-u, and then the light/heavy split the
# language already has takes over: `oe_high_vowel_deletion` (460) keeps it after a light syllable
# and deletes it after a heavy one. The gold shows exactly that вАФ *sk…Сr…ФЋР >  Г…Сru and *snuz…ФЋР >
# snoru (light), against *wull…ФЋР > wull, *mizd…ФЋР > meЋРd, *ќЄew√∞ћ†…ФЋР > ќЄeoЋРd (heavy). Nothing else
# was carrying the ending across, so it survived to Old English as a full *-…ФЋР.
[oe_final_long_o_to_u]
time = 440
name = "The ≈Н-stem ending *-≈Н becomes *-u"
description = "*sk…Сr…ФЋР >  Г…Сru, *wull…ФЋР > wull вАФ the high-vowel deletion then splits them"
definition = "[+syll, aperture: mid, +back, +rounded, length: long, nasal: none] вЖТ u / [+syll] []* _ #"

[wg_final_apocope]
time = 450
name = "Final short a, i apocopate in a polysyllable"
description = "*wulfa > wulf, *wara > w√¶r. Rounded -u is spared here and handled next"
# `aperture: !high` вАФ the final short HIGH vowels (*i, *u) are not this rule's business. Ringe &
# Taylor ¬І6.8.1: "short *i and *u were lost word-finally after a HEAVY syllable", which is a
# weight-sensitive change and belongs to `oe_high_vowel_deletion` below. Deleting them here, in any
# polysyllable, took the *-i of *st√¶di with it вАФ where Ringe has *st√¶di > OE stedi > stede.
definition = "[+syll, length: short, rounded: none, aperture: !high] вЖТ вИЕ / [+syll] []* _ #"

# Ringe & Taylor, *The Development of Old English* ¬І3.1.3: "In PWGmc labiovelars were resolved
# into sequences of velar + *w" вАФ Proto-Germanic's single *k Ј and *x Ј become the CLUSTERS the
# gold's Old English column writes (*k Јik Ј…Сz > cwic ЋИkwik, *x Ј…Сl…Сz > hw√¶l ЋИxw√¶l). PGmc is
# transcribed with the labiovelar and OE with the cluster, so this is a change to derive, not a
# convention to normalise.
#
# The word-final ones DELABIALISE instead, and Ringe is explicit that this comes FIRST:
# "originally word-final labiovelars simply lost their labialization before the resolution of
# labiovelars into velar + *w sequences". Hence two rules, the loss ordered before the split вАФ
# which is what gives *k Јik Ј…Сz its two different outcomes, `kwвА¶k`, in one word.
#
# Dated after the apocope (450), which is what makes the second *k Ј of *k Јik Ј…Сz word-final in the
# first place; and after OE palatalisation (410), or the *k freed by the resolution would stand
# before a front vowel and affricate вАФ **chwic for cwic.
[oe_final_labiovelar_delabialisation]
time = 470
name = "A word-final labiovelar loses its labialisation"
description = "Ringe & Taylor ¬І3.1.3 вАФ *k Јik Ј > *k Јik, before the resolution below"
definition = [
    "k Ј вЖТ k / _ #",
    "x Ј вЖТ x / _ #",
]

[oe_labiovelar_resolution]
time = 480
name = "Labiovelars resolve into velar + w"
description = "Ringe & Taylor ¬І3.1.3 вАФ PWGmc *k Ј, *x Ј > *kw, *xw (cwic, hw√¶l)"
definition = [
    "k Ј вЖТ k w",
    "x Ј вЖТ x w",
]

# The n-stem nominative *-√і becomes Old English *-a: *uxs…ФЋРЋР > oxa, *ne…Є…ФЋРЋР > nefa, *…£um…ФЋРЋР >
# guma, and every ordinal (*fe√∞ћ†urќЄћ†…ФЋРЋР > feor√Њa). It is the OVERLONG that identifies it вАФ the
# ≈Н-stem *-≈Н is merely long and becomes *-u instead (t=440 above) вАФ so this rule has to run while
# the two are still distinguishable, and `oe_overlong_shortening` has been moved from 250 to 465
# to keep them apart until they have each been dealt with. Merged early, the n-stems were taking
# the ≈Н-stem's *-u and coming out **nefu, **guma-less oks.
#
# And it must run AFTER the apocope (450), which deletes a final short unrounded vowel in a
# polysyllable and would take this *-a straight back off again. That ordering is why the ending
# arrives as an overlong and leaves as a short *-a rather than being made short any earlier.
[oe_final_overlong_to_a]
time = 455
name = "The n-stem ending *-√і becomes *-a"
description = "*uxs…ФЋРЋР > oxa, *ne…Є…ФЋРЋР > nefa, *fe√∞ћ†urќЄћ†…ФЋРЋР > feor√Њa"
definition = "[+syll, length: overlong] вЖТ …С / [+syll] []* _ #"

# The weak (≈Нn-stem) feminine *-«≠ becomes Old English *-e: *x…ФЋРr…ФћГЋР > h≈Нre, *wi√∞ћ†uw…ФћГЋР > widuwe,
# *k Јen…ФћГЋР > cwene. The NASAL is what tells it apart from the strong ≈Н-stem *-≈Н, which is oral
# and becomes *-u (t=440) вАФ the same two declensions that the Proto-Germanic column keeps apart
# with its tilde. After the apocope (450), like the *-a above, or it would be deleted again.
[oe_final_nasal_o_to_e]
time = 456
name = "The weak ≈Нn-stem ending *-«≠ becomes *-e"
description = "*x…ФЋРr…ФћГЋР > h≈Нre, *wi√∞ћ†uw…ФћГЋР > widuwe, *k Јen…ФћГЋР > cwene"
definition = "[+syll, nasal, length: long] вЖТ e / [+syll] []* _ #"

[oe_high_vowel_deletion]
time = 460
name = "Final -u is deleted after a heavy syllable, kept after a light one"
description = "*wulfu-type > wulf, but *sunu, *medu keep it вАФ the OE light/heavy split"
# Ringe & Taylor ¬І6.8.1: "short *i AND *u were lost word-finally after a heavy syllable." It was
# written for *u alone (`rounded: 1`), so every final *-i escaped it and fell to the general
# apocope instead, which is weight-blind вАФ *st√¶di lost its ending outright where OE has stede.
definition = [
    "[+syll, length: short, aperture: high] вЖТ вИЕ / [+syll, length: long] [-syll]* _ #",
    "[+syll, length: short, aperture: high] вЖТ вИЕ / [+syll] [-syll] [-syll]+ _ #",
]

# Anglo-Frisian brightening: Germanic /a/ fronts to /√¶/, but not before a nasal, where it
# stays back (Minkova p. 7749: "the fronting of /a/ was prevented by a following nasal").
# Stated on FEATURES, for the same reason as the diphthong shift above: written `…С вЖТ √¶` the rule
# matched the LETTER …С, and most of the /…С/ in the lexicon is not the letter вАФ it is a feature
# bundle `non_high_back_merger` made out of PIE *o. So the brightening fired on some words and
# passed silently over *b…Сraz, *x…Сslaz, *k…Сldaz, *…£…Сrdaz, which look identical on the page. It
# was the largest single error class left at Old English, and it was never a phonological
# question at all: the rule was simply looking for the wrong kind of thing.
#
# SHORT only. The long …СЋР that `oe_diphthong_shift` has just made out of *ai must not be fronted
# вАФ that is Minkova's whole point in ordering the two (stƒБn, not **st√¶n).
# The thematic *-a (what is left of *-az once `wg_final_z_loss` has taken the *z) goes EARLY вАФ
# before palatalisation вАФ while the *-i of an i-stem must survive to trigger i-mutation at 420 and
# only apocopates later (`wg_final_apocope`, 450). One rule cannot do both, and running them
# together at 450 kept *ainaga's *g company until long after palatalisation had looked at it: the
# *g was intervocalic before a BACK vowel, which correctly blocks, so «£niƒ° came out **«£nag.
# Lose the *-a first and the *g is word-final after a front vowel, which is exactly Ringe &
# Taylor's environment (4) вАФ the clause added to `oe_palatalisation` below.
[wg_final_a_apocope]
time = 402
name = "The thematic final *-a apocopates"
description = "*…Сjn…С…£…С > *…Сjn…С…£ вАФ early, so the *…£ is word-final when palatalisation looks"
definition = "[+syll, length: short, +back, rounded: none] вЖТ вИЕ / [+syll] []* _ #"

# A final short *-i that survives the weight test above lowers to *-e вАФ Ringe & Taylor's own
# chain is *stadiz > *st√¶di > OE stedi > *stede*. This is what puts the final vowel on mere, here,
# stede and the rest of the light-stemmed i-stems.
[oe_final_i_to_e]
time = 470
name = "A surviving final *-i lowers to *-e"
description = "R&T ¬І6.6.2 вАФ *st√¶di > stedi > stede; *mari > mere"
definition = "[+syll, length: short, aperture: high, +front] вЖТ e / [+syll] []* _ #"

[oe_a_fronting]
time = 406
name = "Anglo-Frisian brightening: a > √¶, except before a nasal"
description = "Minkova ¬І3.4 вАФ blocked before a nasal (*and stays and, not *√¶nd)"
definition = "[+syll, -cons, aperture: low, +back, length: short] вЖТ [+front, back: none, advancement: atr] / _ [nasal: none]"

[oe_unstressed_ae_to_e]
time = 410
name = "Unstressed */√¶/ > */e/"
description = """The brightened *√¶ does not survive unstressed. Ringe ¬І5.3.2 (iii), arguing that
Proto-Germanic had *a before *r and not *e, notes in passing exactly what happens to it afterwards:

  "...that is precisely the area in which PGmc *a was fronted (except before nasals) and typically
   appears as e when unstressed."

So *an√Њaraz > (brightening) *an√Њ√¶raz > OE ≈Н√Њer, with the *√¶ of an unstressed syllable levelled to
*e. Dated immediately after `oe_a_fronting`, which is what creates the *√¶ for it to lower."""
definition = "[+syll, -cons, aperture: low, +front, length: short, stress: none] вЖТ [aperture: mid]"

# West Germanic hardens the Proto-Germanic bilabial fricative to a labiodental: *f≈Нts > f≈Нt,
# *fuhsaz > fox, *fullaz > full (Minkova ¬І4.1 вАФ OE has /f/, not /…Є/).
[wg_f_hardening]
time = 250
name = "…Є becomes f"
definition = "…Є вЖТ f"


# I-Mutation (Minkova ¬І6.3): a back vowel fronts when the next syllable holds /i/ or /j/ вАФ
# *mahtiz > miht, *kin√Њiz > cynd, the change behind FOOT-FEET and FULL-FILL. It has to run
# before the apocope above, which is what destroys the conditioning /i/.
[oe_i_mutation]
time = 420
name = "I-Mutation: a back vowel fronts before i or j in the next syllable"
description = "Minkova ¬І6.3 вАФ FOOT-FEET, FULL-FILL, SELL-SALE"
# The /j/ must be in the NEXT syllable, so the span before it cannot be empty вАФ written
# `[-syll]*` the wildcard matched nothing at all, and the OFFGLIDE of the vowel's own diphthong
# triggered the mutation. *hailaz has no /i/ anywhere in its ending and must not front: it is OE
# hƒБl, not **h√¶l. Written `[-syll][-syll]*` a real consonant has to intervene, which is what
# "next syllable" means, and *hagj≈Н (OE hecg) still mutates across its /…£/ exactly as before.
# Ringe & Taylor ¬І6.6.2, "Raising of *√¶": "In addition to the back vowels treated above, one
# FRONT vowel was affected by i-umlaut: low front *√¶ was raised to e. There are fifty-odd examples
# of raising by *i, *ƒЂ, or *j in the following syllable." Their own example is one of ours вАФ
# PGmc *stadiz > *st√¶di > OE stedi > stede вАФ and it is what gives mere, heƒЛƒ° and here their /e/.
# The two clauses above only front a BACK vowel; √¶ is already front, so nothing reached it.
definition = [
    "[+syll, +back] вЖТ [+front, back: none] / _ [-syll]* [+syll, aperture: high, +front]",
    "[+syll, +back] вЖТ [+front, back: none] / _ [-syll][-syll]* j",
    "[+syll, aperture: low, +front] вЖТ [aperture: mid] / _ [-syll]* [+syll, aperture: high, +front]",
    "[+syll, aperture: low, +front] вЖТ [aperture: mid] / _ [-syll][-syll]* j",
]

# West Germanic hardens the voiced velar fricative to a stop: *trugaz > trog, *jungaz > jung.
[wg_g_hardening]
time = 405
name = "…£ becomes g"
definition = "…£ вЖТ g"

# The velar fricative becomes a stop before /s/: PGmc *fuhsaz > OE fox /foks/.
[oe_x_before_s]
time = 440
name = "x becomes k before s"
definition = "x вЖТ k / _ s"

# Artikulatorischer Sprung вАФ assimilation at a distance. A labiovelar *k Ј becomes *p when the
# word holds another PLAIN labial, on either side of it:
#   *p√©nk Јe   > *p√©mpe  > *fimf   (five)   вАФ trigger *p, before
#   *w√Їlk Јos  > *w√Їlpos > *wulfaz (wolf)   вАФ trigger *w, before
#   *k ЈetwбєУr            > *fedw≈Нr (four)   вАФ trigger *w, AFTER (see the note in `description`)
# Without it these would be **finhw, **wulhwaz вАФ the regular /x Ј/ Grimm's Law gives, which is
# what the engine derived before this rule existed.
#
# The trigger must be a plain labial, not another labiovelar, or *k Јek Јlos (wheel, PGmc
# *hwehwlaz) would be dragged in too. In this feature system w and k Ј share every place feature
# (labial, lingual, back, rounded) and part only on sonorant/continuant, so the trigger is
# written as "labial with no lingual node" (p, b, m, f) or "labial and sonorant" (w, m) вАФ both
# of which exclude the labiovelar obstruents.
#
# Pre-Germanic: it feeds Grimm's Law, which then takes the new *p to *f.
[pgmc_labial_jump]
time = -1100
name = "Artikulatorischer Sprung: k Ј > p near another labial"
description = "Assimilation at a distance вАФ five, wolf, four; *k Јek Јlos (wheel) has no plain labial and keeps its labiovelar. Treated as ONE bidirectional rule: Wiktionary instead calls four analogical (the p- of *p√©nk Јe pulling on the neighbouring numeral *k ЈetwбєУr, expected **hwedw≈Нr), but a single phonological rule covering all three вАФ with wheel as the control that correctly does not fire вАФ is the stronger account, and the direction of the trigger is the only thing that separates them."
definition = [
    "k Ј вЖТ p / [+labial, lingual: none, -syll] []* _",
    "k Ј вЖТ p / [+labial, +sonorant, -syll] []* _",
    # The FOLLOWING trigger excludes nasals. Four's trigger is the glide *w; a labial nasal in an
    # ending is not a trigger вАФ with the neuter *k Јek Јl√≥m the /m/ of *-om would otherwise fire the
    # rule and give **feќ≤lƒЕ for wheel, which is the control this rule is supposed to leave alone.
    "k Ј вЖТ p / _ []* [+labial, lingual: none, -syll, nasal: none]",
    "k Ј вЖТ p / _ []* [+labial, +sonorant, -syll, nasal: none]",
]

# A nasal takes the place of a following labial: *p√©mpe (the p-form above) has m, not n.
[pgmc_nasal_place_assimilation]
time = -1090
name = "n assimilates to a following labial"
description = "*penpe > *pempe > *fimf"
definition = "n вЖТ m / _ [+labial, -syll, lingual: none]"


# West Germanic hardens the voiced fricatives that Verner's Law and Grimm's Law left behind:
# *√∞ > d (*fader, *ealdaz > eald), *ќ≤ > f (*ubilaz > yfel). The velar …£ > g is already above.
[wg_dh_hardening]
time = 260
name = "√∞ becomes d"
description = "Minkova ¬І4.1 вАФ the Verner/Grimm voiced fricative hardens in West Germanic"
definition = "√∞ћ† вЖТ d"

[wg_b_hardening]
time = 260
name = "ќ≤ becomes f"
description = "*ubilaz > OE yfel"
definition = "ќ≤ вЖТ f"

# The three Proto-Germanic diphthongs reach Old English, and NOTHING was carrying them there:
# *ai, *au and *eu were surviving to the 900 checkpoint untouched, so *hailaz came out **hajl for
# the attested hƒБl, *dau√Њuz **d…СwќЄ for dƒУa√Њ, *bewzƒЕ **beowr for bƒУor. This was the single largest
# hole in the cascade вАФ the 200вЖТ900 rules were breaking 110 words that were already exact at
# Proto-Germanic, and these three account for a good share of them.
#
#   *ai > ƒБ   (Gmc *stain-, *haim-, *aigan- > OE stƒБn, hƒБm, ƒБgan)
#   *au > ƒУa
#   *eu > ƒУo
#
# The DATE is Minkova's, and it is the whole point of the rule (¬І6.5.2): the monophthongisation
# of *ai is "held to have occurred AFTER the fronting of /aЋР/ to /√¶ЋР/" вАФ so the long vowel it
# makes must come out the far side of the fronting still BACK. That is why Old English has a low
# back ƒБ at all, and why stƒБn is not **st√¶n.
#
# Which puts it at 480, BEFORE `oe_a_fronting` (500) rather than after вАФ because that rule is the
# short-a brightening (a > √¶), not the long-ƒБ fronting Minkova is ordering against, and letters
# match by identity here, so it cannot touch the long …СЋР this rule produces. Dated 520 instead,
# the rule simply never fires: the brightening has already turned the *…С of *…Сj into *√¶ and there
# is no *…Сj left to match. Same relative chronology, read off the right rule.
# It must also stay before `oe_breaking` (550), which would otherwise take the *eu of *bewzƒЕ for
# a plain /e/ and break it a second time.
[oe_diphthong_shift]
time = 404
name = "The Proto-Germanic diphthongs: *ai > ƒБ, *au > ƒУa, *eu > ƒУo"
description = "Minkova ¬І6.5.2 вАФ Gmc *stain- > OE stƒБn; *dau√Њuz > dƒУa√Њ; *bewzƒЕ > bƒУor"
# Stated on FEATURES, not on the letter …С. Letter patterns match by identity here, and the /…С/
# these diphthongs carry is not always the letter вАФ *…Сjn…С…£…Сz has one the segmenter read straight
# from the input, while *ojtos got its own from `non_high_back_merger`, a feature merge. Written
# `…С j` the rule fired on *hailaz and silently passed over *ai√Њaz, which looks identical on the
# page. The low back vowel is what the change is about, so that is what the rule asks for.
definition = [
    "[+syll, -cons, aperture: low, +back] j вЖТ [length: long] вИЕ",
    "[+syll, -cons, aperture: low, +back] w вЖТ [+front, back: none, advancement: atr] …СЋР",
    "[+syll, -cons, aperture: mid, +front] w вЖТ [+syll] oЋР",
]

# Old English breaking: a front vowel diphthongises before /r/ or /l/ + consonant, and before
# /x/ вАФ *arm > earm, *ald > eald, *hert > heorte, *dau√Њ > dƒУa√Њ (Minkova ¬І6, the OE diphthongs).
[oe_breaking]
time = 408
name = "Breaking: front vowels diphthongise before r/l + C and before x"
description = "√¶ > √¶…С, e > eo вАФ the source of OE's eald, earm, heorte"
# On features again вАФ the √¶ that `oe_a_fronting` now makes is a merged bundle, not the letter,
# so a letter-matching `√¶ вЖТ √¶…С` looked straight past *k√¶ld and *…£√¶rd. Third rule with the same
# defect; they were all written when most of these vowels still arrived as letters.
# The vowel is matched on FEATURES but the result is written as LETTERS: a one-to-two expansion
# has to take the replacement path, because a bundle merge across unequal counts is ambiguous and
# the rule simply never fires. So the left side asks for a front vowel (however it was made) and
# the right side spells the diphthong out.
definition = [
    "[+syll, -cons, aperture: low, +front] вЖТ √¶ …С / _ [+son, -syll, +cons, nasal: none] [+cons]",
    "[+syll, -cons, aperture: mid, +front] вЖТ e o / _ [+son, -syll, +cons, nasal: none] [+cons]",
    "[+syll, -cons, aperture: low, +front] вЖТ √¶ …С / _ x",
    "[+syll, -cons, aperture: mid, +front] вЖТ e o / _ x",
]

# The Proto-Germanic long mid vowels raise on the way to Old English: ≈Н […ФЋР] > [oЋР] (*d≈Нmaz >
# d≈Нm, *fl≈Нduz > fl≈Нd) and ƒУ […ЫЋР] > [eЋР]. The gold keeps the two apart вАФ PGmc is transcribed
# with …ФЋР/…ЫЋР and OE with oЋР/eЋР вАФ so this is a change to derive, not a convention to normalise.
[wg_long_mid_raising]
time = 250
name = "Long …ФЋР, …ЫЋР raise to oЋР, eЋР"
description = "PGmc ≈Н […ФЋР] > OE ≈Н [oЋР]; ƒУ […ЫЋР] > [eЋР]"
definition = "[+syll, length: long, aperture: mid, advancement: !atr] вЖТ [advancement: atr]"

# Proto-Germanic's long mid vowels are open: *≈Н is […ФЋР] and *ƒУ is […ЫЋР] (which is why the gold
# transcribes them so). The cascade above merges *ƒБ into a close *oЋР, so lower both here вАФ and
# `wg_long_mid_raising` then lifts them again on the way to Old English, where ≈Н really is
# [oЋР]. The two rules together are the ≈Н/ƒУ history, and each checkpoint sees its own value.
