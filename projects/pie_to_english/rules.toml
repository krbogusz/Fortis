# ‚ĒÄ‚ĒÄ‚ĒÄ The pre-/r/ vowels, all of them dated BEFORE pde_r_loss (1750) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Non-rhotic RP does not simply drop the /r/ ‚ÄĒ the vowel in front of it went its own way first,
# and each of these has to be stated while the /r/ that conditions it is still on the page.
#
# AND WHILE IT IS STILL AN /r/. eme_rhotic_approximant turns the trill into RP's approximant /…Ļ/
# at 1900, long after every one of these has fired; written with the …Ļ they name a segment that
# does not exist yet and not one of them matched. The same trap as eme_th_voicing's dental.

[pde_nurse_vowel]
time = 1740
name = "NURSE: a stressed short vowel before coda /r/ becomes /…úňź/"
description = """ME wurd, herd, first, bird > RP /w…úňźd/, /h…úňźd/, /f…úňźst/, /b…úňźd/.

STRESSED, and the gold is blunt about it. The unstressed *-er of acre, beaver, finger, brother,
daughter is the very same short-vowel-before-coda-/r/, and RP has a plain schwa there: an
unrestricted rule gave **e…™k…úňź, **biňźv…úňź, **f…™Ňčg…úňź. It also reached into the OFFGLIDE of sour's
/a ä/ and gave **sa…úňź ‚ÄĒ an unstressed vowel again, and the same restriction rules it out.

It is not the NORTH vowel either: ME corn, horn, thorn, stork have RP /…Ēňź/, not /…úňź/. They are kept
out by DATE rather than by a clause ‚ÄĒ pde_north_vowel (1735) has already lengthened their /…Ē/, and
this rule asks for a SHORT vowel."""
definition = "[+syll, length: short, stress: primary, aperture: !low] ‚Üí …úňź / _ r [-syll]* $"

[pde_centring_diphthongs]
time = 1745
name = "NEAR, SQUARE, CURE: a long vowel before /…Ļ/ takes a schwa offglide"
description = """RP's centring diphthongs. The Great Vowel Shift has already raised the vowel; the
/…Ļ/ then breaks into a schwa as it goes ‚ÄĒ beer /b…™…ô/, deer /d…™…ô/, share / É…õ…ô/, sour /sa ä…ô/.

Dated 1745: after the shift (1600), which decides WHICH vowel is there, and before pde_r_loss."""
definition = [
    "iňź ‚Üí …™ …ô / _ r",
    "…õňź ‚Üí …õ …ô / _ r",
    "uňź ‚Üí  ä …ô / _ r",
]

[pde_force_vowel]
time = 1650
name = "FORCE: a long back vowel before /r/ lowers to /…Ēňź/"
description = """ME flŇćr, hŇćr, bŇćrd end at RP floor /fl…Ēňź/, whore /h…Ēňź/, board /b…Ēňźd/ ‚ÄĒ the /r/
lowers the vowel instead of letting it raise.

AFTER the Great Vowel Shift (1600), and written on the shift's OUTPUT. Dated before it, as
