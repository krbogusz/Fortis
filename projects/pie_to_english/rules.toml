description = """*√ĺunnuz, *swŇćtuz are u-stem adjectives in Proto-Germanic but I-STEMS in Old English:
√ĺynne, swńďte. The i-stem *-i fronts the stem vowel the way any i-mutation does (u > y, Ňć > ńď), and
