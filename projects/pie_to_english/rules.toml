rule list applies once, so a chain of raisings needs one date per link.

    ME drńďm, strńďm, mńďd, bńďver  >  RP dream, stream, mead, beaver ‚ÄĒ all /iňź/."""
definition = "eňź ‚Üí iňź"

[pde_face_vowel]
