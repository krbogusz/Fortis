# RP is non-rhotic: /r/ is lost in the CODA, and the vowel before it lengthens to compensate ‚ÄĒ
# arm /…Ďňźm/, four /f…Ēňź/ (Minkova ¬ß5.2). The generalisation is the syllable position, so it is
# written with the syllable boundary `$` rather than by enumerating the environments it shows
# up in (before a consonant, before a word edge) ‚ÄĒ the form re-syllabifies before every rule,
# so `$` always reflects current structure. "In the coda" is `_ [-syll]* $`, not `_ $`: in arm
# and corn the /r/ sits inside the coda with a consonant after it, so it is not adjacent to the
# boundary. An onset /r/ (red, arrow) is untouched, the boundary falling before it, not after.
