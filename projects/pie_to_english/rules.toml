# The Proto-Germanic voiced fricatives *ő≤ √į …£ (from Grimm's third series and from Verner) are
# realised as the STOPS b, d, g word-initially and after a homorganic nasal ‚ÄĒ and, for *√į, after
# /l/ too: *kaldaz, *mundiz. Elsewhere they stay fricatives, which is why the attested forms show
