# Common Germanic (Proto-Germanic) ‚ÄĒ final stage
# This project derives Proto-Indo-European to Proto-Germanic and stops here; the
# aňź ‚Üí oňź change below is the last Proto-Germanic change (Index Diachronica ¬ß17.7).
