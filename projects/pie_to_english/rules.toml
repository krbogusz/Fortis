[ts_simplification]
time = -950
name = "The double-dental cluster *ts simplifies to *s before a vowel"
description = """Ringe ¬ß5.2.1 (i): *ts "simplified to *s when a long vowel, a diphthong, or a
consonant immediately preceded". *weyds√≥s > *wńęsaz, *swŠłód įh‚āĀsos > *swńďsaz.

THE ENVIRONMENT IS COMPLETED BY WHAT FOLLOWS, and that is what an earlier pass missed. Written as
Ringe states it ‚ÄĒ on what precedes alone ‚ÄĒ the rule cannot be had: *pŠĻďds > *fŇćts and *wrŇćds >
*wrŇćts have the same long vowel and the same *ts and they KEEP it (OE fŇćt, wyrt). But they are not
indistinguishable at all. In *fŇćts and *wrŇćts the cluster is WORD-FINAL; in *wńęsaz and *swńďsaz a
vowel follows it. Say "before a vowel" and both sides come out right, and Ringe's footnote 9 ‚ÄĒ the
doubt about whether *wńęsaz ever had the cluster ‚ÄĒ is not needed to explain the exception.

t = -950, AFTER Grimm (-1000). The *ts does not exist before then: it is Grimm devoicing the *d of
PIE *weyd-s-, and a rule dated earlier has nothing to match. Which is also why the DIPHTHONG clause
is not redundant with the long-vowel one ‚ÄĒ at this date *wńęsaz is still *wejtsos, with the glide."""
definition = [
    "t ‚Üí ‚ąÖ / [+syll, length: long] _ s [+syll]",
    "t ‚Üí ‚ąÖ / [-syll] _ s [+syll]",
]

[oe_anglian_smoothing]
time = 412
name = "Anglian smoothing before /x/ + consonant"
description = """Anglian (Ringe & Taylor ¬ß7.3) undoes breaking before a velar: the diphthong that
oe_breaking made in front of an *h collapses back to a monophthong. Present-Day English descends
from the Anglian dialects, not West Saxon, and the modern words are the Anglian outcome ‚ÄĒ niht >
night, riht > right, miht > might. Restricted to *h + CONSONANT (the *ht cluster): word-final and
pre-vocalic *h keep their West Saxon diphthong in the gold (feax, eoh), so the smoothing there
would trade one dialect's words for the other's. Pinned to *ht specifically ‚ÄĒ *fax keeps its West
Saxon *feax in the gold, and *hs is a velar + consonant too."""
definition = ["e o ‚Üí e ‚ąÖ / _ x t", "√¶ …Ď ‚Üí √¶ ‚ąÖ / _ x t"]

[oe_anglian_raising]
time = 425
name = "Anglian raising to *i before /xt/"
description = """The smoothed vowel raises to *i before the *ht cluster ‚ÄĒ Anglian niht, riht, miht,
liht, the direct ancestors of night, right, might, light. Both *e (from the i-mutated *m√¶ht) and
the plain *√¶ of *n√¶ht (no i-mutation trigger ‚ÄĒ its ending is *-s) raise; Anglian has one outcome
before *ht regardless of how the vowel got there."""
definition = ["e ‚Üí i / _ x t", "√¶ ‚Üí i / _ x t"]

[oe_anglian_smoothing_liquid]
time = 426
name = "Anglian smoothing of the i-mutated broken diphthong to /e/"
description = """The West Saxon *ie (i-mutation of the broken *ea) is a plain *e in Anglian:
WS sńčiell, ierfe > Anglian sńčell, erfe. Our cascade derives the diphthong as *√¶e (breaking makes
*√¶…Ď, i-mutation fronts the *…Ď), and this collapses it to the Anglian monophthong ‚ÄĒ the same
dialect choice, and the same source, as the *iy the gold normalisation (anglianise) removes from
the West Saxon targets. The two are one change seen from the two ends: the rule brings our
DERIVATION to Anglian, the gold step brings the West Saxon TARGETS to Anglian, and they meet.

Only the i-mutated *√¶e ‚ÄĒ NOT the plain broken *eo of weorc, beorg, feorh, which the gold keeps as
a West Saxon diphthong (there is no Anglian normalisation of those in the column, so smoothing them
would trade a West-Saxon-gold word for nothing)."""
definition = "√¶ e ‚Üí e ‚ąÖ / _ [+cons, -syll]"


# ‚ĒÄ‚ĒÄ‚ĒÄ SPORADIC MORPHOLOGICAL CHANGES ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Reanalysis, leveling, rebracketing and compounding are NOT regular sound changes ‚ÄĒ they act on
# individual words, not on every word in an environment, so they are word-scoped (`words = [...]`)
# and marked SPORADIC. Each is justified by the attested Old English morphology, which is the
# evidence that the word underwent the change, exactly as a Verner-voiced consonant is the evidence
# for a PIE accent. They are separated from the sound-law cascade so the regular accuracy stays
# legible; SOURCE.md reports the two figures apart.

[sporadic_weak_reanalysis_final_e]
time = 476
name = "SPORADIC (reanalysis): a u-/Ňć-stem noun transfers to the weak/i-stem and takes final -e"
description = """The Old English endings are attested: *anguz > ange, *tulguz > tulge (u-stems
that moved to the i/ja-declension), *muld«≠ > molde (the strong Ňć-stem 'earth' is a WEAK feminine
in Old English). Each gained a final *-e the strong stem did not have ‚ÄĒ a paradigm transfer, not a
sound change, so it fires only on these words. Dated 476, after every apocope that would strip it."""
words = ["anguz", "tulguz", "muldŇć", "thin", "sweet"]
definition = "‚ąÖ ‚Üí e / [-syll] _ #"

[sporadic_nstem_gender_e]
time = 476
name = "SPORADIC (reanalysis): the neuter n-stem *hert√ī is feminine in OE, ending -e not -a"
description = """*hert√ī is a NEUTER n-stem in Proto-Germanic (Wiktionary: *hert√ī n) and takes the
regular masculine/neuter weak ending *-a in our cascade (as guma, nama do). But Old English heorte
is FEMININE, with *-e ‚ÄĒ the word changed gender, and the ending followed. A lexical reassignment,
not a sound change."""
