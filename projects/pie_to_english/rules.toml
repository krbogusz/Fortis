and eme_goat_diphthongisation finishes the job: floor came out **fl…ô ä. So the rule takes the /uňź/
the shift leaves and lowers THAT. The /uňź/ of sour is already an /a ä/ by now and is not touched."""
definition = "uňź ‚Üí …Ēňź / _ r"

[pde_meat_merger]
time = 1700
name = "The MEAT vowel joins MEET: /eňź/ raises to /iňź/"
description = """The last step of the Great Vowel Shift, and it is a SEPARATE step ‚ÄĒ ME …õňź reaches
/eňź/ in the shift itself (1600) and only then goes on to /iňź/, in the eighteenth century. Written
