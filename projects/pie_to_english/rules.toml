#     HEAVY: *brŇć√ĺńďr > brŇć√ĺor, *mŇćdńďr > mŇćdor, *dohtńďr > dohtor, *swestńďr > sweostor   (-OR)
#     light: *fadńďr  > f√¶der,  *watńďr > w√¶ter                                          (-ER)
#
# A long root vowel or a consonant cluster gives *-or; a short vowel plus a single consonant gives
