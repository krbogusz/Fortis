# ¬ß17.7  aňź ‚Üí oňź: the long low vowel (older *ńĀ/*«£) rounds and backs to */oňź/ ‚ÄĒ the
# Proto-Germanic change that gives *mŇćdńďr 'mother' its Germanic /oňź/.
[long_a_to_long_o]
time = 160
name = "*/aňź/ > */oňź/"
description = "*maňźder > *moňźder 'mother'"
definition = "[+syll, aperture: low, length: long] ‚Üí [back, rounded, labial, advancement: atr, front: none, aperture: mid]"

# ANALOGY, not a sound law. Verner's Law voices the nominative's *-s only after an unaccented
# vowel, so PIE's mobile accent splits the thematic nouns in two: barytone *wńļŐ•k ∑os gives
# *-az (the engine derives it correctly), but oxytone *trŐ•n√≥s gives *-as. Germanic has *-az
# throughout ‚ÄĒ the ending was levelled across the paradigm, erasing the accentual split. The
# levelling is stated here because no sound law produces it.
[lvl_nominative_z]
time = 150
name = "The nominative *-az is levelled across the thematic nouns"
description = """ANALOGICAL ‚ÄĒ Verner leaves oxytones with *-as (*√ĺurnas); Germanic levels the *-az
of the barytone type (*wulfaz) onto them.

The vowel before it must be UNSTRESSED, because what is being levelled is a SUFFIX. Written
`/ [+syll] _ #` the rule reached every word-final *s there is, including the ones that are not a
nominative ending at all: *mŇęŐĀs 'mouse' is a monosyllabic root noun whose *s belongs to the root,
and *k ∑√©syo > *hwes, *t√≥syo > *√ĺas are pronouns. All three came out with a spurious *z. An
unstressed vowel before the *s is what identifies the ending ‚ÄĒ a thematic nominative never carries
the accent on its own suffix."""
# NOT after a consonant, though *tr√≠ns > *√ĺrinz makes it tempting: *sehs, *fŇćts, *tan√ĺs, *gans,
# *aiks, *wrŇćts, *nahts and *drŇćs all keep their *s in exactly that position. The *-z of *√ĺrinz is
# the numeral's PLURAL ending, a different morpheme from the nominative singular this rule levels,
# and one levelling cannot be read off the other. *√ĺrinz stays a miss.
definition = "s ‚Üí z / [+syll, stress: none] _ #"

# A nasal is lost before */x/, nasalising the vowel and lengthening it: *wonkos > *w…ĎŐÉňźx…Ďz.
#
# This is PROTO-GERMANIC and belongs here, before the 200 checkpoint ‚ÄĒ it is not the West
# Germanic nasal-spirant law (t=300) further down, which does the same thing before *f, *őł and
# *s. The two were one rule, targeting any voiceless fricative, and the gold says they are not:
# the only 200 form with a nasalised vowel before */x/ is *w…ĎŐÉňźx…Ďz, and NOT ONE has a nasalised
# vowel before *f, *őł or *s ‚ÄĒ Proto-Germanic still says *…łim…ł 'five', and only later West
# Germanic makes it *fńęf. Same change, two different centuries; *x simply goes first.
# Dated 180: after `long_a_to_long_o` (160), not before it. The long *…ĎŐÉňź this rule makes is a LOW
# vowel, and run any earlier that rule rounds it to *…ĒŐÉňź ‚ÄĒ **w…ĒŐÉňźx…Ďz for the attested *w…ĎŐÉňźx…Ďz. The
# rounding cannot simply skip the nasals, because a nasal *…ĎŐÉňź rounding to *…ĒŐÉňź is exactly how the
# *-«≠ ending is derived. So the vowel must be lengthened after the rounding has already gone by.
[pgmc_nasal_loss_before_x]
time = 180
name = "A nasal is lost before */x/, nasalising and lengthening the vowel"
description = "*wonkos > *w…ĎŐÉňźx…Ďz 'wough' ‚ÄĒ the Proto-Germanic half of the nasal-spirant law"
definition = [
    "[+syll] ‚Üí [length: long, +nas] / _ [+cons, nasal: 1] x",
    "[+cons, nasal: 1] ‚Üí ‚ąÖ / [+syll, length: long] _ x",
]

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Proto-Germanic ‚Üí Old English. Minkova, A Historical Phonology of English.
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

# The Ingvaeonic nasal-spirant law: a nasal is lost before a voiceless fricative and the
# vowel lengthens to compensate ‚ÄĒ Gothic mun√ĺs vs OE mŇę√ĺ 'mouth', Gothic uns vs OE Ňęs
# (Minkova ¬ß3.4, n. 8). Two rules, as in latin_to_french's ns-loss: lengthen, then delete,
# so the deletion can require the length it is compensating for.
[wg_nasal_spirant_lengthening]
time = 300
name = "Vowel lengthens before a nasal + voiceless fricative"
description = "Minkova ¬ß3.4 n.8 ‚ÄĒ the first half of the Ingvaeonic nasal-spirant law"
definition = "[+syll] ‚Üí [length: long] / _ [+cons, nasal: 1] [-son, +cont, -voice]"

[wg_nasal_spirant_loss]
time = 310
name = "Nasal lost before a voiceless fricative"
description = "*gans > gŇćs, *tan√ĺs > tŇć√ĺ, *fimf > fńęf ‚ÄĒ the compensating length is already in place"
definition = "[+cons, nasal: 1] ‚Üí ‚ąÖ / [+syll, length: long] _ [-son, +cont, -voice]"

# West Germanic loses final *-z (PGmc *wulfaz > *wulfa), and the final short vowel then
# apocopates (*wulfa > OE wulf). The apocope needs an earlier vowel in the word, or it would
# eat the vowel of a monosyllable (*kŇę 'cow').
# The vowel the nasal-spirant law lengthened is also rounded when it is /a/: *gans > gŇćs,
# *tan√ĺs > tŇć√ĺ (Minkova ¬ß3.4). Only that vowel ‚ÄĒ the context is the fricative it lengthened
# before, which is still standing ‚ÄĒ so other long /aňź/ is untouched.
[wg_nasal_spirant_rounding]
time = 320
name = "The lengthened a rounds to oňź before the fricative"
description = "*gans > gaňźs > gŇćs; *fimf > fńęf and *uns > Ňęs keep their vowel, being high already"
definition = "[+syll, length: long, aperture: low, rounded: none] ‚Üí oňź / _ [-son, +cont, -voice]"

# West Germanic a-umlaut: a short high vowel lowers before a non-high vowel in the next
# syllable ‚ÄĒ PrG *gul√ĺam > OE gold, *kurnńÖ > corn (Minkova ¬ß3.4 n.9). It must run before the
# apocope below, which destroys the conditioning vowel.
[wg_a_umlaut]
time = 350
name = "a-umlaut: short u, i lower before a non-high vowel"
description = "Minkova ¬ß3.4 n.9. Held before a lateral ‚ÄĒ *fullaz > full, *wulfaz > wulf keep their u, while *kurnńÖ > corn and *√ĺurnaz > √ĺorn lower across r. (OE gold < *gul√ĺam is a known counterexample to the l-blocking; the change is irregular.)"
# The *u half ONLY. The lowering of *i is `pgmc_i_lowering` (t=50) and has already run; repeating
# it here, with no restriction on the intervening consonants, lowered the /i/ of words Old English
# keeps it in ‚ÄĒ OE fisc, cwic, niń°on against our **fesc, **cwec, **neń°on.
#
# And the *i-lowering is doubtful even in principle. Kroonen reconstructs BOTH *fiska- (< *pisk-o-,
# cf. Lat. piscis) and *nista- 'nest' (< *ni-zd-o-) with an /i/ ‚ÄĒ his 'nest' is *nista-, not the
# *nestńÖ our Wiktionary gold gives ‚ÄĒ so there may be no regular a-umlaut of *i in Germanic at all.
# Ringe's bibliography cites Lloyd, "Is there an a-umlaut of i in Germanic?", on exactly this.
# The *u half is not in doubt (*kurnńÖ > corn, *√ĺurnaz > √ĺorn), so that is what this rule keeps.
# Held before a NASAL as well ‚ÄĒ but only one standing IMMEDIATELY after the vowel, and the gold
# draws that line itself:
#
#     *hundńÖ > OE hund, *mundŇć > mund, *gum√ī > guma, *sundraz > sundor   ‚ÄĒ nasal next: HELD
#     *hurnńÖ > OE horn, *kurnńÖ > corn, *√ĺurnaz > √ĺorn                    ‚ÄĒ an *r intervenes: LOWERS
#
# Block on a nasal ANYWHERE in the cluster and horn, corn and thorn go with it; block on none at
# all and hund, mund, guma and sundor come out **hond, **mond, **goma, **sondor. The first
# consonant is the one that decides.
# The LATERAL is the delicate one, and the gold splits it cleanly by what FOLLOWS the *l:
#
#     l + dental/velar : *hul√ĺaz > hold, *wulknńÖ > wolcen, *fulkńÖ > folc, *muld√ī > molde   LOWERS
#     l + l (geminate) : *fullaz > full, *wullŇć > wull                                     HOLDS
#     l + LABIAL       : *wulfaz > wulf                                                    HOLDS
#
# So a blanket "held before a lateral" (what stood here) costs hold, wolcen, folc and molde, while
# no lateral condition at all costs full, wull and wulf. Two clauses, and the second says exactly
# what the data says: an *l lowers unless a lateral or a labial follows it.
definition = [
    "[+syll, aperture: high, length: short, +back] ‚Üí [aperture: mid] / _ [-syll, nasal: none, lateral: none] [-syll]* [+syll, aperture: !high]",
    "[+syll, aperture: high, length: short, +back] ‚Üí [aperture: mid] / _ [-syll, +lateral] [-syll, lateral: none, labial: none] [-syll]* [+syll, aperture: !high]",
]

[wg_final_z_loss]
time = 400
name = "Final -z and -s are lost in West Germanic"
description = """PGmc *wulfaz > *wulfa.

The VOICELESS *s goes the same way, and it has to be said separately because `lvl_nominative_z`
never reached it: that rule levels the *-az of the thematic nouns, whose vowel is unstressed, and
a ROOT noun's *s sits straight after a stressed vowel or a consonant ‚ÄĒ *fŇćts, *tan√ĺs, *aiks,
*nahts, *wrŇćts. They keep the *s at Proto-Germanic, exactly as attested, and lose it here:
OE fŇćt, tŇć√ĺ, ńĀc, niht, wyrt.

Only after an OBSTRUENT, and that is not arbitrary. Every word that loses the *s has it standing
after one ‚ÄĒ *fŇćts, *tan√ĺs, *aiks, *nahts, *wrŇćts ‚ÄĒ because there the *s is the nominative ENDING
bolted onto a consonant-final root. *gans has its *s after a NASAL, and there the *s belongs to the
root itself (*«Ķ įh‚āā√©ns): OE keeps it, gŇćs. The obstruent is the phonological correlate of the
morphological fact, and without the condition goose comes out **gŇć.

Dated 400, which also matters: it is BEFORE the apocope, so a word whose *s is not yet final keeps
it. *hŇęsńÖ still has its ending here, so its *s is medial and survives ‚ÄĒ OE hŇęs, not **hŇę."""
definition = [
    "z ‚Üí ‚ąÖ / _ #",
    "s ‚Üí ‚ąÖ / [-son] _ #",
]

# Rhotacism: the *z left over becomes /r/ (Minkova ¬ß3.4.1 ‚ÄĒ "original /z/, an allophone of /s/
# between vowels, became /r/ ‚Ä¶ the OE form lńĀr 'lore' corresponds to PrG *laiz- 'to teach'").
# Old English has no /z/ phoneme at all, so every surviving one had to go somewhere, and *bewzńÖ
# was still coming out **beowz against an attested *beoňźr.
#
# Ordered AFTER the final *-z loss above, and that is the whole difficulty: run it first and the
# nominative *-az of *an√ĺeraz rhotacises to **-ar instead of dropping, wrecking every a-stem in
# the lexicon. The ending must be gone before the rule is allowed to look.
[wg_rhotacism]
time = 405
name = "Rhotacism: *z > *r"
description = "PrG *laiz- > OE lńĀr; *bewzńÖ > *beoňźr 'beer'; *mazgńÖ > *m√¶…Ďrx 'marrow'"
definition = "z ‚Üí r"

# Final *-a and *-i are lost outright (*wulfa > wulf, *wara > w√¶r). Final *-u is not: it
# survives after a light syllable (*sunu > sunu, *medu > medu) and goes only after a heavy one
# ‚ÄĒ Old English high-vowel deletion. A heavy syllable is one with a long vowel or a closing
# consonant, hence the two contexts.
# The Proto-Germanic feminine Ňć-stem ending *-Ňć becomes *-u, and then the light/heavy split the
# language already has takes over: `oe_high_vowel_deletion` (460) keeps it after a light syllable
# and deletes it after a heavy one. The gold shows exactly that ‚ÄĒ *sk…Ďr…Ēňź >  É…Ďru and *snuz…Ēňź >
# snoru (light), against *wull…Ēňź > wull, *mizd…Ēňź > meňźd, *őłew√įŐ†…Ēňź > őłeoňźd (heavy). Nothing else
# was carrying the ending across, so it survived to Old English as a full *-…Ēňź.
[oe_final_long_o_to_u]
time = 440
name = "The Ňć-stem ending *-Ňć becomes *-u"
description = "*sk…Ďr…Ēňź >  É…Ďru, *wull…Ēňź > wull ‚ÄĒ the high-vowel deletion then splits them"
definition = "[+syll, aperture: mid, +back, +rounded, length: long, nasal: none] ‚Üí u / [+syll] []* _ #"

[wg_final_apocope]
time = 450
name = "Final short a, i apocopate in a polysyllable"
description = "*wulfa > wulf, *wara > w√¶r. Rounded -u is spared here and handled next"
# `aperture: !high` ‚ÄĒ the final short HIGH vowels (*i, *u) are not this rule's business. Ringe &
# Taylor ¬ß6.8.1: "short *i and *u were lost word-finally after a HEAVY syllable", which is a
# weight-sensitive change and belongs to `oe_high_vowel_deletion` below. Deleting them here, in any
# polysyllable, took the *-i of *st√¶di with it ‚ÄĒ where Ringe has *st√¶di > OE stedi > stede.
definition = "[+syll, length: short, rounded: none, aperture: !high] ‚Üí ‚ąÖ / [+syll] []* _ #"

# Ringe & Taylor, *The Development of Old English* ¬ß3.1.3: "In PWGmc labiovelars were resolved
# into sequences of velar + *w" ‚ÄĒ Proto-Germanic's single *k ∑ and *x ∑ become the CLUSTERS the
# gold's Old English column writes (*k ∑ik ∑…Ďz > cwic ňąkwik, *x ∑…Ďl…Ďz > hw√¶l ňąxw√¶l). PGmc is
# transcribed with the labiovelar and OE with the cluster, so this is a change to derive, not a
# convention to normalise.
#
# The word-final ones DELABIALISE instead, and Ringe is explicit that this comes FIRST:
# "originally word-final labiovelars simply lost their labialization before the resolution of
# labiovelars into velar + *w sequences". Hence two rules, the loss ordered before the split ‚ÄĒ
# which is what gives *k ∑ik ∑…Ďz its two different outcomes, `kw‚Ä¶k`, in one word.
#
# Dated after the apocope (450), which is what makes the second *k ∑ of *k ∑ik ∑…Ďz word-final in the
# first place; and after OE palatalisation (410), or the *k freed by the resolution would stand
# before a front vowel and affricate ‚ÄĒ **chwic for cwic.
[oe_final_labiovelar_delabialisation]
time = 470
name = "A word-final labiovelar loses its labialisation"
description = "Ringe & Taylor ¬ß3.1.3 ‚ÄĒ *k ∑ik ∑ > *k ∑ik, before the resolution below"
definition = [
    "k ∑ ‚Üí k / _ #",
    "x ∑ ‚Üí x / _ #",
]

[oe_labiovelar_resolution]
time = 480
name = "Labiovelars resolve into velar + w"
description = "Ringe & Taylor ¬ß3.1.3 ‚ÄĒ PWGmc *k ∑, *x ∑ > *kw, *xw (cwic, hw√¶l)"
definition = [
    "k ∑ ‚Üí k w",
    "x ∑ ‚Üí x w",
]

# The n-stem nominative *-√ī becomes Old English *-a: *uxs…Ēňźňź > oxa, *ne…ł…Ēňźňź > nefa, *…£um…Ēňźňź >
# guma, and every ordinal (*fe√įŐ†urőłŐ†…Ēňźňź > feor√ĺa). It is the OVERLONG that identifies it ‚ÄĒ the
# Ňć-stem *-Ňć is merely long and becomes *-u instead (t=440 above) ‚ÄĒ so this rule has to run while
# the two are still distinguishable, and `oe_overlong_shortening` has been moved from 250 to 465
# to keep them apart until they have each been dealt with. Merged early, the n-stems were taking
# the Ňć-stem's *-u and coming out **nefu, **guma-less oks.
#
# And it must run AFTER the apocope (450), which deletes a final short unrounded vowel in a
# polysyllable and would take this *-a straight back off again. That ordering is why the ending
# arrives as an overlong and leaves as a short *-a rather than being made short any earlier.
[oe_final_overlong_to_a]
time = 455
name = "The n-stem ending *-√ī becomes *-a"
description = "*uxs…Ēňźňź > oxa, *ne…ł…Ēňźňź > nefa, *fe√įŐ†urőłŐ†…Ēňźňź > feor√ĺa"
definition = "[+syll, length: overlong] ‚Üí …Ď / [+syll] []* _ #"

# The weak (Ňćn-stem) feminine *-«≠ becomes Old English *-e: *x…Ēňźr…ĒŐÉňź > hŇćre, *wi√įŐ†uw…ĒŐÉňź > widuwe,
# *k ∑en…ĒŐÉňź > cwene. The NASAL is what tells it apart from the strong Ňć-stem *-Ňć, which is oral
# and becomes *-u (t=440) ‚ÄĒ the same two declensions that the Proto-Germanic column keeps apart
# with its tilde. After the apocope (450), like the *-a above, or it would be deleted again.
[oe_final_nasal_o_to_e]
time = 456
name = "The weak Ňćn-stem ending *-«≠ becomes *-e"
description = "*x…Ēňźr…ĒŐÉňź > hŇćre, *wi√įŐ†uw…ĒŐÉňź > widuwe, *k ∑en…ĒŐÉňź > cwene"
definition = "[+syll, nasal, length: long] ‚Üí e / [+syll] []* _ #"

[oe_high_vowel_deletion]
time = 460
name = "Final -u is deleted after a heavy syllable, kept after a light one"
description = "*wulfu-type > wulf, but *sunu, *medu keep it ‚ÄĒ the OE light/heavy split"
# Ringe & Taylor ¬ß6.8.1: "short *i AND *u were lost word-finally after a heavy syllable." It was
# written for *u alone (`rounded: 1`), so every final *-i escaped it and fell to the general
# apocope instead, which is weight-blind ‚ÄĒ *st√¶di lost its ending outright where OE has stede.
definition = [
    "[+syll, length: short, aperture: high] ‚Üí ‚ąÖ / [+syll, length: long] [-syll]* _ #",
    "[+syll, length: short, aperture: high] ‚Üí ‚ąÖ / [+syll] [-syll] [-syll]+ _ #",
]

# Anglo-Frisian brightening: Germanic /a/ fronts to /√¶/, but not before a nasal, where it
# stays back (Minkova p. 7749: "the fronting of /a/ was prevented by a following nasal").
# Stated on FEATURES, for the same reason as the diphthong shift above: written `…Ď ‚Üí √¶` the rule
# matched the LETTER …Ď, and most of the /…Ď/ in the lexicon is not the letter ‚ÄĒ it is a feature
# bundle `non_high_back_merger` made out of PIE *o. So the brightening fired on some words and
# passed silently over *b…Ďraz, *x…Ďslaz, *k…Ďldaz, *…£…Ďrdaz, which look identical on the page. It
# was the largest single error class left at Old English, and it was never a phonological
# question at all: the rule was simply looking for the wrong kind of thing.
#
# SHORT only. The long …Ďňź that `oe_diphthong_shift` has just made out of *ai must not be fronted
# ‚ÄĒ that is Minkova's whole point in ordering the two (stńĀn, not **st√¶n).
# The thematic *-a (what is left of *-az once `wg_final_z_loss` has taken the *z) goes EARLY ‚ÄĒ
# before palatalisation ‚ÄĒ while the *-i of an i-stem must survive to trigger i-mutation at 420 and
# only apocopates later (`wg_final_apocope`, 450). One rule cannot do both, and running them
# together at 450 kept *ainaga's *g company until long after palatalisation had looked at it: the
