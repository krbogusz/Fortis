# Showcase lexicon — each `final` is the attested target the derivation is graded against. Words
# are grouped by the rule that fires on them (see rules.toml `words` scoping).

# Nasal place assimilation (whole Place node)

[[words]]
id = "assim-velar"
gloss = "place assimilation -> velar"
forms = [
  { time = 0, ipa = "anka" },
  { time = "final", ipa = "aŋka" },
]

