# Default project — a showcase of the engine's rule features. Each word is the sole
# target of one rule (scoped by gloss), so each feature shows in isolation.
#
#   python -m src.fortis.main          # run this showcase
#   python -m src.fortis.main --project projects/pie_to_pger   # the PIE → Proto-Germanic project
#
# Most words carry a `final` — the attested target the engine is graded against (here,
# its own correct derivation, so the showcase grades 100% exact). `pata`, the "sound
# change over time" word, also carries intermediate `stages` keyed by rule time, to
# demonstrate the per-stage distance summary. A run writes accuracy.csv and, in the web
# app, populates the Accuracy tab. A few words keep the bare `word = "gloss"` form (no
# target) to show both lexicon styles are supported; those are simply left ungraded.

[[words]]
id = "voicing-assimilation"
gloss = "voicing assimilation"
forms = [
  { time = 0, ipa = "akba" },
  { time = "final", ipa = "agba" },
]

