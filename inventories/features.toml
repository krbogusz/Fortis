# Segmental
consonantal = { tier = "segment", kind = "binary", short = "cons" }
syllabic = { tier = "segment", kind = "binary", short = "syll" }
sonorant = { tier = "segment", kind = "binary", short = "son" }
click = { tier = "segment", kind = "unary", short = "cl" }
length = { tier = "segment", kind = "scalar", short = "ln", values = { 1 = "short", 2 = "long", 3 = "overlong" } }
manner = { tier = "segment", kind = "unary", children = ["continuant", "sonorant", "strident", "lateral", "trill", "click"] }
    continuant = { tier = "segment", kind = "binary", short = "cont" }
    strident = { tier = "segment", kind = "unary", short = "strid" }
    lateral = { tier = "segment", kind = "unary", short = "lat" }
    tap = { tier = "segment", kind = "unary", short = "tap" }
    trill = { tier = "segment", kind = "unary", short = "tr" }
nasal = { tier = "segment", kind = "unary", short = "nas" }
oral = { tier = "segment", kind = "unary", children = ["labial", "dental", "lingual"] }
    labial = { tier = "segment", kind = "unary", short = "lab", children = ["rounded", "compressed"] }
        rounded = { tier = "segment", kind = "unary", short = "rnd"}
        compressed = { tier = "segment", kind = "unary", short = "cmpr"}
    dental = { tier = "segment", kind = "unary", short = "dnt"}
    lingual = { tier = "segment", kind = "unary", short = "ling", children = ["front", "back", "aperture", "advancement"] }
        front = { tier = "segment", kind = "unary", short = "fr", children = ["anterior", "posterior", "apical", "retroflex"] }
            anterior = { tier = "segment", kind = "unary", short = "ant"}
            posterior = { tier = "segment", kind = "unary", short = "post"}
            apical = { tier = "segment", kind = "unary", short = "api"}
            retroflex = { tier = "segment", kind = "unary", short = "rflx"}
        back = { tier = "segment", kind = "unary", short = "bk" }
        aperture = { tier = "segment", kind = "unary", short = "aper", children = ["high", "low"]}
            high = { tier = "segment", kind = "unary", short = "hi"}
            low = { tier = "segment", kind = "unary", short = "lo"}
        advancement = { tier = "segment", kind = "unary", short = "adv", children = ["ATR", "RTR"] }
            ATR = { tier = "segment", kind = "unary", short = "ATR"}
            RTR = { tier = "segment", kind = "unary", short = "RTR"}
glottal = { tier = "segment", kind = "unary", short = "glt", children = ["voice", "glottal_aperture", "tension", "larynx_height"] }
    voice = { tier = "segment", kind = "binary", short = "vc"}
    glottal_aperture = { tier = "segment", kind = "scalar", short = "glap", values = { -1 = "constricted", 0 = "neutral", 1 = "spread" } }
    tension = { tier = "segment", kind = "scalar", short = "tns", values = { -1 = "slack", 0 = "neutral", 1 = "stiff" } }
    larynx_height = { tier = "segment", kind = "scalar", short = "lhgt", values = { -1 = "lowered", 0 = "neutral", 1 = "raised" } }
# Syllable
stress = { tier = "syllable", kind = "scalar", short = "str", values = { 1 = "secondary", 2 = "primary" } }
tone = { tier = "syllable", kind = "scalar", short = "tn", values = { 1 = "extra-low", 2 = "low", 3 = "mid", 4 = "high", 5 = "extra-high" } }
