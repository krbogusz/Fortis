# Autosegmental tier declarations. A feature listed here lives on its own tier (off the
# segment bundle); a feature not listed stays an ordinary segment-tier feature. This file
# is optional — without it, the engine runs with no autosegmental tiers.

[tone]
carries = ["tone"]
anchor = "+syllabic"   # tone-bearing unit: any syllabic segment (the nucleus)
melody = true          # lexical tone is a melody, universally associated L>R, 1:1
ocp = true
stray_erase = true

[stress]
carries = ["stress"]
anchor = "+syllabic"
melody = false         # rule-placed, not a lexical melody
