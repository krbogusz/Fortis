# One rule per word (scoped by gloss). Together they exercise the engine's main features.

[voicing_assimilation]              # α agreement + a natural-class target/context
words      = ["voicing assimilation"]
name       = "Voicing assimilation"
definition = "[-sonorant] -> [α voice] / _ [-sonorant, α voice]"

[i_umlaut]                          # context-sensitive change across a consonant (the * quantifier)
words      = ["i-umlaut"]
name       = "i-umlaut"
definition = "a -> e / _ [+consonantal]* i"

[final_devoicing]                   # a feature merge conditioned by the word edge (#)
words      = ["final devoicing"]
name       = "Final devoicing"
definition = "[-sonorant] -> [-voice] / _ #"

[intervocalic_loss]                 # deletion (-> the empty string)
words      = ["intervocalic loss"]
name       = "Intervocalic loss"
definition = "h -> ∅ / [+syllabic] _ [+syllabic]"

[epenthesis]                        # insertion (the empty string -> a segment)
words      = ["epenthesis"]
name       = "Epenthesis"
definition = "∅ -> ə / [+consonantal] _ [+consonantal] #"

[degemination]                      # two segments collapse to one (cardinality)
words      = ["degemination"]
name       = "Degemination"
definition = "t t -> t"

[tone_spread]                       # autosegmental: one tone, two anchors
words      = ["tone spread"]
name       = "Tone spread"
definition = "[+syllabic, tone: none] -> [+syllabic, tone: ~1] / [+syllabic, tone: ~1=high] [-syllabic]* _"
application = "left_to_right"
